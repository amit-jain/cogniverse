name: Release Images

# Build every first-party image and push it to docker.io/cogniverse tagged with
# the chart appVersion + the commit SHA, on a version tag. `cogniverse up`
# builds the same set locally as <appVersion>-dev; this is the registry-hosted
# release a clean/external cluster pulls (chart base values reference the plain
# <appVersion> tag). Requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets.
#
# The cuda/rocm runtime variants bake in multi-GB torch wheels; GitHub-hosted
# runners are tight on disk even after the cleanup step — move those matrix legs
# to larger/self-hosted runners if they fail on space.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: runtime-cpu
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: cpu
          - repo: runtime-cuda
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: cuda
          - repo: runtime-rocm
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: rocm
          - repo: dashboard-cpu
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: cpu
          - repo: dashboard-cuda
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: cuda
          - repo: dashboard-rocm
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: rocm
          - repo: gliner
            dockerfile: deploy/gliner/Dockerfile
            context: deploy/gliner
            backend: ""
          - repo: videoprism
            dockerfile: deploy/videoprism/Dockerfile
            context: deploy/videoprism
            backend: ""
          - repo: clap-embed
            dockerfile: deploy/clap_embed/Dockerfile
            context: .
            backend: ""
          - repo: face-embed
            dockerfile: deploy/face_embed/Dockerfile
            context: .
            backend: ""
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Resolve version from chart appVersion
        id: version
        run: |
          version=$(sed -n 's/^appVersion: *"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' charts/cogniverse/Chart.yaml)
          test -n "$version" || { echo "could not read appVersion from Chart.yaml"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.repo }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.backend != '' && format('TORCH_BACKEND={0}', matrix.backend) || '' }}
          tags: |
            cogniverse/${{ matrix.repo }}:${{ steps.version.outputs.version }}
            cogniverse/${{ matrix.repo }}:${{ github.sha }}
