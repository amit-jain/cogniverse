name: Release

# On a v* tag: build + push every first-party image to docker.io/cogniverse
# tagged with the release version (from the tag) + the commit SHA, attach an
# SBOM + build provenance, sign each image (keyless cosign), then package + push
# the Helm chart as an OCI artifact. `cogniverse up` builds the same image set
# locally with git-derived dev tags. Requires DOCKERHUB_USERNAME /
# DOCKERHUB_TOKEN secrets.
#
# The cuda/rocm runtime variants bake in multi-GB torch wheels; GitHub-hosted
# runners are tight on disk even after the cleanup step — move those matrix legs
# to larger/self-hosted runners if they fail on space.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless cosign signing via Sigstore OIDC
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: runtime-cpu
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: cpu
          - repo: runtime-cuda
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: cuda
          - repo: runtime-rocm
            dockerfile: libs/runtime/Dockerfile
            context: .
            backend: rocm
          - repo: dashboard-cpu
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: cpu
          - repo: dashboard-cuda
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: cuda
          - repo: dashboard-rocm
            dockerfile: libs/dashboard/Dockerfile
            context: .
            backend: rocm
          - repo: gliner
            dockerfile: deploy/gliner/Dockerfile
            context: deploy/gliner
            backend: ""
          - repo: videoprism
            dockerfile: deploy/videoprism/Dockerfile
            context: deploy/videoprism
            backend: ""
          - repo: clap-embed
            dockerfile: deploy/clap_embed/Dockerfile
            context: .
            backend: ""
          - repo: face-embed
            dockerfile: deploy/face_embed/Dockerfile
            context: .
            backend: ""
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Resolve version from the git tag
        id: version
        run: |
          # The git tag is the single source of truth (same tag hatch-vcs uses
          # for the Python wheels). On a v* tag, strip the leading v; on a manual
          # workflow_dispatch run (no tag) fall back to the chart appVersion.
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" == v* ]]; then
            version="${ref#v}"
          else
            version=$(sed -n 's/^appVersion: *"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' charts/cogniverse/Chart.yaml)
          fi
          test -n "$version" || { echo "could not resolve version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.repo }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # SETUPTOOLS_SCM_PRETEND_VERSION feeds hatch-vcs inside the runtime /
          # dashboard builds (docker context has no .git); the sidecar builds
          # ignore both args.
          build-args: |
            TORCH_BACKEND=${{ matrix.backend }}
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.version.outputs.version }}
          tags: |
            cogniverse/${{ matrix.repo }}:${{ steps.version.outputs.version }}
            cogniverse/${{ matrix.repo }}:${{ github.sha }}
          # Attach a Software Bill of Materials + build provenance so consumers
          # can scan and verify exactly what each image contains.
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image by digest (keyless / Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "cogniverse/${{ matrix.repo }}@${DIGEST}"

  publish-chart:
    # Package the Helm chart and push it to the registry as an OCI artifact so an
    # external operator can `helm install oci://.../cogniverse --version <v>`
    # without the source repo. Runs after the images the chart references exist.
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Resolve version from the git tag
        id: version
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" == v* ]]; then
            version="${ref#v}"
          else
            version=$(sed -n 's/^appVersion: *"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' charts/cogniverse/Chart.yaml)
          fi
          test -n "$version" || { echo "could not resolve version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build chart dependencies
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm dependency build charts/cogniverse

      - name: Package the chart
        run: |
          helm package charts/cogniverse \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"

      - name: Log in to the registry (OCI)
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | helm registry login registry-1.docker.io \
                -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push the chart
        run: |
          helm push "cogniverse-${{ steps.version.outputs.version }}.tgz" \
            oci://registry-1.docker.io/cogniverse
