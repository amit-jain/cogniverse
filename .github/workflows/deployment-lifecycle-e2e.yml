name: Deployment Lifecycle E2E

on:
  # Manual runs — available any time for release-candidate verification.
  workflow_dispatch:

  # Automatic runs only when the deployment pipeline changes. These tests
  # build real Docker images, spin up a real k3d cluster, do a real Helm
  # install, and take 20–30 minutes, so we don't run them on every push.
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - 'libs/runtime/Dockerfile'
      - 'libs/dashboard/Dockerfile'
      - 'tests/e2e/deployment/**'
      - '.github/workflows/deployment-lifecycle-e2e.yml'

jobs:
  deployment-lifecycle:
    runs-on: ubuntu-latest
    # Full deployment lifecycle: Docker build (~8 min) + k3d create (~2 min)
    # + Helm install (~3 min) + pod readiness (~5 min) + tests (~2 min).
    # 60 min caps the worst case, including image pull variance.
    timeout-minutes: 60

    env:
      # Build slim images (no CUDA, no pre-baked models) — deployment
      # lifecycle only verifies pod health and helm release, no agent
      # queries. This keeps Docker's disk footprint under the 14 GB
      # ubuntu-latest runner ceiling. The test fixture reads these env
      # vars and forwards them as --build-arg. See
      # libs/runtime/Dockerfile for the CPU_ONLY / PREDOWNLOAD_MODELS
      # flags.
      CPU_ONLY: 'true'
      PREDOWNLOAD_MODELS: 'false'

    steps:
      - uses: actions/checkout@v4

      # GHA ubuntu-latest runners ship ~14 GB free disk. Preinstalled
      # toolchains eat 25+ GB that we don't need. Freeing them first
      # gives Docker builds + k3d image import room to breathe.
      - name: Free up runner disk
        run: |
          echo "--- before ---"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift
          sudo docker image prune -af >/dev/null 2>&1 || true
          echo "--- after ---"
          df -h /

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.9

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install Python dependencies
        run: |
          uv sync --all-packages --all-extras
          uv pip install pytest-asyncio

      - name: Verify tools
        run: |
          docker version
          k3d version
          kubectl version --client
          helm version
          uv run python -c "import pytest; print('pytest', pytest.__version__)"

      # The deployment-lifecycle test spins up its own isolated k3d cluster
      # on offset 51xxx ports (see tests/e2e/deployment/conftest.py). It
      # shares the Docker daemon with the runner but no other cluster is
      # running here, so there's no port or resource collision.
      - name: Run deployment lifecycle e2e
        env:
          # Force pytest to show full tracebacks — consistent with project
          # convention ("Always use --tb=long"). Skip --cov to keep the
          # run focused on infra validation, not coverage collection.
          PYTEST_ADDOPTS: '--tb=long -v'
        run: |
          uv run pytest tests/e2e/deployment/ -p no:cacheprovider

      # Even on failure, dump cluster state so the run log contains enough
      # info to diagnose Helm / pod failures without re-running.
      - name: Capture cluster diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== disk ==="
          df -h /
          echo "=== docker images ==="
          docker images | head -20
          echo "=== k3d clusters ==="
          k3d cluster list || true
          echo "=== pods across namespaces ==="
          kubectl get pods -A || true
          echo "=== events (last 200 across all ns) ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -200 || true
          echo "=== helm releases ==="
          helm list -A || true
          echo "=== describe not-ready pods ==="
          for pod in $(kubectl get pods -A --no-headers 2>/dev/null \
            | awk '$4 != "Running" && $4 != "Completed" {print $2":"$1}'); do
            ns="${pod##*:}"
            name="${pod%%:*}"
            echo "--- $ns/$name ---"
            kubectl describe pod "$name" -n "$ns" | tail -40 || true
          done

      # Always tear down the test cluster so a retry/rerun starts clean.
      - name: Delete test cluster
        if: always()
        run: |
          k3d cluster delete cogniverse-test || true
