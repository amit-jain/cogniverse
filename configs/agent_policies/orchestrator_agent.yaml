network_policies:
  egress:
    - host: "localhost"
      port: 8000
      protocol: "tcp"
      comment: "Runtime A2A agent dispatch"
    - host: "localhost"
      port: 11434
      protocol: "tcp"
      comment: "Ollama LLM inference"
  deny_all_other: true

filesystem:
  read:
    - "configs/"
    - "data/"
  write:
    - "/tmp"
    - "outputs/"
  deny_all_other: true

inference:
  allowed_models:
    - "ollama/qwen3:4b"

process:
  max_memory_mb: 4096
  max_cpu_seconds: 600
  max_processes: 20
