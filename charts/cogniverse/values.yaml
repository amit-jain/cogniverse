# Cogniverse Helm Chart Values
# Default values for production deployment

# Global settings
global:
  # Image registry
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Development mode: mount host source code into containers.
# Requires k3d cluster created with: --volume "$(pwd):/cogniverse-src@server:0"
# Code changes take effect on pod restart — no Docker rebuild needed.
devMode:
  enabled: false
  hostPath: /cogniverse-src

# ===========================================
# Argo Workflows (optimization scheduling)
# ===========================================
argo:
  enabled: true
  # Subchart values for argo-workflows
  argo-workflows:
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    server:
      # Enabled so the runtime can submit Workflows / CronWorkflows via the
      # Argo REST API (/api/v1/workflows/... and /api/v1/cronworkflows/...).
      # Used by POST /admin/tenant/{id}/jobs (scheduled) and
      # POST /admin/tenant/{id}/optimize (on-demand).
      enabled: true
      # `server` auth means argo-server uses its own ServiceAccount to talk to
      # the Kubernetes API; in-cluster callers (runtime) hit the REST API
      # without presenting a user token.
      authModes:
        - server
  # Optimization schedule configuration
  optimization:
    weekly:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
      annotationThreshold: 50
      improvementThreshold: 5
    daily:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      annotationThreshold: 20
    # Unified agent optimization — runs all DSPy-based optimizers in parallel
    agentOptimization:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
    # Daily gateway threshold tuning
    dailyGateway:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
    # Synthetic data generation for optimizer training sets
    syntheticGeneration:
      enabled: true
      schedule: "0 1 * * 6"  # Saturday 1 AM UTC
    # Audit fix #7 — scheduled distillation runs ``quality_monitor_cli --once``
    # to force a strategy distillation pass independent of the quality-drop
    # threshold check. Without this cron, distillation only fired on
    # degradation, leaving long stable periods without learning.
    scheduledDistillation:
      enabled: true
      schedule: "0 5 * * *"  # Daily 5 AM UTC (after the optimization cycle)
    # Monthly usage + performance reports. Replaces the standalone
    # kubectl-applied ``monthly-reports`` prototype that wrote empty
    # stub JSON. The chart version collects real metrics (per-org
    # tenant counts + per-tenant Phoenix latency p50/p95/error rate).
    monthlyReports:
      enabled: true
      schedule: "0 5 1 * *"  # 1st of each month, 5 AM UTC
      lookbackHours: 720     # Cover the prior 30 days
      # MinIO destination — same bucket the data-backup workflows use,
      # under a separate prefix so reports don't mingle with backup
      # tarballs.
      uploadPrefix: "reports"
  maintenance:
    backup:
      enabled: true
      schedule: "0 2 * * *"  # Daily 2 AM UTC
    cleanup:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      logRetentionDays: 7
      memoryRetentionDays: 30

# Image configuration
image:
  registry: docker.io
  repository: cogniverse
  pullPolicy: IfNotPresent
  tag: "2.0.0"

# Namespace
namespaceOverride: ""

# Common labels
commonLabels: {}

# Common annotations
commonAnnotations: {}

# ===========================================
# Host-bound stateful storage
# ===========================================
# Bind stateful service data directories (Vespa document store + config,
# Phoenix SQLite + traces) to host-side directories instead of the
# default ``local-path`` PVC provisioner. Off by default — production
# clusters want real PVCs backed by cloud storage. Dev/k3s overlays
# opt in so cluster recreation (``cogniverse up`` after a previous
# delete) does not lose Vespa application state or Phoenix experiment
# history. The k3d cluster bind-mounts ``hostStorage.hostPath`` from
# the operator's host into the node, and the chart hostPaths each
# service's subdir into its pod when this flag is on, bypassing PVC
# entirely so the data lives on the host filesystem.
hostStorage:
  enabled: false
  # Path INSIDE the k3d node where ``~/.local/share/cogniverse`` is
  # bind-mounted. Per-service subdirs (vespa/, phoenix/) are created
  # inside automatically.
  path: /host-data
  # Optional MinIO DR snapshots — one nightly CronWorkflow per listed
  # service that tars the configured data dir out of the live pod
  # (``kubectl exec`` + tar) and uploads to
  # ``s3://<bucket>/<svc>/<timestamp>.tar``. Default off; not
  # crash-consistent (uses live read while the source process keeps
  # writing) but workable for periodic disaster-recovery snapshots.
  #
  # ``services`` lists the pods to back up. Each entry picks a ``mode``:
  #
  # - ``kubectl-exec`` (default): tar from inside the live source pod via
  #   ``kubectl exec``. Requires the source container to have ``tar`` +
  #   POSIX shell on PATH (works for vespa, fails on distroless images).
  #   Needs ``dataPath`` + ``podLabel``. Cross-cuts hostStorage / PVC
  #   modes since it doesn't touch the volume directly.
  #
  # - ``volume-mount``: mount the source volume into the workflow pod and
  #   tar from local fs. Required for distroless source containers
  #   (phoenix). Set ``hostPath`` for hostStorage clusters or ``pvcName``
  #   for PVC-backed clusters. RWO PVCs cannot be mounted while the
  #   source pod is running — for cloud deployments use RWX, take a CSI
  #   VolumeSnapshot first, or scale the source pod to 0 during backup.
  #
  # Default services list backs up vespa (kubectl-exec) AND phoenix
  # (volume-mount of the hostStorage path). When unset, both are backed
  # up nightly per ``schedule``.
  backup:
    enabled: false
    bucket: cogniverse-backups
    existingSecret: ""
    schedule: "0 3 * * *"
    retainLast: 7
    services:
      - name: vespa
        mode: kubectl-exec
        dataPath: /opt/vespa/var
        podLabel: app.kubernetes.io/component=vespa
      - name: phoenix
        mode: volume-mount
        # hostStorage mode (default for dev) — phoenix data lives at
        # ``hostStorage.path/phoenix``. For PVC-backed cloud setups,
        # replace with ``pvcName: data-cogniverse-phoenix-0`` (and
        # arrange RWX/snapshot/downtime per the comment above).
        hostPath: /host-data/phoenix
    # Backup destination — single config block that switches between
    # local-dev (in-cluster MinIO, default) and cloud (R2 / B2 / AWS S3).
    # Same template, same workflow, same code path; only these values
    # change between dev and cloud deployments.
    #
    # Local dev (default behaviour, no override needed):
    #   leave both fields empty → CronWorkflow targets the chart's
    #   in-cluster ``cogniverse-minio`` Deployment + secret. Make MinIO
    #   itself durable via ``minio.persistence.hostPath`` so the bucket
    #   data survives ``k3d cluster delete``.
    #
    # Cloud (Cloudflare R2 example):
    #   s3.endpoint: "https://<account>.r2.cloudflarestorage.com"
    #   s3.existingSecret: "my-r2-credentials"   # secret keys: rootUser, rootPassword
    #
    # The credential secret MUST hold the access key under ``rootUser``
    # and the secret under ``rootPassword`` regardless of provider. This
    # keeps the template provider-agnostic.
    s3:
      endpoint: ""              # empty → in-cluster cogniverse-minio
      existingSecret: ""        # empty → cogniverse-minio secret
      region: "us-east-1"       # required by some S3 clients (mc ignores it)

# ===========================================
# HuggingFace cache sharing
# ===========================================
# Cross-cutting: lets every inference pod (and the runtime) read the
# operator's HuggingFace cache directly instead of each pod
# downloading or each cluster bringing up an empty per-service cache
# dir. Off by default — production clusters do not expose a developer's
# host filesystem. Dev/k3s overlays opt in. The k3d cluster
# bind-mounts ``~/.cache/huggingface`` to ``hfCache.path`` on the
# node (see libs/cli/cogniverse_cli/cluster.py); the inference pod
# template hostPaths that into the pod when ``hfCache.enabled`` is
# true.
hfCache:
  enabled: false
  # Path INSIDE the k3d node where ``~/.cache/huggingface`` is
  # bind-mounted. Pods see this path as their HF_HOME.
  path: /host-hf-cache
  # PVC-backed cache for prod where node-local hostPath would be lost
  # on node replacement. Each inference svc + runtime + ingestor gets
  # its own PVC. Defaults OFF — opt in for prod clusters.
  persistence:
    enabled: false
    size: 50Gi
    accessMode: ReadWriteOnce
    storageClass: ""
    annotations: {}
    # Optional MinIO mirror — operator runs the populate Job once to
    # upload models from HF Hub to MinIO; subsequent inference pod
    # starts pull from MinIO (fast, air-gap friendly) before falling
    # through to HF Hub via the model-warm init container.
    minio:
      enabled: false
      endpoint: ""              # e.g. http://cogniverse-minio:9000
      bucket: cogniverse-models
      # Secret with MINIO_ACCESS_KEY + MINIO_SECRET_KEY keys (the chart
      # already provisions one called ``<release>-minio`` when the
      # bundled minio sub-chart is enabled — set existingSecret to
      # ``<release>-minio`` to reuse it).
      existingSecret: ""
      # Models to mirror. Each entry is a HF repo id; the populate Job
      # uploads to ``s3://<bucket>/<repo_id>/`` and the init container
      # mirrors back to the inference svc's PVC at first cold start.
      models: []

# ===========================================
# Vespa Configuration
# ===========================================
vespa:
  enabled: true
  image:
    repository: vespaengine/vespa
    tag: "8.668.5"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "8"
      memory: "20Gi"
    requests:
      cpu: "4"
      memory: "8Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
    annotations: {}

  service:
    type: ClusterIP
    ports:
      query: 8080
      config: 19071
      metrics: 19092
    nodePorts:
      query: 28080
    annotations: {}

  env:
    VESPA_CONFIGSERVERS: "vespa"
    VESPA_MEMORY_OPTIONS: "-Xms4g -Xmx16g"

  # Health checks
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Runtime Configuration
# ===========================================
runtime:
  enabled: true
  # Backend selects the image at chart-render time — each torch backend
  # ships its own image (cogniverse/runtime-cpu / -cuda / -rocm) so a
  # CPU-only deployment doesn't pull NVIDIA libraries. Mirrors the
  # whisper engine-per-image pattern. Set ``backend`` to one of
  # ``cpu``/``cuda``/``rocm`` and the template picks the matching entry
  # from ``imagesByBackend``; falls back to ``image`` for back-compat.
  backend: cuda
  image:
    repository: cogniverse/runtime-cuda
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  imagesByBackend:
    cpu:
      repository: cogniverse/runtime-cpu
      tag: dev
      pullPolicy: IfNotPresent
    cuda:
      repository: cogniverse/runtime-cuda
      tag: dev
      pullPolicy: IfNotPresent
    rocm:
      repository: cogniverse/runtime-rocm
      tag: dev
      pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

  service:
    type: ClusterIP
    port: 8000
    nodePort: 28000
    annotations: {}

  env:
    RUNTIME_HOST: "0.0.0.0"
    RUNTIME_PORT: "8000"
    LOG_LEVEL: "INFO"
    WORKERS: "4"

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness: TCP socket only. HTTP /health endpoints queue behind uvicorn
  # workers and can stall under concurrent DSPy/CPU-LLM load. TCP checks the
  # listener is alive — the actual process is fine, work is just slow.
  livenessProbe:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 24

  readinessProbe:
    httpGet:
      # /health/ready is a lightweight in-memory backend-registration check
      # (returns 503 until backends register) — unlike the heavy /health
      # endpoint, so it won't stall under DSPy/CPU-LLM load.
      path: /health/ready
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5

  # OpenShell sandbox — enables coding agent code execution in isolated containers.
  #
  # Two deployment modes:
  #
  # 1. HOST mode (default for local dev with k3d):
  #    - Gateway runs on the developer's host via `openshell gateway start`
  #    - Runtime pod reaches it via host.docker.internal:19091
  #    - Host's ~/.config/openshell dir is synced into the pod via k8s Secret/ConfigMap
  #    - `cogniverse up` automates the setup (install CLI, start gateway, sync certs)
  #
  # 2. IN-CLUSTER mode (production):
  #    - Gateway deployed as a Helm subchart inside the cogniverse namespace
  #    - mTLS certs generated by a pre-install Job (openshell-certs-job.yaml)
  #    - Runtime reaches it via openshell.<namespace>.svc.cluster.local:8080
  #    - No host dependency — works on EKS, GKE, AKS, etc.
  sandbox:
    enabled: false
    # Endpoint reachable from inside the runtime pod.
    # - Host mode:       "host.docker.internal:19091"
    # - In-cluster mode: auto-computed as openshell.<ns>.svc.cluster.local:8080
    gatewayEndpoint: "host.docker.internal:19091"
    # Host path to the openshell config directory (host mode only, ignored in in-cluster).
    hostConfigPath: ""
    # In-cluster mode settings
    inCluster:
      enabled: false

  # Quality monitor sidecar — continuous evaluation of all agents
  qualityMonitor:
    enabled: true
    tenantId: ""
    goldenIntervalSeconds: 7200   # 2 hours
    liveIntervalSeconds: 14400    # 4 hours
    liveSampleCount: 20
    # Audit fix #1 — absolute path inside the sidecar container. The dataset
    # is mounted from a ConfigMap built from
    # charts/cogniverse/files/quality-monitor/golden_dataset.json (a copy
    # of data/testset/evaluation/sample_videos_retrieval_queries.json).
    goldenDatasetPath: "/app/data/quality-monitor/golden_dataset.json"
    # Bare model id passed to ``quality_monitor_cli --llm-model`` (the LLM
    # judge target). Must match evaluators.llm_judge.model in config.json so
    # the judge and the rest of the stack agree on the same Ollama/vLLM
    # model name. Required when qualityMonitor.enabled=true.
    llmModel: "qwen3:4b"
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "250m"
        memory: "512Mi"

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - runtime
            topologyKey: kubernetes.io/hostname

# ===========================================
# OpenShell Subchart (in-cluster sandbox)
# ===========================================
# Only used when runtime.sandbox.inCluster.enabled=true. Keys in this
# section are passed directly to the openshell subchart at charts/openshell.
openshell:
  image:
    repository: ghcr.io/nvidia/openshell/gateway
    tag: "0.0.13"
  service:
    type: ClusterIP
    port: 8080
  server:
    # HMAC secret for gateway↔sandbox SSH handshake. Must be non-empty.
    # Override in values.prod.yaml with a secure per-environment value.
    sshHandshakeSecret: "change-me-in-production-a1b2c3d4e5f6"
    grpcEndpoint: "https://openshell.cogniverse.svc.cluster.local:8080"
    tls:
      certSecretName: openshell-server-tls
      clientCaSecretName: openshell-server-client-ca
      clientTlsSecretName: openshell-client-tls

# ===========================================
# Dashboard Configuration
# ===========================================
dashboard:
  enabled: true
  # Same backend → image selection as runtime (one image per torch
  # variant). Dashboard is Streamlit and never runs inference itself,
  # but the venv transitively imports torch via cogniverse_agents /
  # cogniverse_evaluation, so the wheel choice still matters for image
  # size and ABI compatibility.
  backend: cuda
  image:
    repository: cogniverse/dashboard-cuda
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  imagesByBackend:
    cpu:
      repository: cogniverse/dashboard-cpu
      tag: dev
      pullPolicy: IfNotPresent
    cuda:
      repository: cogniverse/dashboard-cuda
      tag: dev
      pullPolicy: IfNotPresent
    rocm:
      repository: cogniverse/dashboard-rocm
      tag: dev
      pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  service:
    type: ClusterIP
    port: 8501
    nodePort: 28501
    annotations: {}

  env:
    STREAMLIT_SERVER_PORT: "8501"
    STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
    STREAMLIT_SERVER_ENABLE_CORS: "false"
    STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"

  # Health checks
  livenessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Phoenix Configuration
# ===========================================
phoenix:
  enabled: true
  image:
    repository: arizephoenix/phoenix
    tag: "14.2.1"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "50Gi"
    annotations: {}

  service:
    type: ClusterIP
    port: 6006
    nodePort: 26006
    annotations: {}

  env:
    PHOENIX_WORKING_DIR: "/phoenix-data"
    PHOENIX_PORT: "6006"
    PHOENIX_HOST: "0.0.0.0"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# LLM Inference Configuration
# ===========================================
# One deployment-time switch picks both the in-cluster pod (if any) and
# the api_base the runtime points its LLM calls at. All three engines
# expose the OpenAI-compatible HTTP contract (``/v1/chat/completions``)
# so the runtime uses one canonical litellm provider prefix for every
# backend (see ``cogniverse.llmProviderPrefix`` in templates/_helpers.tpl);
# the engine choice only steers the URL, not the wire shape:
#
#   engine: ollama   → deploys built-in Ollama StatefulSet + PVC
#   engine: vllm     → deploys built-in vLLM Deployment (CPU/GPU per ``device``)
#   engine: external → no pod; ``llm.external.url`` is the api_base
llm:
  engine: ollama                # ollama | vllm | external
  model: gemma3:4b              # bare model id; helper prepends provider prefix
  device: cpu                   # cpu | cuda | rocm | mps (vllm only)
  gpuCount: 1
  replicaCount: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # ---------------------------------------------------------------
  # engine: ollama — built-in Ollama pod (StatefulSet + PVC)
  # ---------------------------------------------------------------
  ollama:
    image:
      repository: ollama/ollama
      tag: "0.20.5"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 11434
      annotations: {}
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    env:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Keep models resident indefinitely. Unloading a ~7GB model and
      # reloading it on the next request takes 60-120s and causes spurious
      # test timeouts.
      OLLAMA_KEEP_ALIVE: "-1"
    # Models pulled by the post-install init job (only when engine=ollama).
    # vLLM downloads on first request via HF cache instead.
    # Embedding model intentionally absent: DenseOn is served by the
    # ``denseon`` sidecar pod (the colbert_pylate sidecar in mode=dense), not Ollama.
    models:
      - "gemma3:4b"
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "8Gi"
    livenessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3

  # ---------------------------------------------------------------
  # engine: vllm — vLLM-OpenAI Deployment (one pod, one model)
  # ---------------------------------------------------------------
  # On CPU laptops vLLM is overpowered for chat — prefer engine=ollama.
  # Use vllm in production on CUDA / ROCm GPUs (see values.cuda.yaml,
  # values.rocm.yaml). Both Ollama and vLLM expose /v1/chat/completions
  # so the runtime path is identical.
  vllm:
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    # Per-device image override; chart picks ``imagesByDevice[device]`` if
    # present, else falls back to ``image`` above. Set in values.cuda.yaml /
    # values.rocm.yaml for GPU images. Keys: cpu, cuda, rocm, mps.
    imagesByDevice: {}
    service:
      type: ClusterIP
      port: 8000
      annotations: {}
    # HuggingFace cache PVC so model weights survive pod restarts.
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    dtype: float16                 # float16 on CUDA, bfloat16 on newer GPUs
    extraArgs:
      - "--max-model-len"
      - "8192"
    resources:
      limits:
        cpu: "8"
        memory: "32Gi"
      requests:
        cpu: "2"
        memory: "8Gi"
    # Model load on a fresh PVC takes minutes for 7B-class checkpoints;
    # generous start-period prevents liveness flapping during cold start.
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 300
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 24

  # ---------------------------------------------------------------
  # engine: external — point at a host-side or third-party endpoint
  # ---------------------------------------------------------------
  external:
    url: ""                       # e.g. http://host.docker.internal:11434

# ===========================================
# Inference Services (embedding models)
# ===========================================
# Each entry under ``inference`` deploys one pod serving one model. Keys are
# logical tags the deployer chooses; profiles reference a service by its key
# via ``inference_service`` in the profile. No magic — rename freely.
#
# Per-entry fields:
#   - engine: "vllm" | "pylate" — picks the container image
#   - model:  HF model id the pod serves
#   - type:   "multi_vector" | "single_vector" — retrieval style (metadata for
#             the runtime; does not affect the pod itself)
#
# The runtime receives a single ``INFERENCE_SERVICE_URLS`` env var containing
# a JSON map of {key → url} for every enabled service. Profiles route per
# request by looking up their ``inference_service`` in that map.
inference:
  # vLLM-served visual multi-vector retrieval (ColPali). Replaces the
  # legacy custom FastAPI sidecar (deploy/colpali). Uses vLLM's
  # ColPaliForRetrieval class to serve vidore/colpali-v1.3-hf — a 3B
  # PaliGemma-based model with 128-dim per-token output, matching the
  # existing Vespa schema (no migration). Profiles route here via
  # ``inference_service: "vllm_colpali"``.
  vllm_colpali:
    enabled: false
    engine: vllm_token_embed
    model: vidore/colpali-v1.3-hf
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    # vLLM 0.20+ retired the ``--task token_embed`` flag in favour of
    # ``--runner pooling --convert embed`` (runner picks the model
    # runner; convert reshapes the pooled output into per-token
    # embeddings — exactly what ColPali multi-vector retrieval needs).
    # Older vLLM still accepted ``--task``; keeping the new flags is
    # forward-compatible.
    extraArgs:
      - "--max-model-len"
      - "4096"
      - "--runner"
      - "pooling"
      - "--convert"
      - "embed"
    # ``VLLM_CPU_KVCACHE_SPACE`` (GiB) is the CPU equivalent of
    # ``--gpu-memory-utilization``: it sets the absolute size of the
    # KV cache instead of a fraction of node memory. The fraction
    # path doesn't compose with cgroup limits — vLLM sees the full
    # node memory but the pod cgroup caps the actual usable budget,
    # so the worker pre-allocates more than the limit and OOMKills.
    # 2 GiB KV cache + 5.5 GiB model weights + ~4 GiB activations =
    # ~12 GiB working set; ``resources.limits.memory: 16Gi`` adds
    # headroom for cudagraph/transient buffers.
    kvCacheGiB: 2
    hfTokenSecret: ""              # colpali-v1.3-hf is ungated
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29001
    # Guaranteed QoS — see vllm_llm_student note.
    resources:
      limits:
        cpu: "4"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "16Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24

  # ColBERT-family text multi-vector retrieval served by a pylate FastAPI
  # sidecar (cogniverse_runtime/sidecars/colbert_pylate.py). Used by profiles with
  # ``inference_service: "colbert_pylate"`` (e.g., document_text_semantic,
  # lateon_mv). Swap model via ``model:`` — same pylate pod serves any
  # ColBERT-family checkpoint. If you want a second ColBERT pod (e.g. for
  # a different model in parallel), add another entry with a distinct key.
  colbert_pylate:
    enabled: true
    engine: pylate
    model: lightonai/LateOn
    type: multi_vector
    # Top-level device drives GPU resources / nodeSelector. The pylate
    # block below carries its own ``device`` env var which is kept in
    # sync with this top-level field by the chart template.
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29002
    # vLLM-specific (used when engine=vllm)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "8192"
    # pylate-specific (used when engine=pylate)
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}           # per-device image override; same shape as vllm_colpali
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # Code-search ColBERT-family multi-vector retrieval (LateOn-Code-edge).
  # Deployed in parallel with ``colbert_pylate`` when enabled — independent
  # pods, independent models, same pylate contract. Profiles route here
  # via ``inference_service: "code_colbert_pylate"``.
  code_colbert_pylate:
    enabled: false
    engine: pylate
    model: lightonai/LateOn-Code-edge
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29004
    # vLLM-specific (unused by default since default engine is pylate)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs: []
    # pylate-specific
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

  # Dense single-vector embedding service: the SAME colbert_pylate
  # sidecar image, run in ``mode: dense`` so it loads via
  # SentenceTransformer and exposes POST /v1/embeddings
  # (OpenAI-compatible). Used by Mem0 + SemanticEmbedder + the
  # job-executor delivery router. Profiles route here via
  # ``inference_service: "denseon"``.
  denseon:
    enabled: true
    engine: pylate
    mode: dense                    # colbert | dense — picks /pooling vs /v1/embeddings
    model: lightonai/DenseOn       # ModernBERT-base, 768-dim, CLS pooling, 512 ctx
    type: single_vector
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29006
    # vLLM-specific (unused — engine is pylate)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs: []
    # pylate-specific (the actual engine path)
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "2"
        memory: "3Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 45
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

  # GLiNER zero-shot NER served by the FastAPI sidecar in deploy/gliner.
  # GatewayAgent + EntityExtractionAgent post text + label sets to
  # /predict_entities; the slim runtime image excludes torch+gliner by
  # design (commits 8e2e3f2e + 34195f75) so they MUST route through
  # this sidecar. The sidecar loads multiple models on demand keyed
  # by request.model — gateway uses gliner_large-v2.1, entity
  # extraction uses gliner_mediumv2.1.
  gliner:
    enabled: true
    engine: gliner
    model: urchade/gliner_mediumv2.1
    type: ner
    device: cpu                    # gliner runs comfortably on CPU
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8080
      nodePort: 29007
    image:
      repository: cogniverse/gliner
      tag: dev
      pullPolicy: Never
    imagesByDevice: {}
    extraArgs: []
    hfTokenSecret: ""              # gliner_mediumv2.1 is ungated
    resources:
      limits:
        cpu: "4"
        memory: "8Gi"
      requests:
        cpu: "1"
        memory: "3Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 30

  # VideoPrism (JAX) video multi-vector embeddings served by the custom
  # FastAPI sidecar in deploy/videoprism (cogniverse/videoprism:dev).
  # Externalising VideoPrism keeps the runtime image free of the
  # tensorflow + flax + jax dep stack — TF 2.20's static initialiser
  # combined with uvicorn server threads aborts on darwin, and TF has
  # no AMD ROCm wheel. Profiles route here via
  # ``inference_service: "videoprism_jax"``; the in-process
  # ``VideoPrismModelLoader`` is no longer wired by default.
  videoprism_jax:
    enabled: false
    engine: videoprism_jax
    model: videoprism_public_v1_base_hf
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm
    image:
      repository: cogniverse/videoprism
      tag: "dev"
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    # Number of frames sampled per segment. The public checkpoint was
    # trained at 16; temporal positional embeddings interpolate but
    # quality drops past ~32.
    numFrames: 16
    # Selects JAX backend at runtime. ``cpu`` is safe on every node;
    # set to ``gpu`` after building a CUDA-base image.
    jaxPlatform: cpu
    replicaCount: 1
    service:
      type: ClusterIP
      port: 7999
      nodePort: 29006
    resources:
      limits:
        cpu: "4"
        memory: "8Gi"
      requests:
        cpu: "1"
        memory: "3Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 7999
      # First JIT trace can take 60-90s on a cold container.
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24
    readinessProbe:
      httpGet:
        path: /health
        port: 7999
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24

  # vLLM-served LLM student — runtime hot path. Single instance handling
  # all DSPy / agent / search / judge calls. Gemma 4 E4B (4B effective)
  # for low-latency. Multimodal (text + image + video + audio) so it
  # folds in vlm_interface, evaluators.llm_judge, evaluators.visual_judge
  # in one model. Profiles do not route through this — agents resolve it
  # via llm_config.primary at the runtime layer.
  vllm_llm_student:
    enabled: false
    engine: vllm_chat
    type: chat
    model: google/gemma-4-e4b-it
    device: cpu                    # cpu | cuda | rocm
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    # ``--max-model-len`` is dropped from Gemma 4 native (262144) to
    # 8192 because the CPU worker pre-allocates KV blocks for the
    # full context length, and 262144 alone would blow past the cgroup
    # limit before any cache-fraction math runs. 8192 covers every
    # in-suite agent prompt comfortably.
    #
    # ``--enforce-eager`` skips torch.compile / Inductor warmup. On CPU
    # the compilation step allocates large transient buffers that
    # routinely push the pod past its memory limit during the
    # "Warming up model for the compilation..." phase. Eager mode is
    # ~10-15% slower per token but the pod doesn't OOMKill on cold
    # start, which matters far more here.
    #
    # ``--limit-mm-per-prompt {"video":0,"image":0}`` tells vLLM not
    # to reserve encoder-cache space for multimodal inputs. gemma-4-
    # e4b-it is a vision-language model, so the warmup pass profiles
    # the largest video the encoder can ingest (default budget grows
    # with video frames × patches × bf16 — easily 30+ GiB transient).
    # The runtime only exercises chat-completions on text, so we
    # disable multimodal capacity entirely. ``--max-num-seqs 1`` keeps
    # batched-prefill memory at single-request size; the runtime
    # serializes generation requests so >1 buys nothing.
    extraArgs:
      - "--max-model-len"
      - "8192"
      - "--enforce-eager"
      - "--max-num-seqs"
      - "1"
      - "--limit-mm-per-prompt"
      - '{"video":0,"image":0}'
    # See vllm_colpali kvCacheGiB note. Gemma 4 E4B at bfloat16 is
    # ~9.6 GiB of weights; 4 GiB KV cache + ~6 GiB activations +
    # ~4 GiB transient buffers (load-time HF cache copies, NCCL/UCX
    # init, dynamic compilation) = ~24 GiB peak. The 24 GiB limit
    # was clipping the loading phase intermittently — 32 GiB drops
    # the OOMKill rate to zero for repeated cold starts.
    kvCacheGiB: 4
    # Gemma 4 is gated on HuggingFace; create a Secret named hf-token
    # with key HF_TOKEN before deploying.
    hfTokenSecret: "hf-token"
    replicaCount: 1
    service:
      type: NodePort
      port: 8000
      nodePort: 29010
    # NodePort (not ClusterIP) so tests / local clients can reach the
    # OAI-compat endpoint at localhost:29010 via the k3d serverlb
    # without a kubectl port-forward bridge.
    # Guaranteed QoS — see vllm_colpali note. gemma-4-e4b-it is the
    # runtime's primary LLM and we cannot afford to lose it mid-test.
    #
    # Why 64 GiB: gemma-4-e4b-it ships float32 checkpoints
    # (~14.9 GiB on disk). vLLM holds the float32 buffer AND the
    # converted bf16 buffer in memory simultaneously during weight
    # loading (~22 GiB peak). The Gemma 4 model wraps the multimodal
    # PaliGemma2 architecture which keeps the vision tower resident
    # alongside the text decoder, adding ~8 GiB. KV cache (4 GiB),
    # activations during eager warmup (~12 GiB at max-model-len 8192
    # × num_layers × hidden_dim × bf16 with no compile fusion), plus
    # ~4 GiB framework overhead = ~50 GiB peak working set. Earlier
    # 32 GiB and 48 GiB ceilings OOMKilled mid-warmup; 64 GiB lands
    # above the observed peak by a safe margin.
    resources:
      limits:
        cpu: "4"
        memory: "64Gi"
      requests:
        cpu: "4"
        memory: "64Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24

  # vLLM-served ASR via Whisper. Replaces the legacy ``deploy/whisper``
  # FastAPI sidecar. Profiles route audio transcription here via
  # ``inference_services.transcription: "vllm_asr"``. The vLLM image
  # must include the ``vllm[audio]`` extra so ``--task transcription``
  # is registered (set in extraArgs).
  vllm_asr:
    enabled: false
    engine: vllm_transcription
    type: transcription
    model: openai/whisper-large-v3-turbo
    device: cpu                    # cpu | cuda | rocm
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    # vLLM 0.20+ replaced ``--task transcription`` with the implicit
    # ``--runner generate`` path — the OpenAI-compatible /v1/audio/
    # transcriptions endpoint is registered automatically when the model
    # is detected as a Whisper variant. Keep ``--runner generate``
    # explicit so the runner choice is unambiguous on future versions.
    extraArgs:
      - "--runner"
      - "generate"
      - "--max-model-len"
      - "448"
    # See vllm_colpali kvCacheGiB note. Whisper-large-v3-turbo is
    # ~3 GiB at bf16 with negligible KV cache (max-model-len 448 is
    # tiny vs Gemma's 8192). 1 GiB cap is plenty.
    kvCacheGiB: 1
    hfTokenSecret: ""              # whisper is ungated
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29005
    # Guaranteed QoS — Whisper at bf16 + dynamic activations + framework
    # overhead works in 8 GiB on CPU. The 4 GiB default in values.yaml
    # OOMs during weight load.
    resources:
      limits:
        cpu: "2"
        memory: "8Gi"
      requests:
        cpu: "2"
        memory: "8Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 90
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 8

  vllm_llm_teacher:
    enabled: false
    engine: vllm_chat
    type: chat
    # AWQ-INT4 Qwen 3.6 27B (~14 GiB). FP8 was tried first but vLLM
    # 0.20.0 on ROCm/gfx1151 (Strix Halo, RDNA 3.5) cannot run FP8
    # weights at all — both the MoE and dense FP8 paths bottom out in
    # ``torch._scaled_mm`` which requires CUDA SM>=8.9 or ROCm MI300+
    # (CDNA3). gfx1151 is RDNA, not CDNA, so neither Gemma-4-26B-A4B
    # FP8 nor Gemma-4-31B FP8 would load. AWQ-INT4 uses Marlin/Triton
    # INT4 kernels that do work on RDNA. Update this once vLLM ships
    # an FP8 RDNA path or we move to MI300-class hardware.
    model: cyankiwi/Qwen3.6-27B-AWQ-INT4
    device: cpu
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    extraArgs:
      - "--max-model-len"
      - "262144"
    hfTokenSecret: "hf-token"
    replicaCount: 0                # scale-to-zero by default
    service:
      type: NodePort
      port: 8000
      nodePort: 29011
    # NodePort so the optional teacher endpoint is reachable at
    # localhost:29011 via the k3d serverlb without port-forwarding
    # when the operator scales it up.
    resources:
      limits:
        cpu: "8"
        memory: "32Gi"
      requests:
        cpu: "4"
        memory: "20Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 900
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 900
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 24

  # InsightFace Buffalo_L sidecar serving 512-dim ArcFace face
  # embeddings + RetinaFace detection. The cross-modal face-cluster
  # consumer POSTs one keyframe per request, clusters the returned
  # vectors per source_doc_id, and attributes each cluster to the
  # temporally-aligned named Person. CPU-only; the model pack
  # (~210 MiB) downloads on first /embed call.
  face_embed:
    enabled: false
    replicaCount: 1
    image:
      repository: cogniverse/face-embed
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 8000
      nodePort: 29007
    env:
      FACE_EMBED_MODEL: buffalo_l
      FACE_EMBED_CTX_ID: "-1"            # -1 = CPU; set to a GPU index for CUDA
    resources:
      limits:
        cpu: "2"
        memory: "4Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5

# ===========================================
# Messaging Gateway (Telegram/Slack)
# ===========================================
messaging:
  enabled: false
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  mode: polling  # polling for dev, webhook for production
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  env:
    GATEWAY_MODE: "polling"

# ===========================================
# Ingress Configuration
# ===========================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

  hosts:
    - host: cogniverse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501

  tls:
    - secretName: cogniverse-tls
      hosts:
        - cogniverse.example.com

# ===========================================
# Configuration
# ===========================================
config:
  # Tenant configuration
  tenants:
    - id: "default"
      name: "Default Tenant"
    - id: "acme_corp"
      name: "Acme Corporation"
    - id: "globex_inc"
      name: "Globex Inc"

  # Model configuration
  models:
    colpali:
      name: "vidore/colsmol-500m"
      device: "cuda"
    videoprism:
      name: "google/videoprism-base"
      device: "cuda"
    colqwen:
      name: "vidore/colqwen2-v1.0"
      device: "cuda"

  # Documentation-only list of LLM model IDs the deployment expects to
  # have available. Actual model pulling on engine=ollama happens via
  # llm.ollama.models (see init-jobs.yaml). vLLM downloads on first
  # request to /v1/chat/completions.
  llmModels:
    - "gemma3:4b"

# ===========================================
# Init Jobs
# ===========================================
initJobs:
  # Schema deployment job — calls runtime API to deploy data schemas
  schemaDeployment:
    enabled: true
    # Profiles to deploy for each tenant
    profiles:
      - "video_colpali_smol500_mv_frame"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

  # Model pulling job — pulls LLM models via Ollama API
  modelPulling:
    enabled: true
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

# ===========================================
# Security
# ===========================================
# Security contexts are set per-component in templates:
# Vespa: runAsUser 0 (needs root for JVM)
# LLM builtin: runAsUser 0 (needs root for model storage)
# Runtime, Dashboard, Phoenix: runAsUser 1000
securityContext: {}
podSecurityContext: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

  # F6.1 — per-agent egress allow-listing generated from
  # configs/agent_policies/*.yaml by `cogniverse-runtime egress-netpol`.
  # When enabled, kernel-level enforcement (via the cluster CNI) drops
  # any outbound from a cogniverse agent pod that isn't in the agent's
  # declared allow-list. Independent of the legacy `enabled` flag above.
  agentEgress:
    enabled: false

# ===========================================
# Monitoring
# ===========================================
monitoring:
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

  # Grafana dashboards
  dashboards:
    enabled: false
    namespace: monitoring

# ===========================================
# Secrets
# ===========================================
secrets:
  # External secrets operator
  externalSecrets:
    enabled: false
    backend: aws-secrets-manager
    region: us-east-1

  # Manually provided secrets (for development)
  manual:
    enabled: false
    data: {}

# ===========================================
# Backup
# ===========================================
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageClass: ""
  size: "200Gi"

# ===========================================
# Multi-Tenant
# ===========================================
multiTenant:
  enabled: true
  isolation: "namespace"  # namespace or schema

  # Resource quotas per tenant
  quotas:
    cpu: "10"
    memory: "20Gi"
    storage: "100Gi"
    pods: "50"

# ===========================================
# Redis — ingestion queue + status streams
# ===========================================
# Used by the ingest_v2 pipeline. Two roles:
#   1. Queue: producer (POST /ingest in runtime) XADDs to ``ingest:queue``;
#      consumers (ingestor pods) XREADGROUP via a consumer group for at-least-
#      once delivery. Idempotency lookups in ``ingest:done:<sha>``.
#   2. Status: workers XADD per-event to ``ingest:status:<id>`` so the SSE
#      endpoint can replay the full event history for late-connecting clients.
# AOF on so a pod restart doesn't lose in-flight queue entries.
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "10Gi"
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  livenessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 5
    periodSeconds: 10

# ===========================================
# MinIO — S3-compatible object store
# ===========================================
# Default ``s3://`` source for ingestion. Files land in MinIO either by
# direct upload through the runtime or by an external sync agent (Google
# Photos, Drive). The ingestor worker fetches via ``MediaLocator`` which
# already speaks ``s3://``. Webhook-based auto-ingest on bucket events
# is a future follow-up — for now MinIO is just a dumb store.
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: "RELEASE.2025-04-08T15-41-24Z"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  rootUser: "cogniverse"
  # Override in production via secrets. Default is fine for laptop k3d.
  rootPassword: "cogniverse-dev"
  defaultBucket: "cogniverse-ingest"
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
    # MinIO IS the backup destination (default config), so its data MUST
    # outlive the cluster on dev to survive ``k3d cluster delete``. Set
    # to a hostPath that the cluster CLI bind-mounts from the operator's
    # laptop (e.g. ``/host-data/minio``, mapped from
    # ``~/.local/share/cogniverse/minio``). When unset, the chart
    # provisions a PVC via the storageClass above (cloud / multi-node
    # prod path). When set, the PVC is NOT created.
    hostPath: ""
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"
  livenessProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /minio/health/ready
      port: 9000
    initialDelaySeconds: 5
    periodSeconds: 10

# ===========================================
# Ingestor workers — dequeue jobs, run pipeline
# ===========================================
# Same image as the runtime, different entry point
# (``python -m cogniverse_runtime.ingestion_worker.worker``). Multi-replica
# scales horizontally. Each worker joins a Redis consumer group and
# claims one job at a time via XREADGROUP with BLOCK; a job in-flight
# is owned by exactly one worker until it ACKs.
ingestor:
  enabled: true
  replicaCount: 2
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  consumerGroup: "ingestors"
  # Per-tenant in-flight cap. The runtime increments
  # ``ingest:active:<tenant>`` on submit, decrements on completion.
  # POST /ingest returns 429 when this is exceeded.
  perTenantConcurrency: 4
  # Cluster-wide queue depth cap. Once XLEN(ingest:queue) crosses this
  # the runtime returns 429 regardless of per-tenant counts — protects
  # the workers from a stampede.
  queueDepthLimit: 1000
  # Idempotency record TTL (seconds). After this window an identical
  # source_url+profile+tenant submission re-enqueues. Set to 0 to keep
  # idempotency records forever.
  idempotencyTtlSeconds: 604800  # 7 days
  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "2Gi"
  livenessProbe:
    exec:
      command: ["python", "-c", "import sys; sys.exit(0)"]
    initialDelaySeconds: 30
    periodSeconds: 60
  readinessProbe:
    exec:
      command: ["python", "-c", "import sys; sys.exit(0)"]
    initialDelaySeconds: 10
    periodSeconds: 30
  nodeSelector: {}
  tolerations: []
  affinity: {}
