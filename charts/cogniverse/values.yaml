# Cogniverse Helm Chart Values
# Default values for production deployment

# Global settings
global:
  # Image registry
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Development mode: mount host source code into containers.
# Requires k3d cluster created with: --volume "$(pwd):/cogniverse-src@server:0"
# Code changes take effect on pod restart — no Docker rebuild needed.
devMode:
  enabled: false
  hostPath: /cogniverse-src

# ===========================================
# Argo Workflows (optimization scheduling)
# ===========================================
argo:
  enabled: true
  # Subchart values for argo-workflows
  argo-workflows:
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    server:
      # Enabled so the runtime can submit Workflows / CronWorkflows via the
      # Argo REST API (/api/v1/workflows/... and /api/v1/cronworkflows/...).
      # Used by POST /admin/tenant/{id}/jobs (scheduled) and
      # POST /admin/tenant/{id}/optimize (on-demand).
      enabled: true
      # `server` auth means argo-server uses its own ServiceAccount to talk to
      # the Kubernetes API; in-cluster callers (runtime) hit the REST API
      # without presenting a user token.
      authModes:
        - server
  # Optimization schedule configuration
  optimization:
    weekly:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
      annotationThreshold: 50
      improvementThreshold: 5
    daily:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      annotationThreshold: 20
    # Unified agent optimization — runs all DSPy-based optimizers in parallel
    agentOptimization:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
    # Daily gateway threshold tuning
    dailyGateway:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
    # Synthetic data generation for optimizer training sets
    syntheticGeneration:
      enabled: true
      schedule: "0 1 * * 6"  # Saturday 1 AM UTC
    # Audit fix #7 — scheduled distillation runs ``quality_monitor_cli --once``
    # to force a strategy distillation pass independent of the quality-drop
    # threshold check. Without this cron, distillation only fired on
    # degradation, leaving long stable periods without learning.
    scheduledDistillation:
      enabled: true
      schedule: "0 5 * * *"  # Daily 5 AM UTC (after the optimization cycle)
  maintenance:
    backup:
      enabled: true
      schedule: "0 2 * * *"  # Daily 2 AM UTC
    cleanup:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      logRetentionDays: 7
      memoryRetentionDays: 30

# Image configuration
image:
  registry: docker.io
  repository: cogniverse
  pullPolicy: IfNotPresent
  tag: "2.0.0"

# Namespace
namespaceOverride: ""

# Common labels
commonLabels: {}

# Common annotations
commonAnnotations: {}

# ===========================================
# Vespa Configuration
# ===========================================
vespa:
  enabled: true
  image:
    repository: vespaengine/vespa
    tag: "8.668.5"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "8"
      memory: "20Gi"
    requests:
      cpu: "4"
      memory: "8Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
    annotations: {}

  service:
    type: ClusterIP
    ports:
      query: 8080
      config: 19071
      metrics: 19092
    nodePorts:
      query: 28080
    annotations: {}

  env:
    VESPA_CONFIGSERVERS: "vespa"
    VESPA_MEMORY_OPTIONS: "-Xms4g -Xmx16g"

  # Health checks
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Runtime Configuration
# ===========================================
runtime:
  enabled: true
  # Backend selects the image at chart-render time — each torch backend
  # ships its own image (cogniverse/runtime-cpu / -cuda / -rocm) so a
  # CPU-only deployment doesn't pull NVIDIA libraries. Mirrors the
  # whisper engine-per-image pattern. Set ``backend`` to one of
  # ``cpu``/``cuda``/``rocm`` and the template picks the matching entry
  # from ``imagesByBackend``; falls back to ``image`` for back-compat.
  backend: cuda
  image:
    repository: cogniverse/runtime-cuda
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  imagesByBackend:
    cpu:
      repository: cogniverse/runtime-cpu
      tag: dev
      pullPolicy: IfNotPresent
    cuda:
      repository: cogniverse/runtime-cuda
      tag: dev
      pullPolicy: IfNotPresent
    rocm:
      repository: cogniverse/runtime-rocm
      tag: dev
      pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

  service:
    type: ClusterIP
    port: 8000
    nodePort: 28000
    annotations: {}

  env:
    RUNTIME_HOST: "0.0.0.0"
    RUNTIME_PORT: "8000"
    LOG_LEVEL: "INFO"
    WORKERS: "4"

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness: TCP socket only. HTTP /health endpoints queue behind uvicorn
  # workers and can stall under concurrent DSPy/CPU-LLM load. TCP checks the
  # listener is alive — the actual process is fine, work is just slow.
  livenessProbe:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10

  readinessProbe:
    httpGet:
      path: /health/live
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5

  # OpenShell sandbox — enables coding agent code execution in isolated containers.
  #
  # Two deployment modes:
  #
  # 1. HOST mode (default for local dev with k3d):
  #    - Gateway runs on the developer's host via `openshell gateway start`
  #    - Runtime pod reaches it via host.docker.internal:19091
  #    - Host's ~/.config/openshell dir is synced into the pod via k8s Secret/ConfigMap
  #    - `cogniverse up` automates the setup (install CLI, start gateway, sync certs)
  #
  # 2. IN-CLUSTER mode (production):
  #    - Gateway deployed as a Helm subchart inside the cogniverse namespace
  #    - mTLS certs generated by a pre-install Job (openshell-certs-job.yaml)
  #    - Runtime reaches it via openshell.<namespace>.svc.cluster.local:8080
  #    - No host dependency — works on EKS, GKE, AKS, etc.
  sandbox:
    enabled: false
    # Endpoint reachable from inside the runtime pod.
    # - Host mode:       "host.docker.internal:19091"
    # - In-cluster mode: auto-computed as openshell.<ns>.svc.cluster.local:8080
    gatewayEndpoint: "host.docker.internal:19091"
    # Host path to the openshell config directory (host mode only, ignored in in-cluster).
    hostConfigPath: ""
    # In-cluster mode settings
    inCluster:
      enabled: false

  # HuggingFace model cache mounted at /home/cogniverse/.cache. Set
  # `persistent: true` to back it with a PVC so ColPali / GLiNER /
  # SentenceTransformer / Whisper survive pod restarts and helm upgrades.
  # `false` keeps it ephemeral (emptyDir) — re-downloads on every restart,
  # adds 60-120s of cold-start latency for the first request.
  modelCache:
    persistent: true
    size: "20Gi"
    accessMode: "ReadWriteOnce"
    storageClass: ""

  # Quality monitor sidecar — continuous evaluation of all agents
  qualityMonitor:
    enabled: true
    goldenIntervalSeconds: 7200   # 2 hours
    liveIntervalSeconds: 14400    # 4 hours
    liveSampleCount: 20
    # Audit fix #1 — absolute path inside the sidecar container. The dataset
    # is mounted from a ConfigMap built from
    # charts/cogniverse/files/quality-monitor/golden_dataset.json (a copy
    # of data/testset/evaluation/sample_videos_retrieval_queries.json).
    goldenDatasetPath: "/app/data/quality-monitor/golden_dataset.json"
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "250m"
        memory: "512Mi"

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - runtime
            topologyKey: kubernetes.io/hostname

# ===========================================
# OpenShell Subchart (in-cluster sandbox)
# ===========================================
# Only used when runtime.sandbox.inCluster.enabled=true. Keys in this
# section are passed directly to the openshell subchart at charts/openshell.
openshell:
  image:
    repository: ghcr.io/nvidia/openshell/gateway
    tag: "0.0.13"
  service:
    type: ClusterIP
    port: 8080
  server:
    # HMAC secret for gateway↔sandbox SSH handshake. Must be non-empty.
    # Override in values.prod.yaml with a secure per-environment value.
    sshHandshakeSecret: "change-me-in-production-a1b2c3d4e5f6"
    grpcEndpoint: "https://openshell.cogniverse.svc.cluster.local:8080"
    tls:
      certSecretName: openshell-server-tls
      clientCaSecretName: openshell-server-client-ca
      clientTlsSecretName: openshell-client-tls

# ===========================================
# Dashboard Configuration
# ===========================================
dashboard:
  enabled: true
  # Same backend → image selection as runtime (one image per torch
  # variant). Dashboard is Streamlit and never runs inference itself,
  # but the venv transitively imports torch via cogniverse_agents /
  # cogniverse_evaluation, so the wheel choice still matters for image
  # size and ABI compatibility.
  backend: cuda
  image:
    repository: cogniverse/dashboard-cuda
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  imagesByBackend:
    cpu:
      repository: cogniverse/dashboard-cpu
      tag: dev
      pullPolicy: IfNotPresent
    cuda:
      repository: cogniverse/dashboard-cuda
      tag: dev
      pullPolicy: IfNotPresent
    rocm:
      repository: cogniverse/dashboard-rocm
      tag: dev
      pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  service:
    type: ClusterIP
    port: 8501
    nodePort: 28501
    annotations: {}

  env:
    STREAMLIT_SERVER_PORT: "8501"
    STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
    STREAMLIT_SERVER_ENABLE_CORS: "false"
    STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"

  # Health checks
  livenessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Phoenix Configuration
# ===========================================
phoenix:
  enabled: true
  image:
    repository: arizephoenix/phoenix
    tag: "14.2.1"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "50Gi"
    annotations: {}

  service:
    type: ClusterIP
    port: 6006
    nodePort: 26006
    annotations: {}

  env:
    PHOENIX_WORKING_DIR: "/phoenix-data"
    PHOENIX_PORT: "6006"
    PHOENIX_HOST: "0.0.0.0"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# LLM Inference Configuration
# ===========================================
# One deployment-time switch picks both the in-cluster pod (if any) and
# the DSPy/litellm prefix the runtime applies to ``llm.model``:
#
#   engine: ollama   → deploys ollama/ollama, runtime uses ``ollama_chat/<model>``
#   engine: vllm     → deploys vllm-openai (CPU/GPU per ``device``),
#                      runtime uses ``hosted_vllm/<model>``
#   engine: external → no pod; runtime points at ``external.url``
#                      and uses ``openai/<model>`` (any OAI-compatible host)
#
# Both Ollama (≥0.3) and vLLM expose ``/v1/chat/completions``, so the
# rest of the runtime (mem0, agent dispatch) is engine-agnostic.
llm:
  engine: ollama                # ollama | vllm | external
  model: gemma3:4b              # bare model id; helper prepends DSPy prefix
  device: cpu                   # cpu | cuda | rocm | mps (vllm only)
  gpuCount: 1
  replicaCount: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # ---------------------------------------------------------------
  # engine: ollama — built-in Ollama pod (StatefulSet + PVC)
  # ---------------------------------------------------------------
  ollama:
    image:
      repository: ollama/ollama
      tag: "0.20.5"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 11434
      annotations: {}
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    env:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Keep models resident indefinitely. Unloading a ~7GB model and
      # reloading it on the next request takes 60-120s and causes spurious
      # test timeouts.
      OLLAMA_KEEP_ALIVE: "-1"
    # Models pulled by the post-install init job (only when engine=ollama).
    # vLLM downloads on first request via HF cache instead.
    # Embedding model intentionally absent: DenseOn is served by the
    # ``denseon`` sidecar pod (deploy/pylate in mode=dense), not Ollama.
    models:
      - "gemma3:4b"
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "8Gi"
    livenessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3

  # ---------------------------------------------------------------
  # engine: vllm — vLLM-OpenAI Deployment (one pod, one model)
  # ---------------------------------------------------------------
  # On CPU laptops vLLM is overpowered for chat — prefer engine=ollama.
  # Use vllm in production on CUDA / ROCm GPUs (see values.cuda.yaml,
  # values.rocm.yaml). Both Ollama and vLLM expose /v1/chat/completions
  # so the runtime path is identical.
  vllm:
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest
      pullPolicy: IfNotPresent
    # Per-device image override; chart picks ``imagesByDevice[device]`` if
    # present, else falls back to ``image`` above. Set in values.cuda.yaml /
    # values.rocm.yaml for GPU images. Keys: cpu, cuda, rocm, mps.
    imagesByDevice: {}
    service:
      type: ClusterIP
      port: 8000
      annotations: {}
    # HuggingFace cache PVC so model weights survive pod restarts.
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    dtype: float16                 # float16 on CUDA, bfloat16 on newer GPUs
    extraArgs:
      - "--max-model-len"
      - "8192"
    resources:
      limits:
        cpu: "8"
        memory: "32Gi"
      requests:
        cpu: "2"
        memory: "8Gi"
    # Model load on a fresh PVC takes minutes for 7B-class checkpoints;
    # generous start-period prevents liveness flapping during cold start.
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 300
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 10

  # ---------------------------------------------------------------
  # engine: external — point at a host-side or third-party endpoint
  # ---------------------------------------------------------------
  external:
    url: ""                       # e.g. http://host.docker.internal:11434

# ===========================================
# Inference Services (embedding models)
# ===========================================
# Each entry under ``inference`` deploys one pod serving one model. Keys are
# logical tags the deployer chooses; profiles reference a service by its key
# via ``inference_service`` in the profile. No magic — rename freely.
#
# Per-entry fields:
#   - engine: "vllm" | "pylate" — picks the container image
#   - model:  HF model id the pod serves
#   - type:   "multi_vector" | "single_vector" — retrieval style (metadata for
#             the runtime; does not affect the pod itself)
#
# The runtime receives a single ``INFERENCE_SERVICE_URLS`` env var containing
# a JSON map of {key → url} for every enabled service. Profiles route per
# request by looking up their ``inference_service`` in that map.
inference:
  # ColPali / ColIdefics3 image multi-vector embeddings served by the
  # custom FastAPI sidecar in deploy/colpali (cogniverse/colpali:dev).
  # Uses colpali-engine to load vidore/colsmol-500m end-to-end (model +
  # processor + LoRA adapter merge) — Infinity / vLLM both fail this on
  # peft/target_modules drift. Profiles route here via
  # ``inference_service: "colpali_infinity"`` (the key is kept for
  # backward compatibility; engine switched to colpali_native).
  colpali_infinity:
    enabled: false
    engine: colpali_native
    model: vidore/colsmol-500m
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm | mps
    # Default image (used when ``imagesByDevice.<device>`` is unset).
    image:
      repository: cogniverse/colpali
      tag: "dev"
      pullPolicy: IfNotPresent
    # Optional per-device image override. The chart picks
    # ``imagesByDevice[device]`` if present, else falls back to ``image``
    # above. Set this in values.cuda.yaml / values.rocm.yaml after
    # building the corresponding base images. Keys: cpu, cuda, rocm, mps.
    imagesByDevice: {}
    # GPU count when device is cuda or rocm. Ignored on cpu/mps. The chart
    # auto-injects ``nvidia.com/gpu`` or ``amd.com/gpu`` resource limits.
    gpuCount: 1
    # Extra nodeSelector / tolerations merged on top of the GPU defaults
    # the chart injects when device is cuda/rocm. Use to pin to a
    # specific node pool, instance type, etc.
    nodeSelector: {}
    tolerations: []
    extraArgs: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 7997
      nodePort: 29001
    resources:
      limits:
        cpu: "4"
        memory: "6Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 7997
      initialDelaySeconds: 240
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 7997
      initialDelaySeconds: 120
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # ColQwen multimodal multi-vector embeddings served by the same
  # cogniverse/colpali sidecar (colpali-engine supports ColQwen2 / Omni
  # variants alongside ColPali / ColIdefics3). Separate pod because one
  # FastAPI instance serves a single model. Used by profiles with
  # ``inference_service: "colqwen_infinity"`` (video_colqwen_omni_mv_chunk_30s).
  # Off by default — ColQwen-Omni is large (~5-7Gi RSS) and the laptop
  # cluster usually doesn't need it.
  colqwen_infinity:
    enabled: false
    engine: colpali_native
    model: vidore/colqwen-omni-v0.1
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm | mps
    image:
      repository: cogniverse/colpali
      tag: "dev"
      pullPolicy: IfNotPresent
    imagesByDevice: {}             # see colpali_infinity for shape
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    extraArgs: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 7997
      nodePort: 29004
    resources:
      limits:
        cpu: "4"
        memory: "8Gi"
      requests:
        cpu: "1"
        memory: "3Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 7997
      initialDelaySeconds: 240
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 7997
      initialDelaySeconds: 120
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # ColBERT-family text multi-vector retrieval served by a pylate FastAPI
  # sidecar (deploy/pylate). Used by profiles with
  # ``inference_service: "colbert_pylate"`` (e.g., document_text_semantic,
  # lateon_mv). Swap model via ``model:`` — same pylate pod serves any
  # ColBERT-family checkpoint. If you want a second ColBERT pod (e.g. for
  # a different model in parallel), add another entry with a distinct key.
  colbert_pylate:
    enabled: true
    engine: pylate
    model: lightonai/LateOn
    type: multi_vector
    # Top-level device drives GPU resources / nodeSelector. The pylate
    # block below carries its own ``device`` env var which is kept in
    # sync with this top-level field by the chart template.
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29002
    # vLLM-specific (used when engine=vllm)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "8192"
    # pylate-specific (used when engine=pylate)
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}           # see colpali_infinity for shape
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # Code-search ColBERT-family multi-vector retrieval (LateOn-Code-edge).
  # Deployed in parallel with ``colbert_pylate`` when enabled — independent
  # pods, independent models, same pylate contract. Profiles route here
  # via ``inference_service: "code_colbert_pylate"``.
  code_colbert_pylate:
    enabled: false
    engine: pylate
    model: lightonai/LateOn-Code-edge
    type: multi_vector
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29004
    # vLLM-specific (unused by default since default engine is pylate)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs: []
    # pylate-specific
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

  # Dense single-vector embedding service: the SAME deploy/pylate
  # sidecar image, run in ``mode: dense`` so it loads via
  # SentenceTransformer and exposes POST /v1/embeddings
  # (OpenAI-compatible). Used by Mem0 + SemanticEmbedder + the
  # job-executor delivery router. Profiles route here via
  # ``inference_service: "denseon"``. dense_vllm (below) is the path
  # for vLLM-supported dense models like EmbeddingGemma.
  denseon:
    enabled: true
    engine: pylate
    mode: dense                    # colbert | dense — picks /pooling vs /v1/embeddings
    model: lightonai/DenseOn       # ModernBERT-base, 768-dim, CLS pooling, 512 ctx
    type: single_vector
    device: cpu                    # cpu | cuda | rocm | mps
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29006
    # vLLM-specific (unused — engine is pylate)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    dtype: float32
    extraArgs: []
    # pylate-specific (the actual engine path)
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      imagesByDevice: {}
      device: cpu                  # synced with top-level device by template
      containerPort: 8000
    resources:
      limits:
        cpu: "2"
        memory: "3Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 45
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

  # Dedicated single-vector dense-embedding service (vLLM + EmbeddingGemma
  # or similar). Splits embedding traffic off the shared Ollama pod
  # (Ollama serializes requests per model, so embedding calls queue
  # behind LLM token streams). Profiles route here via
  # ``inference_service: "dense_vllm"``.
  dense_vllm:
    enabled: false
    engine: vllm
    type: single_vector
    device: cpu                    # cpu | cuda | rocm
    gpuCount: 1
    nodeSelector: {}
    tolerations: []
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    imagesByDevice: {}
    model: google/embeddinggemma-300m
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "2048"
    # EmbeddingGemma is gated on HuggingFace. Create a k8s Secret with the
    # token (key: HF_TOKEN) and set hfTokenSecret to its name; the chart
    # wires it into the pod env as HF_TOKEN. Leave empty for ungated models.
    hfTokenSecret: "hf-token"
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29003
    # requests == limits gives Guaranteed QoS so the scheduler reserves
    # headroom and the pod isn't evicted under node memory pressure.
    resources:
      limits:
        cpu: "4"
        memory: "6Gi"
      requests:
        cpu: "4"
        memory: "6Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 180
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10

# ===========================================
# Whisper ASR sidecar (deploy/whisper)
# ===========================================
# Whisper transcription was previously loaded in-process inside the
# runtime pod (AudioTranscriptionStrategy). Externalizing into a
# dedicated pod keeps runtime light and lets ASR scale independently.
#
# Engine selects the image at chart-render time. Each engine ships its
# own image and its own server.py specialisation:
#   - faster-whisper: CTranslate2 backend; CPU and CUDA.
#                     Image: cogniverse/whisper-fw (deploy/whisper/Dockerfile).
#   - whisperx:       PyTorch-based; required on AMD ROCm.
#                     Image: cogniverse/whisper-wx (Dockerfile.wx,
#                     not yet authored — selecting this engine before
#                     the image lands will fail at image pull).
#   - whisper-cpp:    whisper.cpp; lightweight, useful for Apple Silicon.
#                     Image: cogniverse/whisper-cpp (Dockerfile.cpp,
#                     not yet authored).
#
# Profiles route audio transcription through the sidecar by setting
# ``inference_services.transcription: "whisper"`` at profile level —
# StrategyFactory injects it into AudioTranscriptionStrategy and
# ProcessorManager substitutes the URL.
whisper:
  enabled: false                  # flip to true to deploy the pod
  # Engine selects the image at chart-render time (not via an env var
  # the pod reads). Each engine ships its own image with a matching
  # server.py specialisation; setting an engine whose Dockerfile hasn't
  # landed yet → ImagePullBackOff at deploy time, which is the correct
  # signal. Sidecar Dockerfiles live alongside ``deploy/whisper/`` and
  # the chart's image-by-engine map below points each one at its tag.
  engine: faster-whisper          # faster-whisper | whisperx | whisper-cpp
  model: base                     # base | small | medium | large-v3
  device: cpu                     # cpu | cuda | rocm | mps
  gpuCount: 1
  nodeSelector: {}
  tolerations: []
  image:
    repository: cogniverse/whisper-fw
    tag: dev
    pullPolicy: IfNotPresent
  # Per-engine image overrides — default to the canonical tag scheme.
  # Keys MUST match the values that ``engine`` accepts.
  imagesByEngine:
    faster-whisper:
      repository: cogniverse/whisper-fw
      tag: dev
      pullPolicy: IfNotPresent
    whisperx:
      repository: cogniverse/whisper-wx
      tag: dev
      pullPolicy: IfNotPresent
    whisper-cpp:
      repository: cogniverse/whisper-cpp
      tag: dev
      pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 7998
    nodePort: 29005
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"
  livenessProbe:
    httpGet:
      path: /health
      port: 7998
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 7998
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5

# ===========================================
# Messaging Gateway (Telegram/Slack)
# ===========================================
messaging:
  enabled: false
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  mode: polling  # polling for dev, webhook for production
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  env:
    GATEWAY_MODE: "polling"

# ===========================================
# Ingress Configuration
# ===========================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

  hosts:
    - host: cogniverse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501

  tls:
    - secretName: cogniverse-tls
      hosts:
        - cogniverse.example.com

# ===========================================
# Configuration
# ===========================================
config:
  # Tenant configuration
  tenants:
    - id: "default"
      name: "Default Tenant"
    - id: "acme_corp"
      name: "Acme Corporation"
    - id: "globex_inc"
      name: "Globex Inc"

  # Model configuration
  models:
    colpali:
      name: "vidore/colsmol-500m"
      device: "cuda"
    videoprism:
      name: "google/videoprism-base"
      device: "cuda"
    colqwen:
      name: "colqwen/colqwen2-omni"
      device: "cuda"

  # Documentation-only list of LLM model IDs the deployment expects to
  # have available. Actual model pulling on engine=ollama happens via
  # llm.ollama.models (see init-jobs.yaml). vLLM downloads on first
  # request to /v1/chat/completions.
  llmModels:
    - "gemma3:4b"

# ===========================================
# Init Jobs
# ===========================================
initJobs:
  # Schema deployment job — calls runtime API to deploy data schemas
  schemaDeployment:
    enabled: true
    # Profiles to deploy for each tenant
    profiles:
      - "video_colpali_smol500_mv_frame"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

  # Model pulling job — pulls LLM models via Ollama API
  modelPulling:
    enabled: true
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

# ===========================================
# Security
# ===========================================
# Security contexts are set per-component in templates:
# Vespa: runAsUser 0 (needs root for JVM)
# LLM builtin: runAsUser 0 (needs root for model storage)
# Runtime, Dashboard, Phoenix: runAsUser 1000
securityContext: {}
podSecurityContext: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

# ===========================================
# Monitoring
# ===========================================
monitoring:
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

  # Grafana dashboards
  dashboards:
    enabled: false
    namespace: monitoring

# ===========================================
# Secrets
# ===========================================
secrets:
  # External secrets operator
  externalSecrets:
    enabled: false
    backend: aws-secrets-manager
    region: us-east-1

  # Manually provided secrets (for development)
  manual:
    enabled: false
    data: {}

# ===========================================
# Backup
# ===========================================
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageClass: ""
  size: "200Gi"

# ===========================================
# Multi-Tenant
# ===========================================
multiTenant:
  enabled: true
  isolation: "namespace"  # namespace or schema

  # Resource quotas per tenant
  quotas:
    cpu: "10"
    memory: "20Gi"
    storage: "100Gi"
    pods: "50"

# ===========================================
# Redis — ingestion queue + status streams
# ===========================================
# Used by the ingest_v2 pipeline. Two roles:
#   1. Queue: producer (POST /ingest in runtime) XADDs to ``ingest:queue``;
#      consumers (ingestor pods) XREADGROUP via a consumer group for at-least-
#      once delivery. Idempotency lookups in ``ingest:done:<sha>``.
#   2. Status: workers XADD per-event to ``ingest:status:<id>`` so the SSE
#      endpoint can replay the full event history for late-connecting clients.
# AOF on so a pod restart doesn't lose in-flight queue entries.
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "10Gi"
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  livenessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 5
    periodSeconds: 10

# ===========================================
# MinIO — S3-compatible object store
# ===========================================
# Default ``s3://`` source for ingestion. Files land in MinIO either by
# direct upload through the runtime or by an external sync agent (Google
# Photos, Drive). The ingestor worker fetches via ``MediaLocator`` which
# already speaks ``s3://``. Webhook-based auto-ingest on bucket events is
# Phase 5e — for now MinIO is just a dumb store.
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: "RELEASE.2025-04-08T15-41-24Z"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  rootUser: "cogniverse"
  # Override in production via secrets. Default is fine for laptop k3d.
  rootPassword: "cogniverse-dev"
  defaultBucket: "cogniverse-ingest"
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"
  livenessProbe:
    httpGet:
      path: /minio/health/live
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /minio/health/ready
      port: 9000
    initialDelaySeconds: 5
    periodSeconds: 10

# ===========================================
# Ingestor workers — dequeue jobs, run pipeline
# ===========================================
# Same image as the runtime, different entry point
# (``python -m cogniverse_runtime.ingestion_v2.worker``). Multi-replica
# scales horizontally. Each worker joins a Redis consumer group and
# claims one job at a time via XREADGROUP with BLOCK; a job in-flight
# is owned by exactly one worker until it ACKs.
ingestor:
  enabled: true
  replicaCount: 2
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  consumerGroup: "ingestors"
  # Per-tenant in-flight cap. The runtime increments
  # ``ingest:active:<tenant>`` on submit, decrements on completion.
  # POST /ingest returns 429 when this is exceeded.
  perTenantConcurrency: 4
  # Cluster-wide queue depth cap. Once XLEN(ingest:queue) crosses this
  # the runtime returns 429 regardless of per-tenant counts — protects
  # the workers from a stampede.
  queueDepthLimit: 1000
  # Idempotency record TTL (seconds). After this window an identical
  # source_url+profile+tenant submission re-enqueues. Set to 0 to keep
  # idempotency records forever.
  idempotencyTtlSeconds: 604800  # 7 days
  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "2Gi"
  livenessProbe:
    exec:
      command: ["python", "-c", "import sys; sys.exit(0)"]
    initialDelaySeconds: 30
    periodSeconds: 60
  readinessProbe:
    exec:
      command: ["python", "-c", "import sys; sys.exit(0)"]
    initialDelaySeconds: 10
    periodSeconds: 30
  nodeSelector: {}
  tolerations: []
  affinity: {}
