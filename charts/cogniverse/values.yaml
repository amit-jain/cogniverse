# Cogniverse Helm Chart Values
# Default values for production deployment

# Global settings
global:
  # Image registry
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Development mode: mount host source code into containers.
# Requires k3d cluster created with: --volume "$(pwd):/cogniverse-src@server:0"
# Code changes take effect on pod restart — no Docker rebuild needed.
devMode:
  enabled: false
  hostPath: /cogniverse-src

# ===========================================
# Argo Workflows (optimization scheduling)
# ===========================================
argo:
  enabled: true
  # Subchart values for argo-workflows
  argo-workflows:
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    server:
      enabled: false  # No UI server needed — dashboard submits via CLI
  # Optimization schedule configuration
  optimization:
    weekly:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
      annotationThreshold: 50
      improvementThreshold: 5
    daily:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      annotationThreshold: 20
  maintenance:
    backup:
      enabled: true
      schedule: "0 2 * * *"  # Daily 2 AM UTC
    cleanup:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      logRetentionDays: 7
      memoryRetentionDays: 30

# Image configuration
image:
  registry: docker.io
  repository: cogniverse
  pullPolicy: IfNotPresent
  tag: "2.0.0"

# Namespace
namespaceOverride: ""

# Common labels
commonLabels: {}

# Common annotations
commonAnnotations: {}

# ===========================================
# Vespa Configuration
# ===========================================
vespa:
  enabled: true
  image:
    repository: vespaengine/vespa
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "8"
      memory: "20Gi"
    requests:
      cpu: "4"
      memory: "8Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
    annotations: {}

  service:
    type: ClusterIP
    ports:
      query: 8080
      config: 19071
      metrics: 19092
    nodePorts:
      query: 28080
    annotations: {}

  env:
    VESPA_CONFIGSERVERS: "vespa"
    VESPA_MEMORY_OPTIONS: "-Xms4g -Xmx16g"

  # Health checks
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Runtime Configuration
# ===========================================
runtime:
  enabled: true
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

  service:
    type: ClusterIP
    port: 8000
    nodePort: 28000
    annotations: {}

  env:
    RUNTIME_HOST: "0.0.0.0"
    RUNTIME_PORT: "8000"
    LOG_LEVEL: "INFO"
    WORKERS: "4"

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - runtime
            topologyKey: kubernetes.io/hostname

# ===========================================
# Dashboard Configuration
# ===========================================
dashboard:
  enabled: true
  image:
    repository: cogniverse/dashboard
    tag: "2.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  service:
    type: ClusterIP
    port: 8501
    nodePort: 28501
    annotations: {}

  env:
    STREAMLIT_SERVER_PORT: "8501"
    STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
    STREAMLIT_SERVER_ENABLE_CORS: "false"
    STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"

  # Health checks
  livenessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Phoenix Configuration
# ===========================================
phoenix:
  enabled: true
  image:
    repository: arizephoenix/phoenix
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "50Gi"
    annotations: {}

  service:
    type: ClusterIP
    port: 6006
    nodePort: 26006
    annotations: {}

  env:
    PHOENIX_WORKING_DIR: "/phoenix-data"
    PHOENIX_PORT: "6006"
    PHOENIX_HOST: "0.0.0.0"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# LLM Inference Configuration
# ===========================================
llm:
  # Deploy builtin Ollama pod
  builtin:
    enabled: true
    image:
      repository: ollama/ollama
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 1
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "8Gi"
    gpu:
      enabled: false  # true for enterprise with NVIDIA GPUs
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    service:
      type: ClusterIP
      port: 11434
      annotations: {}
    env:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
    models:
      - "qwen3:4b"
    livenessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
  # External LLM endpoint (any URL — Ollama, vLLM, etc.)
  external:
    enabled: false
    url: ""

# ===========================================
# vLLM Inference Service (embedding models)
# ===========================================
# Serves ColPali and ColBERT via /pooling endpoint for per-token embeddings.
# Each model runs as a separate vLLM instance (vLLM = one model per process).
inference:
  colpali:
    enabled: false
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    model: vidore/colsmol-500m
    dtype: float32
    extraArgs: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29001
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  colbert:
    enabled: true
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    model: lightonai/Reason-ModernColBERT
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "8192"
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29002
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

# ===========================================
# Ingress Configuration
# ===========================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

  hosts:
    - host: cogniverse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501

  tls:
    - secretName: cogniverse-tls
      hosts:
        - cogniverse.example.com

# ===========================================
# Configuration
# ===========================================
config:
  # Tenant configuration
  tenants:
    - id: "default"
      name: "Default Tenant"
    - id: "acme_corp"
      name: "Acme Corporation"
    - id: "globex_inc"
      name: "Globex Inc"

  # Model configuration
  models:
    colpali:
      name: "vidore/colsmol-500m"
      device: "cuda"
    videoprism:
      name: "google/videoprism-base"
      device: "cuda"
    colqwen:
      name: "colqwen/colqwen2-omni"
      device: "cuda"

  # LLM models to pull (references llm.builtin.models)
  llmModels:
    - "qwen3:4b"

# ===========================================
# Init Jobs
# ===========================================
initJobs:
  # Schema deployment job — calls runtime API to deploy data schemas
  schemaDeployment:
    enabled: true
    # Profiles to deploy for each tenant
    profiles:
      - "video_colpali_smol500_mv_frame"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

  # Model pulling job — pulls LLM models via Ollama API
  modelPulling:
    enabled: true
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

# ===========================================
# Security
# ===========================================
# Security contexts are set per-component in templates:
# Vespa: runAsUser 0 (needs root for JVM)
# LLM builtin: runAsUser 0 (needs root for model storage)
# Runtime, Dashboard, Phoenix: runAsUser 1000
securityContext: {}
podSecurityContext: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

# ===========================================
# Monitoring
# ===========================================
monitoring:
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

  # Grafana dashboards
  dashboards:
    enabled: false
    namespace: monitoring

# ===========================================
# Secrets
# ===========================================
secrets:
  # External secrets operator
  externalSecrets:
    enabled: false
    backend: aws-secrets-manager
    region: us-east-1

  # Manually provided secrets (for development)
  manual:
    enabled: false
    data: {}

# ===========================================
# Backup
# ===========================================
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageClass: ""
  size: "200Gi"

# ===========================================
# Multi-Tenant
# ===========================================
multiTenant:
  enabled: true
  isolation: "namespace"  # namespace or schema

  # Resource quotas per tenant
  quotas:
    cpu: "10"
    memory: "20Gi"
    storage: "100Gi"
    pods: "50"
