# Cogniverse Helm Chart Values
# Default values for production deployment

# Global settings
global:
  # Image registry
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Development mode: mount host source code into containers.
# Requires k3d cluster created with: --volume "$(pwd):/cogniverse-src@server:0"
# Code changes take effect on pod restart — no Docker rebuild needed.
devMode:
  enabled: false
  hostPath: /cogniverse-src

# ===========================================
# Argo Workflows (optimization scheduling)
# ===========================================
argo:
  enabled: true
  # Subchart values for argo-workflows
  argo-workflows:
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    server:
      enabled: false  # No UI server needed — dashboard submits via CLI
  # Optimization schedule configuration
  optimization:
    weekly:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
      annotationThreshold: 50
      improvementThreshold: 5
    daily:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      annotationThreshold: 20
    # Unified agent optimization — runs all DSPy-based optimizers in parallel
    agentOptimization:
      enabled: true
      schedule: "0 3 * * 0"  # Sunday 3 AM UTC
    # Daily gateway threshold tuning
    dailyGateway:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
    # Synthetic data generation for optimizer training sets
    syntheticGeneration:
      enabled: true
      schedule: "0 1 * * 6"  # Saturday 1 AM UTC
    # Audit fix #7 — scheduled distillation runs ``quality_monitor_cli --once``
    # to force a strategy distillation pass independent of the quality-drop
    # threshold check. Without this cron, distillation only fired on
    # degradation, leaving long stable periods without learning.
    scheduledDistillation:
      enabled: true
      schedule: "0 5 * * *"  # Daily 5 AM UTC (after the optimization cycle)
  maintenance:
    backup:
      enabled: true
      schedule: "0 2 * * *"  # Daily 2 AM UTC
    cleanup:
      enabled: true
      schedule: "0 4 * * *"  # Daily 4 AM UTC
      logRetentionDays: 7
      memoryRetentionDays: 30

# Image configuration
image:
  registry: docker.io
  repository: cogniverse
  pullPolicy: IfNotPresent
  tag: "2.0.0"

# Namespace
namespaceOverride: ""

# Common labels
commonLabels: {}

# Common annotations
commonAnnotations: {}

# ===========================================
# Vespa Configuration
# ===========================================
vespa:
  enabled: true
  image:
    repository: vespaengine/vespa
    tag: "8.668.5"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "8"
      memory: "20Gi"
    requests:
      cpu: "4"
      memory: "8Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "100Gi"
    annotations: {}

  service:
    type: ClusterIP
    ports:
      query: 8080
      config: 19071
      metrics: 19092
    nodePorts:
      query: 28080
    annotations: {}

  env:
    VESPA_CONFIGSERVERS: "vespa"
    VESPA_MEMORY_OPTIONS: "-Xms4g -Xmx16g"

  # Health checks
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Runtime Configuration
# ===========================================
runtime:
  enabled: true
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

  service:
    type: ClusterIP
    port: 8000
    nodePort: 28000
    annotations: {}

  env:
    RUNTIME_HOST: "0.0.0.0"
    RUNTIME_PORT: "8000"
    LOG_LEVEL: "INFO"
    WORKERS: "4"

  # Autoscaling
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness: TCP socket only. HTTP /health endpoints queue behind uvicorn
  # workers and can stall under concurrent DSPy/CPU-LLM load. TCP checks the
  # listener is alive — the actual process is fine, work is just slow.
  livenessProbe:
    tcpSocket:
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10

  readinessProbe:
    httpGet:
      path: /health/live
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 5

  # OpenShell sandbox — enables coding agent code execution in isolated containers.
  #
  # Two deployment modes:
  #
  # 1. HOST mode (default for local dev with k3d):
  #    - Gateway runs on the developer's host via `openshell gateway start`
  #    - Runtime pod reaches it via host.docker.internal:19091
  #    - Host's ~/.config/openshell dir is synced into the pod via k8s Secret/ConfigMap
  #    - `cogniverse up` automates the setup (install CLI, start gateway, sync certs)
  #
  # 2. IN-CLUSTER mode (production):
  #    - Gateway deployed as a Helm subchart inside the cogniverse namespace
  #    - mTLS certs generated by a pre-install Job (openshell-certs-job.yaml)
  #    - Runtime reaches it via openshell.<namespace>.svc.cluster.local:8080
  #    - No host dependency — works on EKS, GKE, AKS, etc.
  sandbox:
    enabled: false
    # Endpoint reachable from inside the runtime pod.
    # - Host mode:       "host.docker.internal:19091"
    # - In-cluster mode: auto-computed as openshell.<ns>.svc.cluster.local:8080
    gatewayEndpoint: "host.docker.internal:19091"
    # Host path to the openshell config directory (host mode only, ignored in in-cluster).
    hostConfigPath: ""
    # In-cluster mode settings
    inCluster:
      enabled: false

  # HuggingFace model cache mounted at /home/cogniverse/.cache. Set
  # `persistent: true` to back it with a PVC so ColPali / GLiNER /
  # SentenceTransformer / Whisper survive pod restarts and helm upgrades.
  # `false` keeps it ephemeral (emptyDir) — re-downloads on every restart,
  # adds 60-120s of cold-start latency for the first request.
  modelCache:
    persistent: true
    size: "20Gi"
    accessMode: "ReadWriteOnce"
    storageClass: ""

  # Quality monitor sidecar — continuous evaluation of all agents
  qualityMonitor:
    enabled: true
    goldenIntervalSeconds: 7200   # 2 hours
    liveIntervalSeconds: 14400    # 4 hours
    liveSampleCount: 20
    # Audit fix #1 — absolute path inside the sidecar container. The dataset
    # is mounted from a ConfigMap built from
    # charts/cogniverse/files/quality-monitor/golden_dataset.json (a copy
    # of data/testset/evaluation/sample_videos_retrieval_queries.json).
    goldenDatasetPath: "/app/data/quality-monitor/golden_dataset.json"
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "250m"
        memory: "512Mi"

  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - runtime
            topologyKey: kubernetes.io/hostname

# ===========================================
# OpenShell Subchart (in-cluster sandbox)
# ===========================================
# Only used when runtime.sandbox.inCluster.enabled=true. Keys in this
# section are passed directly to the openshell subchart at charts/openshell.
openshell:
  image:
    repository: ghcr.io/nvidia/openshell/gateway
    tag: "0.0.13"
  service:
    type: ClusterIP
    port: 8080
  server:
    # HMAC secret for gateway↔sandbox SSH handshake. Must be non-empty.
    # Override in values.prod.yaml with a secure per-environment value.
    sshHandshakeSecret: "change-me-in-production-a1b2c3d4e5f6"
    grpcEndpoint: "https://openshell.cogniverse.svc.cluster.local:8080"
    tls:
      certSecretName: openshell-server-tls
      clientCaSecretName: openshell-server-client-ca
      clientTlsSecretName: openshell-client-tls

# ===========================================
# Dashboard Configuration
# ===========================================
dashboard:
  enabled: true
  image:
    repository: cogniverse/dashboard
    tag: "2.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  service:
    type: ClusterIP
    port: 8501
    nodePort: 28501
    annotations: {}

  env:
    STREAMLIT_SERVER_PORT: "8501"
    STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
    STREAMLIT_SERVER_ENABLE_CORS: "false"
    STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"

  # Health checks
  livenessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /_stcore/health
      port: 8501
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# Phoenix Configuration
# ===========================================
phoenix:
  enabled: true
  image:
    repository: arizephoenix/phoenix
    tag: "14.2.1"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "1"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: "50Gi"
    annotations: {}

  service:
    type: ClusterIP
    port: 6006
    nodePort: 26006
    annotations: {}

  env:
    PHOENIX_WORKING_DIR: "/phoenix-data"
    PHOENIX_PORT: "6006"
    PHOENIX_HOST: "0.0.0.0"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 6006
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ===========================================
# LLM Inference Configuration
# ===========================================
llm:
  # Deploy builtin Ollama pod
  builtin:
    enabled: true
    image:
      repository: ollama/ollama
      tag: "0.20.5"
      pullPolicy: IfNotPresent
    replicaCount: 1
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "8Gi"
    gpu:
      enabled: false  # true for enterprise with NVIDIA GPUs
    persistence:
      enabled: true
      storageClass: ""
      accessMode: ReadWriteOnce
      size: "100Gi"
      annotations: {}
    service:
      type: ClusterIP
      port: 11434
      annotations: {}
    env:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Keep models resident indefinitely. Unloading a ~7GB model and
      # reloading it on the next request takes 60-120s and causes spurious
      # test timeouts.
      OLLAMA_KEEP_ALIVE: "-1"
    models:
      - "gemma4:e2b"
      - "nomic-embed-text"
    livenessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /api/tags
        port: 11434
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
  # External LLM endpoint (any URL — Ollama, vLLM, etc.)
  external:
    enabled: false
    url: ""

# ===========================================
# Inference Services (embedding models)
# ===========================================
# Each entry under ``inference`` deploys one pod serving one model. Keys are
# logical tags the deployer chooses; profiles reference a service by its key
# via ``inference_service`` in the profile. No magic — rename freely.
#
# Per-entry fields:
#   - engine: "vllm" | "pylate" — picks the container image
#   - model:  HF model id the pod serves
#   - type:   "multi_vector" | "single_vector" — retrieval style (metadata for
#             the runtime; does not affect the pod itself)
#
# The runtime receives a single ``INFERENCE_SERVICE_URLS`` env var containing
# a JSON map of {key → url} for every enabled service. Profiles route per
# request by looking up their ``inference_service`` in that map.
inference:
  image:
    enabled: false
    engine: vllm
    model: vidore/colsmol-500m
    type: multi_vector
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    dtype: float32
    extraArgs: []
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29001
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # General-purpose multi-vector text retrieval. Default target for profiles
  # with ``inference_service: "general"`` (e.g., document_text_semantic,
  # lateon_mv). Swap between vLLM + Reason-ModernColBERT and pylate + LateOn
  # by flipping engine + model.
  general:
    enabled: true
    engine: pylate
    model: lightonai/LateOn
    type: multi_vector
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29002
    # vLLM-specific (used when engine=vllm)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "8192"
    # pylate-specific (used when engine=pylate)
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      device: cpu
      containerPort: 8000
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "2Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5

  # Code-search multi-vector text retrieval. Deployed in parallel with
  # ``general`` when enabled — independent pods, different models.
  # Profiles route here via ``inference_service: "code"``.
  code:
    enabled: false
    engine: pylate
    model: lightonai/LateOn-Code-edge
    type: multi_vector
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29004
    # vLLM-specific (unused by default since default engine is pylate)
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    dtype: float32
    extraArgs: []
    # pylate-specific
    pylate:
      image:
        repository: cogniverse/pylate
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      device: cpu
      containerPort: 8000
    resources:
      limits:
        cpu: "2"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5

  # Dedicated single-vector dense-embedding service. Splits embedding traffic
  # off the shared Ollama pod (Ollama serializes requests per model, so
  # embedding calls queue behind LLM token streams).
  embed:
    enabled: false
    engine: vllm
    type: single_vector
    image:
      repository: vllm/vllm-openai-cpu
      tag: latest-arm64
      pullPolicy: IfNotPresent
    model: google/embeddinggemma-300m
    dtype: float32
    extraArgs:
      - "--max-model-len"
      - "2048"
    # EmbeddingGemma is gated on HuggingFace. Create a k8s Secret with the
    # token (key: HF_TOKEN) and set hfTokenSecret to its name; the chart
    # wires it into the pod env as HF_TOKEN. Leave empty for ungated models.
    hfTokenSecret: "hf-token"
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: 29003
    # nomic-embed-text-v1.5 (137M) uses ~1.5-2 GiB under load; a bump to
    # embedding-gemma-300m pushed peak to 4.1 GiB in our benchmark, so
    # keep 6 GiB headroom by default so the pod doesn't OOM when swapped.
    # requests == limits gives Guaranteed QoS so the scheduler reserves
    # headroom and the pod isn't evicted under node memory pressure.
    resources:
      limits:
        cpu: "4"
        memory: "6Gi"
      requests:
        cpu: "4"
        memory: "6Gi"
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 180
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 10

# ===========================================
# Messaging Gateway (Telegram/Slack)
# ===========================================
messaging:
  enabled: false
  image:
    repository: cogniverse/runtime
    tag: "2.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  mode: polling  # polling for dev, webhook for production
  resources:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  env:
    GATEWAY_MODE: "polling"

# ===========================================
# Ingress Configuration
# ===========================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

  hosts:
    - host: cogniverse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501

  tls:
    - secretName: cogniverse-tls
      hosts:
        - cogniverse.example.com

# ===========================================
# Configuration
# ===========================================
config:
  # Tenant configuration
  tenants:
    - id: "default"
      name: "Default Tenant"
    - id: "acme_corp"
      name: "Acme Corporation"
    - id: "globex_inc"
      name: "Globex Inc"

  # Model configuration
  models:
    colpali:
      name: "vidore/colsmol-500m"
      device: "cuda"
    videoprism:
      name: "google/videoprism-base"
      device: "cuda"
    colqwen:
      name: "colqwen/colqwen2-omni"
      device: "cuda"

  # LLM models to pull (references llm.builtin.models)
  llmModels:
    - "qwen3:4b"

# ===========================================
# Init Jobs
# ===========================================
initJobs:
  # Schema deployment job — calls runtime API to deploy data schemas
  schemaDeployment:
    enabled: true
    # Profiles to deploy for each tenant
    profiles:
      - "video_colpali_smol500_mv_frame"
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

  # Model pulling job — pulls LLM models via Ollama API
  modelPulling:
    enabled: true
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    backoffLimit: 5
    restartPolicy: OnFailure

# ===========================================
# Security
# ===========================================
# Security contexts are set per-component in templates:
# Vespa: runAsUser 0 (needs root for JVM)
# LLM builtin: runAsUser 0 (needs root for model storage)
# Runtime, Dashboard, Phoenix: runAsUser 1000
securityContext: {}
podSecurityContext: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

# ===========================================
# Monitoring
# ===========================================
monitoring:
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

  # Grafana dashboards
  dashboards:
    enabled: false
    namespace: monitoring

# ===========================================
# Secrets
# ===========================================
secrets:
  # External secrets operator
  externalSecrets:
    enabled: false
    backend: aws-secrets-manager
    region: us-east-1

  # Manually provided secrets (for development)
  manual:
    enabled: false
    data: {}

# ===========================================
# Backup
# ===========================================
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageClass: ""
  size: "200Gi"

# ===========================================
# Multi-Tenant
# ===========================================
multiTenant:
  enabled: true
  isolation: "namespace"  # namespace or schema

  # Resource quotas per tenant
  quotas:
    cpu: "10"
    memory: "20Gi"
    storage: "100Gi"
    pods: "50"
