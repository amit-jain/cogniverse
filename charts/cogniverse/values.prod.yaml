# Production values
llm:
  builtin:
    gpu:
      enabled: true
    resources:
      limits:
        cpu: "8"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "8Gi"

runtime:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: cogniverse.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501
  tls:
    - secretName: cogniverse-tls
      hosts:
        - cogniverse.example.com

# Secrets that MUST NOT ship the repo's dev defaults in production. Left empty
# so a prod install fails loud (helm `required`) until the operator supplies a
# secure per-environment value (e.g. via --set or a sealed secret).
minio:
  rootPassword: ""

openshell:
  server:
    sshHandshakeSecret: ""

redis:
  auth:
    enabled: true
    password: ""  # fail loud until the operator supplies a real value
