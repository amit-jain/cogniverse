apiVersion: v2
name: cogniverse
description: Multi-Agent RAG System for Multi-Modal Content Analysis
type: application
version: 2.0.0
appVersion: "2.0.0"

keywords:
  - ai
  - rag
  - multi-agent
  - vector-search
  - multi-modal

home: https://github.com/your-org/cogniverse
sources:
  - https://github.com/your-org/cogniverse

maintainers:
  - name: Cogniverse Team
    email: team@cogniverse.ai

dependencies:
  - name: argo-workflows
    version: "0.45.x"
    repository: "https://argoproj.github.io/argo-helm"
    condition: argo.enabled
  # openshell is vendored as an unpacked subchart at charts/openshell — Helm
  # picks it up automatically without a repository URL. Gated on the
  # `runtime.sandbox.inCluster.enabled` value at the parent level.
  - name: openshell
    version: "0.1.0"
    condition: runtime.sandbox.inCluster.enabled

# Minimum Kubernetes version
kubeVersion: ">=1.24.0-0"

icon: https://cogniverse.ai/icon.png
