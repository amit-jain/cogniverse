# K3s/k3d local development values
# Requires Docker Desktop memory ≥ 48Gi (Settings → Resources → Memory)
global:
  storageClass: "local-path"

# Mount the workspace libs into runtime/quality-monitor so code edits take
# effect on pod restart without rebuilding the Docker image. The k3d
# cluster is created with --volume $(pwd):/cogniverse-src so the
# hostPath is already wired on the node.
devMode:
  enabled: true
  hostPath: /cogniverse-src

# Consolidated inference overrides. YAML won't merge two same-named
# top-level keys in the same file — a second ``inference:`` block
# silently clobbers the first — so everything inference-related stays
# in one block below.
#
# Policy: only enable pods whose key is referenced by at least one
# profile's ``inference_service`` in configs/config.json. Empty pods
# burn memory the laptop doesn't have. Current references:
#   - colbert_pylate   (document_text_semantic, lateon_mv, audio_clap_semantic)
#   - vllm_colpali     (video_colpali_smol500_mv_frame, image_colpali_mv,
#                       video_colqwen_omni_mv_chunk_30s)
#   - code_colbert_pylate (code_lateon_mv — keep off unless code search is wanted)
inference:
  # ColPali uses the native FastAPI sidecar (deploy/colpali) — vLLM's
  # ColPaliForRetrieval exposes /v1/score (scalar) but the runtime needs
  # per-token multi-vector embeddings via /v1/embeddings.
  vllm_colpali:
    enabled: true
    engine: colpali_native
    image:
      repository: cogniverse/colpali
      tag: dev
      pullPolicy: Never
    extraArgs: []
    kvCacheGiB: null
    resources:
      limits:
        cpu: "4"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "16Gi"
  # Dev override: use locally-built pylate image for the default text pod.
  colbert_pylate:
    service:
      type: NodePort
    pylate:
      image:
        tag: "dev"
        pullPolicy: Never
  # Dev override for the code-search pylate pod (disabled by default).
  code_colbert_pylate:
    service:
      type: NodePort
    pylate:
      image:
        tag: "dev"
        pullPolicy: Never
  # Dev override for the dense-mode pylate pod (denseon).
  denseon:
    service:
      type: NodePort
    pylate:
      image:
        tag: "dev"
        pullPolicy: Never

vespa:
  replicaCount: 1
  service:
    type: NodePort
    # k3d's loadbalancer publishes host:8080 -> server:8080, so the NodePort
    # MUST match the service port for Vespa to be reachable from the host
    # at localhost:8080. values.yaml defaults to 28080, which breaks the
    # LB mapping (server:8080 would have nothing listening).
    nodePorts:
      query: 8080
  persistence:
    storageClass: "local-path"
    size: "20Gi"
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "16Gi"
  # Vespa config-server cold-start (bundle loading + ZK replay) easily
  # runs 4-5 min on local disk. The chart default (delay=120s,
  # failure=3) kills at ~210s and each restart replays state, making
  # the next cycle even slower. Give the config-server a 7-min window
  # on k3s.
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 10

runtime:
  replicaCount: 1
  # Backend is detected by the e2e conftest at build time (re-uses the
  # install_with_gpu.sh ladder via cogniverse_cli.images.detect_torch_backend).
  # Override here to force a specific variant for repeated local runs.
  backend: cpu
  # First-launch HuggingFace downloads can exceed the 120s default.
  inferenceHealthBootDeadlineSeconds: 900
  imagesByBackend:
    cpu:
      repository: cogniverse/runtime-cpu
      tag: "dev"
      pullPolicy: Never
    cuda:
      repository: cogniverse/runtime-cuda
      tag: "dev"
      pullPolicy: Never
    rocm:
      repository: cogniverse/runtime-rocm
      tag: "dev"
      pullPolicy: Never
  service:
    type: NodePort
  autoscaling:
    enabled: false
  # Liveness/readiness probe config inherited from values.yaml (TCP socket
  # for liveness, /health/live HTTP for readiness). Overriding periods here
  # for k3s so initial delay accounts for cold Ollama pulls.
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 45
    failureThreshold: 10
  # Guaranteed QoS (request == limit) — Burstable invites kernel OOMKill
  # under cumulative vLLM + Vespa + Phoenix pressure. Pairs with the
  # Recreate deployment strategy so the request doesn't block rollout.
  resources:
    requests:
      cpu: "4"
      # All inference now lives in dedicated pods (vllm_asr, vllm_colpali,
      # vllm_llm_student, vllm_llm_teacher, colbert_pylate, denseon), so
      # runtime no longer loads ColPali in-process. Observed actual
      # working set on a warmed runtime is ~12 GiB (FastAPI + DSPy +
      # agent registry + Phoenix span batchers + mem0 LRU). 18 GiB =
      # ~50% headroom; the freed 10 GiB lets the teacher pod coexist
      # with the rest of the inference sidecars.
      memory: "18Gi"
    limits:
      cpu: "16"
      memory: "18Gi"
  # Turn on POST /admin/debug/memsnap for the dev cluster. Off in prod.
  env:
    COGNIVERSE_DEBUG_MEM: "1"
  # Host-mode OpenShell sandbox: requires `openshell gateway start --port
  # 19091` on the host + `cogniverse sandbox sync` to copy mTLS certs.
  sandbox:
    enabled: true
    gatewayEndpoint: "https://host.docker.internal:19091"
    inCluster:
      enabled: false

dashboard:
  replicaCount: 1
  backend: cpu
  imagesByBackend:
    cpu:
      repository: cogniverse/dashboard-cpu
      tag: "dev"
      pullPolicy: Never
    cuda:
      repository: cogniverse/dashboard-cuda
      tag: "dev"
      pullPolicy: Never
    rocm:
      repository: cogniverse/dashboard-rocm
      tag: "dev"
      pullPolicy: Never
  service:
    type: NodePort
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

phoenix:
  replicaCount: 1
  service:
    type: NodePort
  persistence:
    storageClass: "local-path"
    size: "10Gi"
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

llm:
  engine: ollama
  device: cpu
  ollama:
    service:
      type: NodePort
    persistence:
      storageClass: "local-path"
      size: "20Gi"
    # Ollama serializes requests per model and keeps context state resident
    # per conversation. Under orchestration load (detailed_report_agent fires
    # multiple agents → multiple LLM calls → parallel context windows) a
    # 16Gi cap OOMKilled and hung the complex-query e2e path. 20Gi covers
    # gemma3:4b + concurrent conversation context on CPU. requests == limits
    # puts the pod in Guaranteed memory QoS — under node pressure Ollama
    # cannot be evicted for exceeding its request baseline.
    resources:
      requests:
        cpu: "2"
        memory: "20Gi"
      limits:
        cpu: "4"
        memory: "20Gi"
    nodeSelector: {}
    tolerations: []

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: cogniverse.local
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501
  tls: []

config:
  tenants:
    - id: "default"
      name: "Default Tenant"

initJobs:
  # One-shot bootstrap: deploys the base Vespa application package + schemas
  # so runtime's startup probe of ``:8080/document/v1/config_metadata`` can
  # succeed. Without this after a ZK wipe, :8080 never binds.
  schemaDeployment:
    enabled: true
  modelPulling:
    enabled: false  # Handled by E2E test fixtures

# Deploy the whisper ASR sidecar in dev/k3s so the deployment-lifecycle
# e2e exercises the same chart path production uses. faster-whisper engine
# on CPU keeps this within the 49Gi laptop budget; ROCm/Metal users
# override engine + image via values.rocm.yaml when those Dockerfiles land.
whisper:
  enabled: true
  engine: faster-whisper
  model: tiny  # smallest stable model; ~75MB first download
  device: cpu
  # Override the per-engine image entry (not the legacy top-level image)
  # so pullPolicy=Never applies — the chart picks the image from
  # imagesByEngine[engine] when that map is set, which it is in the
  # default values.yaml.
  imagesByEngine:
    faster-whisper:
      repository: cogniverse/whisper-fw
      tag: "dev"
      pullPolicy: Never  # k3d-imported tag, not on a registry
  resources:
    limits:
      cpu: "2"
      memory: "1500Mi"
    requests:
      cpu: "500m"
      memory: "512Mi"
