# K3s/k3d local development values
# Requires Docker Desktop memory ≥ 48Gi (Settings → Resources → Memory)
global:
  storageClass: "local-path"

# Mount the workspace libs into runtime/quality-monitor so code edits take
# effect on pod restart without rebuilding the Docker image. The k3d
# cluster is created with --volume $(pwd):/cogniverse-src so the
# hostPath is already wired on the node.
devMode:
  enabled: true
  hostPath: /cogniverse-src

# Consolidated inference overrides. YAML won't merge two same-named
# top-level keys in the same file — a second ``inference:`` block
# silently clobbers the first — so everything inference-related stays
# in one block below.
#
# Policy: only enable pods whose key is referenced by at least one
# profile's ``inference_service`` in configs/config.json. Empty pods
# burn memory the laptop doesn't have. Current references:
#   - colbert_pylate   (document_text_semantic, lateon_mv, audio_clap_semantic)
#   - colpali_infinity (video_colpali_smol500_mv_frame, image_colpali_mv,
#                       video_colqwen_omni_mv_chunk_30s)
#   - code_colbert_pylate (code_lateon_mv — keep off unless code search is wanted)
#   - dense_vllm       (currently referenced by NO profile — keep off)
inference:
  # ColPali image multi-vector embeddings via Infinity. Required for any
  # ingest / query on video_colpali_* / image_colpali_* profiles.
  # TEMPORARILY DISABLED: michaelf34/infinity:0.0.75 crashes loading
  # vidore/colsmol-500m due to a peft/LoraConfig.eva_config mismatch.
  # Re-enable once 0.0.77+ is pulled through the mirror, or a custom
  # deploy/colpali FastAPI sidecar replaces the Infinity container.
  # Ingestion/search for ColPali profiles will fail at request time
  # until this is resolved (loud ValueError from the factory).
  colpali_infinity:
    enabled: false
    resources:
      limits:
        cpu: "4"
        memory: "6Gi"
      requests:
        cpu: "2"
        memory: "3Gi"
  # Dev override: use locally-built pylate image for the default text pod.
  colbert_pylate:
    pylate:
      image:
        tag: "dev"
        pullPolicy: Never
  # Dev override for the code-search pylate pod (disabled by default).
  code_colbert_pylate:
    pylate:
      image:
        tag: "dev"
        pullPolicy: Never

vespa:
  replicaCount: 1
  service:
    type: NodePort
    # k3d's loadbalancer publishes host:8080 -> server:8080, so the NodePort
    # MUST match the service port for Vespa to be reachable from the host
    # at localhost:8080. values.yaml defaults to 28080, which breaks the
    # LB mapping (server:8080 would have nothing listening).
    nodePorts:
      query: 8080
  persistence:
    storageClass: "local-path"
    size: "20Gi"
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "16Gi"
  # Vespa config-server cold-start (bundle loading + ZK replay) easily
  # runs 4-5 min on local disk. The chart default (delay=120s,
  # failure=3) kills at ~210s and each restart replays state, making
  # the next cycle even slower. Give the config-server a 7-min window
  # on k3s.
  livenessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 180
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    httpGet:
      path: /state/v1/health
      port: 19071
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 10

runtime:
  replicaCount: 1
  image:
    tag: "dev"
    pullPolicy: Never
  service:
    type: NodePort
  autoscaling:
    enabled: false
  # Liveness/readiness probe config inherited from values.yaml (TCP socket
  # for liveness, /health/live HTTP for readiness). Overriding periods here
  # for k3s so initial delay accounts for cold Ollama pulls.
  livenessProbe:
    initialDelaySeconds: 300
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 45
    failureThreshold: 10
  resources:
    requests:
      cpu: "2"
      # Runtime memory grows through a suite: every ingested tenant loads
      # ColPali (~500MB) in-process, memory manager caches per-tenant Mem0
      # instances (LRU-bounded at 16), and Vespa search buffers climb with
      # stored docs. Under combined fixture-ingestion + full orchestration
      # chain (gateway → orchestrator → entity/search/detailed_report) the
      # pod crossed 32Gi. 40Gi gives real headroom on a 49Gi node; the
      # Ollama pod is simultaneously reduced to 20Gi so total limits fit.
      memory: "8Gi"
    limits:
      cpu: "16"
      memory: "40Gi"
  # Turn on POST /admin/debug/memsnap for the dev cluster. Off in prod.
  env:
    COGNIVERSE_DEBUG_MEM: "1"
  # Host-mode OpenShell sandbox: developer starts `openshell gateway start
  # --port 19091` on the host, then `cogniverse sandbox sync` stores the
  # mTLS certs + metadata as `openshell-mtls` / `openshell-metadata` in the
  # cluster. The runtime mounts those into ~/.config/openshell so the SDK
  # resolves the active cluster and connects over host.docker.internal.
  # Port 19091 matches the sync tool's POD_GATEWAY_ENDPOINT constant.
  sandbox:
    enabled: true
    gatewayEndpoint: "https://host.docker.internal:19091"
    inCluster:
      enabled: false

dashboard:
  replicaCount: 1
  image:
    tag: "dev"
    pullPolicy: Never
  service:
    type: NodePort
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

phoenix:
  replicaCount: 1
  service:
    type: NodePort
  persistence:
    storageClass: "local-path"
    size: "10Gi"
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

llm:
  builtin:
    gpu:
      enabled: false
    service:
      type: NodePort
    persistence:
      storageClass: "local-path"
      size: "20Gi"
    # Ollama serializes requests per model and keeps context state resident
    # per conversation. Under orchestration load (detailed_report_agent fires
    # multiple agents → multiple LLM calls → parallel context windows) a
    # 16Gi cap OOMKilled and hung the complex-query e2e path. 20Gi covers
    # gemma4:e2b + concurrent conversation context on CPU. requests == limits
    # puts the pod in Guaranteed memory QoS — under node pressure Ollama
    # cannot be evicted for exceeding its request baseline.
    resources:
      requests:
        cpu: "2"
        memory: "20Gi"
      limits:
        cpu: "4"
        memory: "20Gi"
    nodeSelector: {}
    tolerations: []

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: cogniverse.local
      paths:
        - path: /api
          pathType: Prefix
          service: runtime
          port: 8000
        - path: /
          pathType: Prefix
          service: dashboard
          port: 8501
  tls: []

config:
  tenants:
    - id: "default"
      name: "Default Tenant"

initJobs:
  # One-shot bootstrap: deploys the base Vespa application package + schemas
  # so runtime's startup probe of ``:8080/document/v1/config_metadata`` can
  # succeed. Without this after a ZK wipe, :8080 never binds.
  schemaDeployment:
    enabled: true
  modelPulling:
    enabled: false  # Handled by E2E test fixtures
