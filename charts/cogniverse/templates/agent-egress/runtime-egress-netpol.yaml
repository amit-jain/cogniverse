{{- if .Values.networkPolicy.agentEgress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cogniverse-runtime-egress
  namespace: cogniverse
  labels:
    cogniverse-component: runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: runtime
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cogniverse
      podSelector:
        matchLabels:
          app: ollama-service
    ports:
    - port: 11434
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cogniverse
      podSelector:
        matchLabels:
          app: cogniverse-runtime
    ports:
    - port: 8000
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cogniverse
      podSelector:
        matchLabels:
          app: vespa-service
    ports:
    - port: 8080
      protocol: TCP
{{- end }}
