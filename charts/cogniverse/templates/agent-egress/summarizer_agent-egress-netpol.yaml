{{- if .Values.networkPolicy.agentEgress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cogniverse-summarizer-agent-egress
  namespace: cogniverse
  labels:
    cogniverse-agent: summarizer_agent
spec:
  podSelector:
    matchLabels:
      app: cogniverse
      cogniverse-agent: summarizer_agent
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cogniverse
      podSelector:
        matchLabels:
          app: ollama-service
    ports:
    - port: 11434
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
{{- end }}
