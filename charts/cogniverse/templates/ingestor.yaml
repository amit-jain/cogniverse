{{- if .Values.ingestor.enabled }}
{{- $fullName := include "cogniverse.fullname" . -}}
{{- /* Ingestor reuses the runtime image — same Dockerfile, different
       entry point. Resolve via runtime's imagesByBackend so the worker
       always matches the runtime's torch wheel variant. Falls back to
       the ingestor.image block for back-compat / standalone overrides. */}}
{{- $ingestorBackend := default "cuda" .Values.runtime.backend }}
{{- $ingestorImage := .Values.ingestor.image }}
{{- if .Values.runtime.imagesByBackend }}
{{- $ingestorImage = (index .Values.runtime.imagesByBackend $ingestorBackend) | default .Values.ingestor.image }}
{{- end }}
---
# Ingestor workers — claim jobs from the redis queue, run the ingestion
# pipeline, publish status events. Same image as the runtime, different
# entry point. replicaCount scales horizontally; each replica joins
# the same consumer group so a job is delivered to exactly one worker.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-ingestor
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestor
spec:
  replicas: {{ .Values.ingestor.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingestor
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingestor
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: ingestor
        image: "{{ $ingestorImage.repository }}:{{ $ingestorImage.tag }}"
        imagePullPolicy: {{ $ingestorImage.pullPolicy }}
        command:
          - python
          - -m
          - cogniverse_runtime.ingestion_worker.worker
        env:
        # numba JIT-caches next to the library source, which is read-only
        # in the image — without a writable cache dir librosa's notation
        # helpers crash ("no locator available") and audio chunking dies.
        - name: NUMBA_CACHE_DIR
          value: /tmp/numba-cache
        {{- if .Values.redis.auth.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-redis-auth
              key: redis-password
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ $fullName }}-redis:{{ .Values.redis.service.port }}/0"
        {{- else }}
        - name: REDIS_URL
          value: "redis://{{ $fullName }}-redis:{{ .Values.redis.service.port }}/0"
        {{- end }}
        - name: INGEST_CONSUMER_GROUP
          value: {{ .Values.ingestor.consumerGroup | quote }}
        - name: INGEST_CONSUMER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: INGEST_IDEMPOTENCY_TTL_SECONDS
          value: {{ .Values.ingestor.idempotencyTtlSeconds | quote }}
        - name: BACKEND_URL
          value: "{{ include "cogniverse.vespaUrl" . }}"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: TELEMETRY_OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        - name: MINIO_ENDPOINT
          value: "http://{{ $fullName }}-minio:{{ .Values.minio.service.apiPort }}"
        - name: MINIO_DEFAULT_BUCKET
          value: {{ .Values.minio.defaultBucket | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootPassword
        - name: INFERENCE_SERVICE_URLS
          value: |-
            {
            {{- $first := true -}}
            {{- range $name, $cfg := .Values.inference -}}
            {{- if $cfg.enabled }}
            {{- if not $first }},{{ end -}}
            {{- $first = false }}
              "{{ $name }}": "http://{{ $fullName }}-{{ $name | kebabcase }}:{{ $cfg.service.port }}"
            {{- end -}}
            {{- end -}}
            }
        livenessProbe:
          {{- toYaml .Values.ingestor.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.ingestor.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.ingestor.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        - name: model-cache
          mountPath: /home/cogniverse/.cache/huggingface
        {{- if .Values.devMode.enabled }}
        - name: src
          mountPath: /app/libs
          subPath: libs
        - name: src
          mountPath: /app/scripts
          subPath: scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      - name: model-cache
        {{- $persistence := ($.Values.hfCache.persistence | default dict) }}
        {{- if $.Values.hfCache.enabled }}
        hostPath:
          path: {{ $.Values.hfCache.path }}
          type: Directory
        {{- else if $persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ $fullName }}-ingestor-model-cache
        {{- else }}
        hostPath:
          path: /var/lib/cogniverse/hf-cache/runtime
          type: DirectoryOrCreate
        {{- end }}
      {{- if .Values.devMode.enabled }}
      - name: src
        hostPath:
          path: {{ .Values.devMode.hostPath }}
      {{- end }}
      {{- with .Values.ingestor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
