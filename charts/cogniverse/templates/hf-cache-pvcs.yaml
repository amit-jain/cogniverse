{{- $fullName := include "cogniverse.fullname" . -}}
{{- /*
PVCs for HuggingFace model caches when ``hfCache.persistence.enabled``
is true. Each Deployment/StatefulSet that mounts a model-cache volume
gets its own PVC: runtime, ingestor, and one per enabled inference
service. Default RWO + 50Gi; override per-cluster via
``hfCache.persistence.{size,storageClass,accessMode,annotations}``.
*/}}

{{- /*
``default dict`` so ``helm upgrade --reuse-values`` from a release
predating these keys doesn't crash on missing ``hfCache.persistence``.
Plain ``.Values.hfCache.persistence.enabled`` would nil-pointer; this
pattern leaves the new feature disabled until the operator opts in.
``dig`` would be cleaner but rejects ``chartutil.Values`` at runtime.
*/}}
{{- $persistence := (.Values.hfCache.persistence | default dict) }}
{{- if and $persistence.enabled (not .Values.hfCache.enabled) }}
{{- /* Default inner subkeys — ``--reuse-values`` overlays only operator
``--set`` on stored values; chart values.yaml defaults don't reapply. */}}
{{- $accessMode := ($persistence.accessMode | default "ReadWriteOnce") }}
{{- $size := ($persistence.size | default "50Gi") }}
{{- $storageClass := $persistence.storageClass }}
{{- $annotations := ($persistence.annotations | default dict) }}

{{- if .Values.runtime.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-runtime-model-cache
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: hf-cache
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ $accessMode }}
  {{- if $storageClass }}
  storageClassName: {{ $storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ $size }}
{{- end }}

{{- if .Values.ingestor.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-ingestor-model-cache
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: hf-cache
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ $accessMode }}
  {{- if $storageClass }}
  storageClassName: {{ $storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ $size }}
{{- end }}

{{- range $name, $cfg := .Values.inference }}
{{- if $cfg.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-{{ $name | kebabcase }}-model-cache
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: hf-cache
    app.kubernetes.io/part-of: {{ $name }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ $accessMode }}
  {{- if $storageClass }}
  storageClassName: {{ $storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ $size }}
{{- end }}
{{- end }}

{{- end }}
