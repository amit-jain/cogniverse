{{- if .Values.minio.enabled }}
{{- $fullName := include "cogniverse.fullname" . -}}
{{- /* MinIO IS the backup destination (default config). For dev clusters
to survive ``k3d cluster delete`` the data must live on a hostPath
bind-mount that's mapped from the operator's laptop fs into the k3d node.
``minio.persistence.hostPath`` (when set) bypasses the PVC entirely and
mounts a host directory; otherwise the chart provisions a PVC via the
configured ``storageClass``. ``default dict`` so ``--reuse-values`` from
older releases doesn't crash. */}}
{{- $minioP := (.Values.minio.persistence | default dict) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-minio
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
type: Opaque
stringData:
  rootUser: {{ .Values.minio.rootUser | quote }}
  rootPassword: {{ .Values.minio.rootPassword | quote }}
{{- if not $minioP.hostPath }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-minio
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - {{ $minioP.accessMode | default "ReadWriteOnce" }}
  {{- if $minioP.storageClass }}
  storageClassName: {{ $minioP.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ $minioP.size | default "100Gi" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-minio
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: {{ .Values.minio.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: minio
        image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
        imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
        args:
          - "server"
          - "/data"
          - "--console-address"
          - ":{{ .Values.minio.service.consolePort }}"
        ports:
        - name: api
          containerPort: 9000
        - name: console
          containerPort: {{ .Values.minio.service.consolePort }}
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootUser
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootPassword
        livenessProbe:
          {{- toYaml .Values.minio.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.minio.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.minio.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        {{- if $minioP.hostPath }}
        hostPath:
          path: {{ $minioP.hostPath }}
          type: DirectoryOrCreate
        {{- else }}
        persistentVolumeClaim:
          claimName: {{ $fullName }}-minio
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-minio
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type }}
  ports:
  - port: {{ .Values.minio.service.apiPort }}
    targetPort: api
    protocol: TCP
    name: api
  - port: {{ .Values.minio.service.consolePort }}
    targetPort: console
    protocol: TCP
    name: console
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
---
# Bootstrap the default ingestion bucket. Idempotent: ``mc mb --ignore-existing``
# returns 0 if the bucket already exists.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-minio-bucket-bootstrap
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: bucket-bootstrap
        image: minio/mc:latest
        env:
        # MINIO_USER/PASS must come BEFORE MC_HOST_minio: kubelet's
        # ``$(VAR)`` expansion only substitutes variables defined
        # earlier in the env list. Forward references stay as literal
        # ``$(MINIO_USER)`` in the value, which makes mc auth as that
        # literal string and hang in the connectivity probe loop.
        - name: MINIO_USER
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootUser
        - name: MINIO_PASS
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootPassword
        - name: MC_HOST_minio
          value: "http://$(MINIO_USER):$(MINIO_PASS)@{{ $fullName }}-minio:{{ .Values.minio.service.apiPort }}"
        command:
          - /bin/sh
          - -c
          - |
            set -e
            # Bounded retry: 30 attempts × 3s = 90s. Without this bound a
            # misconfigured MC_HOST_minio (e.g. unsubstituted ``$(VAR)``)
            # would loop forever and exhaust helm's hook timeout.
            for i in $(seq 1 30); do
              if mc ls minio >/dev/null 2>&1; then
                break
              fi
              echo "MinIO not ready yet (attempt $i/30), waiting..."
              sleep 3
            done
            mc ls minio >/dev/null
            mc mb --ignore-existing "minio/{{ .Values.minio.defaultBucket }}"
            echo "Bucket {{ .Values.minio.defaultBucket }} ready."
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
{{- end }}
