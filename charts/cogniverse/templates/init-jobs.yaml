{{- $fullName := include "cogniverse.fullname" . -}}
{{- if .Values.initJobs.schemaDeployment.enabled -}}
---
# Schema Deployment Job
# Waits for runtime to be healthy, then deploys data schemas via runtime API.
# Runtime deploys metadata schemas at startup — this job handles data schemas.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-schema-deployment
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.initJobs.schemaDeployment.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init
    spec:
      restartPolicy: {{ .Values.initJobs.schemaDeployment.restartPolicy }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: schema-deployment
        image: curlimages/curl:8.14.1
        command:
          - /bin/sh
          - -c
          - |
            set -e
            RUNTIME_URL="http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"

            echo "Waiting for runtime to be healthy..."
            until curl -sf "$RUNTIME_URL/health" > /dev/null 2>&1; do
              echo "Runtime not ready, waiting..."
              sleep 10
            done
            echo "Runtime is healthy!"

            {{- range $tenant := .Values.config.tenants }}
            echo "=== Deploying schemas for tenant: {{ $tenant.id }} ==="
            {{- range $.Values.initJobs.schemaDeployment.profiles }}
            echo "  Deploying profile: {{ . }}"
            RESPONSE=$(curl -sf -X POST "$RUNTIME_URL/admin/profiles/{{ . }}/deploy" \
              -H "Content-Type: application/json" \
              -d '{"tenant_id": "{{ $tenant.id }}", "force": false}' 2>&1) || true
            echo "  Response: $RESPONSE"
            {{- end }}
            {{- end }}

            echo "Schema deployment completed!"
        resources:
          {{- toYaml .Values.initJobs.schemaDeployment.resources | nindent 10 }}
{{- end }}
{{- if and .Values.initJobs.modelPulling.enabled .Values.llm.builtin.enabled -}}
---
# Model Pulling Job
# Only runs when builtin LLM is deployed. Pulls configured models.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-model-pulling
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.initJobs.modelPulling.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init
    spec:
      restartPolicy: {{ .Values.initJobs.modelPulling.restartPolicy }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: model-pulling
        image: curlimages/curl:8.14.1
        command:
          - /bin/sh
          - -c
          - |
            set -e
            LLM_URL="http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"

            echo "Waiting for LLM to be ready..."
            until curl -sf "$LLM_URL/api/tags" > /dev/null 2>&1; do
              echo "LLM not ready, waiting..."
              sleep 10
            done
            echo "LLM is ready!"

            echo "Pulling LLM models..."
            {{- range .Values.llm.builtin.models }}
            echo "  Pulling model: {{ . }}"
            curl -s -X POST "$LLM_URL/api/pull" \
              -H "Content-Type: application/json" \
              -d '{"name": "{{ . }}"}'
            echo ""
            echo "  Model {{ . }} pull initiated"
            {{- end }}
            echo "Model pulling completed!"
        resources:
          {{- toYaml .Values.initJobs.modelPulling.resources | nindent 10 }}
{{- end }}
