{{- $fullName := include "cogniverse.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
data:
  config.json: |-
    {{ tpl (.Files.Get "files/config.json") . | nindent 4 }}
{{- if .Values.runtime.qualityMonitor.enabled }}
---
# Golden evaluation dataset for the QualityMonitor sidecar. Without this
# the sidecar crash-loops: data/testset/ is never mounted in the pod.
# Bundling the dataset as a ConfigMap (sourced from
# files/quality-monitor/golden_dataset.json, which is a copy of
# data/testset/evaluation/sample_videos_retrieval_queries.json) makes the
# sidecar self-contained in any environment, dev or production.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-quality-monitor-data
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: quality-monitor
data:
  golden_dataset.json: |-
{{ .Files.Get "files/quality-monitor/golden_dataset.json" | indent 4 }}
{{- end }}
