{{- /*
One-shot Job that populates the MinIO bucket with HF model caches so
inference pods can hydrate from MinIO at cold start instead of HF Hub.

Each model is uploaded as a single tarball ``<repo>.tar``. Tarball
preserves the HF cache symlink layout (snapshots/<sha>/<file> →
../../blobs/<hash>) — flat per-file uploads via ``mc mirror`` lose the
symlinks and trip ``snapshot_download``'s integrity check, forcing a
full HF Hub re-download on every cold start.

Operator runs after adding a new model to
``hfCache.persistence.minio.models`` and helm-upgrading; the helm hook
also re-runs it on every upgrade. Idempotent: skips models whose
tarball is already in the bucket.
*/}}
{{- /* ``default dict`` so ``--reuse-values`` from older releases doesn't crash. */}}
{{- $minio := ((.Values.hfCache.persistence | default dict).minio | default dict) }}
{{- if and $minio.enabled $minio.models }}
{{- $fullName := include "cogniverse.fullname" . -}}
{{- $runtimeImage := .Values.runtime.image -}}
{{- if .Values.runtime.imagesByBackend }}
{{- $runtimeImage = (index .Values.runtime.imagesByBackend (default "cuda" .Values.runtime.backend)) | default .Values.runtime.image }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-hf-cache-minio-populate
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: hf-cache-populate
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: populate
        image: "{{ $runtimeImage.repository }}:{{ $runtimeImage.tag }}"
        imagePullPolicy: {{ $runtimeImage.pullPolicy }}
        env:
        - name: MINIO_ENDPOINT
          value: {{ $minio.endpoint | quote }}
        - name: MINIO_BUCKET
          value: {{ $minio.bucket | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $minio.existingSecret | quote }}
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $minio.existingSecret | quote }}
              key: rootPassword
        - name: MODELS
          value: {{ join "," $minio.models | quote }}
        command: ["sh", "-c"]
        args:
        - |
          set -eu
          python <<'PY'
          import os, subprocess
          from pathlib import Path
          import boto3
          from huggingface_hub import snapshot_download

          endpoint = os.environ["MINIO_ENDPOINT"]
          bucket = os.environ["MINIO_BUCKET"]
          models = [m.strip() for m in os.environ["MODELS"].split(",") if m.strip()]
          stage = Path("/tmp/hf-stage")
          stage.mkdir(parents=True, exist_ok=True)

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["MINIO_ACCESS_KEY"],
              aws_secret_access_key=os.environ["MINIO_SECRET_KEY"],
          )
          try:
              s3.head_bucket(Bucket=bucket)
          except Exception:
              s3.create_bucket(Bucket=bucket)

          for repo_id in models:
              key = f"{repo_id}.tar"
              print(f"=== {repo_id} ===")
              try:
                  s3.head_object(Bucket=bucket, Key=key)
                  print(f"  already in bucket, skipping")
                  continue
              except s3.exceptions.ClientError:
                  pass

              # Download into stage so symlinks are real on the local FS.
              snapshot_download(repo_id=repo_id, cache_dir=str(stage))
              repo_dir_name = f"models--{repo_id.replace('/', '--')}"
              repo_dir = stage / repo_dir_name
              if not repo_dir.exists():
                  raise SystemExit(f"snapshot_download failed for {repo_id}")

              # ``tar`` preserves symlinks as symlinks (Python's tarfile does
              # too, but shelling out is faster + streams big files instead of
              # holding them in Python memory).
              # The tar contains the ``models--<owner>--<repo>/`` directory so
              # the receiver extracts under ``hub/models--<owner>--<repo>``.
              tarball = stage / "_upload.tar"
              subprocess.run(
                  ["tar", "-cf", str(tarball), "-C", str(stage), repo_dir_name],
                  check=True,
              )

              size = tarball.stat().st_size
              print(f"  upload {key}  ({size:,} bytes)")
              # boto3 upload_file uses multipart for big files automatically.
              s3.upload_file(str(tarball), bucket, key)
              tarball.unlink()
              # Free disk for the next model.
              subprocess.run(["rm", "-rf", str(repo_dir)], check=True)
          print("populate complete")
          PY
        volumeMounts:
        - name: stage
          mountPath: /tmp/hf-stage
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
      volumes:
      - name: stage
        emptyDir:
          sizeLimit: 100Gi
{{- end }}
