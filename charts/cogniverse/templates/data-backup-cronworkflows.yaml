{{- /*
One nightly DR snapshot CronWorkflow per service in
``hostStorage.backup.services``. Each runs two steps: (1) kubectl-exec
into the live pod and tar the configured data path to a workflow-scoped
staging volume; (2) mc cp the tarball to
s3://<bucket>/<svc-name>/<timestamp>.tar and prune all but the most
recent ``retainLast`` snapshots.

Limitations the operator must understand:
- Not crash-consistent: the source process keeps writing during tar.
  For stronger guarantees layer CSI VolumeSnapshots underneath at the
  storage-class level.
- Source pod must have ``tar`` and a POSIX shell on PATH. Distroless
  images (e.g. arizephoenix/phoenix) won't work — use CSI snapshots
  or that service's own export API instead.
*/}}
{{- /* ``default dict`` so ``--reuse-values`` from older releases doesn't
crash. Inner subkeys also defaulted explicitly because ``--reuse-values``
overlays only what the operator passed via ``--set`` on top of stored
values — chart defaults from values.yaml don't reapply. */}}
{{- $bk := (.Values.hostStorage.backup | default dict) }}
{{- if $bk.enabled }}
{{- $bucket := ($bk.bucket | default "cogniverse-backups") }}
{{- $schedule := ($bk.schedule | default "0 3 * * *") }}
{{- $retainLast := ($bk.retainLast | default 7) }}
{{- /* Default to vespa-only when --reuse-values upgrade omits services. */}}
{{- $services := ($bk.services | default (list (dict "name" "vespa" "dataPath" "/opt/vespa/var" "podLabel" "app.kubernetes.io/component=vespa"))) }}
{{- $fullName := include "cogniverse.fullname" . -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-backup-exec
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-backup-exec
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-backup-exec
subjects:
- kind: ServiceAccount
  name: {{ include "cogniverse.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}

{{- range $svcCfg := $services }}
{{- $svc := $svcCfg.name }}
{{- $dataPath := $svcCfg.dataPath }}
{{- $podLabel := $svcCfg.podLabel }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-backup-{{ $svc }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ $schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: snapshot
    serviceAccountName: {{ include "cogniverse.serviceAccountName" $ }}
    volumeClaimTemplates:
    - metadata:
        name: stage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
    templates:
    - name: snapshot
      steps:
      - - name: dump
          template: dump
      - - name: upload
          template: upload
    - name: dump
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
        - |
          set -eu
          POD=$(kubectl -n {{ $.Release.Namespace }} get pod \
            -l {{ $podLabel }} \
            -o jsonpath='{.items[0].metadata.name}')
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          echo "Snapshotting $POD:{{ $dataPath }} → /stage/{{ $svc }}-$STAMP.tar"
          kubectl -n {{ $.Release.Namespace }} exec "$POD" -- \
            tar -cf - -C "$(dirname {{ $dataPath }})" "$(basename {{ $dataPath }})" \
            > /stage/{{ $svc }}-$STAMP.tar
        volumeMounts:
        - name: stage
          mountPath: /stage
    - name: upload
      container:
        image: minio/mc:latest
        env:
        - name: MINIO_ENDPOINT
          value: "http://{{ $fullName }}-minio:9000"
        - name: MINIO_BUCKET
          value: {{ $bucket | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $bk.existingSecret | quote }}
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $bk.existingSecret | quote }}
              key: rootPassword
        - name: RETAIN_LAST
          value: {{ $retainLast | quote }}
        # bash for parameter expansion; minio/mc image lacks awk + sed.
        command: [bash, -c]
        args:
        - |
          set -eu
          mc alias set dest "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null
          mc mb --ignore-existing "dest/$MINIO_BUCKET"
          mc cp /stage/{{ $svc }}-*.tar "dest/$MINIO_BUCKET/{{ $svc }}/"
          # Retention: drop all but the most recent N snapshots.
          # ``mc ls`` line format: "[ts] size class filename"; ``${line##* }``
          # keeps everything after the last space → just the filename.
          mc ls "dest/$MINIO_BUCKET/{{ $svc }}/" \
            | sort -r \
            | tail -n +$((RETAIN_LAST + 1)) \
            | while IFS= read -r line; do
                fname="${line##* }"
                [ -n "$fname" ] && mc rm "dest/$MINIO_BUCKET/{{ $svc }}/$fname"
              done
        volumeMounts:
        - name: stage
          mountPath: /stage
{{- end }}
{{- end }}
