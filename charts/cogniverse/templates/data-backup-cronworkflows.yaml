{{- /*
One nightly DR snapshot CronWorkflow per service in
``hostStorage.backup.services``. Each runs two steps: dump a tarball of
the service's data into a workflow-scoped staging volume, then mc cp it
to s3://<bucket>/<svc-name>/<timestamp>.tar and prune all but the most
recent ``retainLast`` snapshots.

Two dump modes are supported per service:

  mode: kubectl-exec   (default) — kubectl-exec into the live pod and
    tar the configured ``dataPath`` from inside. Works only for source
    containers that have ``tar`` and a POSIX shell on PATH (vespa).
    Cross-cuts hostStorage / PVC — works in either mode because it
    doesn't touch the volume directly.

  mode: volume-mount   — mount the source volume directly into the
    workflow pod, tar from local fs. Required for distroless source
    containers (phoenix's arizephoenix/phoenix image). For hostStorage
    setups, set ``hostPath``. For PVC-backed setups, set ``pvcName``
    AND accept that RWO PVCs can't be backed up while the source pod is
    running — either use ReadWriteMany / ReadOnlyMany volumes, take a
    CSI VolumeSnapshot first, or scale the source pod to 0 during the
    backup window.

Both modes share the same upload step (mc cp + retention pruning).
Snapshots are not crash-consistent; the source process keeps writing
during the dump. For stronger guarantees layer CSI VolumeSnapshots at
the storage-class level.
*/}}
{{- /* ``default dict`` so ``--reuse-values`` from older releases doesn't
crash. Inner subkeys also defaulted explicitly because ``--reuse-values``
overlays only what the operator passed via ``--set`` on top of stored
values — chart defaults from values.yaml don't reapply. */}}
{{- $bk := (.Values.hostStorage.backup | default dict) }}
{{- if $bk.enabled }}
{{- $bucket := ($bk.bucket | default "cogniverse-backups") }}
{{- $schedule := ($bk.schedule | default "0 3 * * *") }}
{{- $retainLast := ($bk.retainLast | default 7) }}
{{- $hostStoragePath := ($.Values.hostStorage.path | default "/host-data") }}
{{- /* Default services — vespa via kubectl-exec, phoenix via volume-mount
of its hostStorage path. Operator overrides as needed. */}}
{{- $defaultServices := list
    (dict "name" "vespa" "mode" "kubectl-exec" "dataPath" "/opt/vespa/var" "podLabel" "app.kubernetes.io/component=vespa")
    (dict "name" "phoenix" "mode" "volume-mount" "hostPath" (printf "%s/phoenix" $hostStoragePath)) }}
{{- $services := ($bk.services | default $defaultServices) }}
{{- $fullName := include "cogniverse.fullname" . -}}
{{- /* Backup destination — single config knob to switch between dev (in-cluster
MinIO) and cloud (R2 / B2 / AWS S3 / etc). Operator overrides:
  hostStorage.backup.s3.endpoint        — S3-compatible URL; empty = in-cluster MinIO
  hostStorage.backup.s3.existingSecret  — secret name; empty = use cogniverse-minio
  hostStorage.backup.s3.region          — required by some S3 clients (mc ignores)
The chart's default targets the in-cluster MinIO Deployment + secret, which is
fine for laptop dev IF MinIO uses ``minio.persistence.hostPath`` so its data
survives ``k3d cluster delete``. For cloud deployments, override these three
values + nothing else — same template, same code path. */}}
{{- $s3 := ($bk.s3 | default dict) }}
{{- $s3Endpoint := ($s3.endpoint | default (printf "http://%s-minio:9000" $fullName)) }}
{{- /* Secret precedence: backup.s3.existingSecret (new, explicit) →
backup.existingSecret (legacy top-level) → in-cluster MinIO secret. */}}
{{- $s3Secret := ($s3.existingSecret | default $bk.existingSecret | default (printf "%s-minio" $fullName)) }}
{{- /* Pick the runtime image (used by volume-mount mode for tar). */}}
{{- $runtimeBackend := default "cuda" $.Values.runtime.backend }}
{{- $runtimeImage := $.Values.runtime.image }}
{{- if $.Values.runtime.imagesByBackend }}
{{- $runtimeImage = (index $.Values.runtime.imagesByBackend $runtimeBackend) | default $.Values.runtime.image }}
{{- end }}
{{- /* Only render the pods/exec Role when at least one service uses kubectl-exec. */}}
{{- $needsExec := false }}
{{- range $svcCfg := $services }}{{- if or (eq (default "kubectl-exec" $svcCfg.mode) "kubectl-exec") (not $svcCfg.mode) }}{{- $needsExec = true }}{{- end }}{{- end }}
{{- if $needsExec }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-backup-exec
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-backup-exec
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-backup-exec
subjects:
- kind: ServiceAccount
  name: {{ include "cogniverse.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

{{- range $svcCfg := $services }}
{{- $svc := $svcCfg.name }}
{{- $mode := default "kubectl-exec" $svcCfg.mode }}
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-backup-{{ $svc }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ $schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: snapshot
    serviceAccountName: {{ include "cogniverse.serviceAccountName" $ }}
    {{- if eq $mode "volume-mount" }}
    volumes:
    - name: source
      {{- if $svcCfg.hostPath }}
      hostPath:
        path: {{ $svcCfg.hostPath }}
        type: Directory
      {{- else if $svcCfg.pvcName }}
      persistentVolumeClaim:
        claimName: {{ $svcCfg.pvcName }}
        readOnly: true
      {{- else }}
      {{- fail (printf "service %s has mode=volume-mount but neither hostPath nor pvcName set" $svc) }}
      {{- end }}
    {{- end }}
    volumeClaimTemplates:
    - metadata:
        name: stage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
    templates:
    - name: snapshot
      steps:
      - - name: dump
          template: dump
      - - name: upload
          template: upload
    - name: dump
      {{- if eq $mode "kubectl-exec" }}
      container:
        image: rancher/kubectl:v1.31.2
        command: [sh, -c]
        args:
        - |
          set -eu
          POD=$(kubectl -n {{ $.Release.Namespace }} get pod \
            -l {{ $svcCfg.podLabel }} \
            -o jsonpath='{.items[0].metadata.name}')
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          echo "Snapshotting $POD:{{ $svcCfg.dataPath }} → /stage/{{ $svc }}-$STAMP.tar"
          kubectl -n {{ $.Release.Namespace }} exec "$POD" -- \
            tar -cf - -C "$(dirname {{ $svcCfg.dataPath }})" "$(basename {{ $svcCfg.dataPath }})" \
            > /stage/{{ $svc }}-$STAMP.tar
        volumeMounts:
        - name: stage
          mountPath: /stage
      {{- else if eq $mode "volume-mount" }}
      container:
        # Runtime image because it ships ``tar`` and is already pulled on
        # every cluster (the runtime pod uses it).
        image: "{{ $runtimeImage.repository }}:{{ $runtimeImage.tag }}"
        imagePullPolicy: {{ $runtimeImage.pullPolicy }}
        # UID 0 to traverse hostpath dirs that may have restrictive perms;
        # the source mount is read-only so we can't damage it.
        securityContext:
          runAsUser: 0
        command: [sh, -c]
        args:
        - |
          set -eu
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          SNAP=/stage/snap
          rm -rf "$SNAP" && mkdir -p "$SNAP"
          echo "Snapshotting /source → /stage/{{ $svc }}-$STAMP.tar"
          cd /source
          # Tarring a live SQLite database straight off the volume fails
          # ("file changed as we read it") or worse, archives a torn copy.
          # Stage a consistent snapshot instead: .db files go through
          # SQLite's online-backup API, everything else is copied as-is
          # (-wal/-shm are folded into the backup, so they are skipped).
          find . -type d -exec mkdir -p "$SNAP/{}" \;
          find . -type f ! -name '*.db' ! -name '*.db-wal' ! -name '*.db-shm' \
            -exec cp -a {} "$SNAP/{}" \;
          find . -type f -name '*.db' | while read -r db; do
            python3 -c 'import sqlite3, sys; src = sqlite3.connect(f"file:{sys.argv[1]}?mode=ro", uri=True); dst = sqlite3.connect(sys.argv[2]); src.backup(dst); dst.close(); src.close()' "$db" "$SNAP/$db"
          done
          tar -cf /stage/{{ $svc }}-$STAMP.tar -C "$SNAP" .
          rm -rf "$SNAP"
          ls -la /stage
        volumeMounts:
        - name: stage
          mountPath: /stage
        - name: source
          mountPath: /source
          # Not readOnly: SQLite readers of a WAL-mode database need write
          # access to the -shm file even though the backup only reads.
      {{- else }}
      {{- fail (printf "service %s has unknown mode=%s; expected kubectl-exec or volume-mount" $svc $mode) }}
      {{- end }}
    - name: upload
      container:
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: {{ $s3Endpoint | quote }}
        - name: MINIO_BUCKET
          value: {{ $bucket | quote }}
        # Secret keys ``rootUser`` / ``rootPassword`` match both the
        # chart's in-cluster MinIO secret AND the convention used by
        # operator-supplied secrets for cloud buckets (the operator
        # creates the secret with these key names regardless of the S3
        # provider — keeps the template provider-agnostic).
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $s3Secret | quote }}
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $s3Secret | quote }}
              key: rootPassword
        - name: RETAIN_LAST
          value: {{ $retainLast | quote }}
        # bash for parameter expansion; minio/mc image lacks awk + sed.
        command: [bash, -c]
        args:
        - |
          set -eu
          mc alias set dest "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null
          mc mb --ignore-existing "dest/$MINIO_BUCKET"
          mc cp /stage/{{ $svc }}-*.tar "dest/$MINIO_BUCKET/{{ $svc }}/"
          # Retention: drop all but the most recent N snapshots.
          # ``mc ls`` line format: "[ts] size class filename"; ``${line##* }``
          # keeps everything after the last space → just the filename.
          mc ls "dest/$MINIO_BUCKET/{{ $svc }}/" \
            | sort -r \
            | tail -n +$((RETAIN_LAST + 1)) \
            | while IFS= read -r line; do
                fname="${line##* }"
                [ -n "$fname" ] && mc rm "dest/$MINIO_BUCKET/{{ $svc }}/$fname"
              done
        volumeMounts:
        - name: stage
          mountPath: /stage
{{- end }}
{{- end }}
