{{- $fullName := include "cogniverse.fullname" . -}}
{{- if .Values.argo.enabled }}
{{- /* Workflow pods reuse the runtime image — same Dockerfile, same
       Python venv, just different entrypoint. Resolve the image via
       runtime's imagesByBackend so the workflow always matches the
       runtime's torch wheel variant. Falls back to the legacy
       runtime.image block when imagesByBackend isn't populated. */}}
{{- $workflowBackend := default "cuda" .Values.runtime.backend }}
{{- $workflowImage := .Values.runtime.image }}
{{- if .Values.runtime.imagesByBackend }}
{{- $workflowImage = (index .Values.runtime.imagesByBackend $workflowBackend) | default .Values.runtime.image }}
{{- end }}
{{- if .Values.argo.maintenance.cleanup.enabled }}
---
# Daily cleanup — logs, temp files, expired memories
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-daily-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: maintenance
spec:
  schedule: {{ .Values.argo.maintenance.cleanup.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  workflowSpec:
    entrypoint: cleanup
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    templates:
    - name: cleanup
      container:
        image: "{{ $workflowImage.repository }}:{{ $workflowImage.tag }}"
        imagePullPolicy: {{ $workflowImage.pullPolicy }}
        command: ["python", "-m", "cogniverse_runtime.optimization_cli"]
        args:
          - "--mode"
          - "cleanup"
          - "--log-retention-days"
          - "{{ .Values.argo.maintenance.cleanup.logRetentionDays }}"
          - "--memory-retention-days"
          - "{{ .Values.argo.maintenance.cleanup.memoryRetentionDays }}"
        env:
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        resources:
          requests:
            cpu: 500m
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      {{- if .Values.devMode.enabled }}
      # devMode mounts: workflow pods pick up local source edits without
      # a runtime-image rebuild (same pattern as the runtime Deployment).
      # Required so the daily-cleanup CronWorkflow execution e2e test
      # exercises the freshly-committed optimization_cli code, not a
      # frozen image baked days ago.
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
{{- end }}
{{- if .Values.argo.optimization.agentOptimization.enabled }}
---
# Weekly agent optimization — runs all DSPy-based optimizers in parallel,
# then workflow optimizer, then restarts runtime to pick up new artifacts.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-agent-optimization
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimization
spec:
  schedule: {{ .Values.argo.optimization.agentOptimization.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: optimize-all-agents
    arguments:
      parameters:
      - name: tenant-id
        value: "default"
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    volumes:
    - name: config
      configMap:
        name: {{ $fullName }}-config
    {{- if .Values.devMode.enabled }}
    # devMode bind-mount for templateRef'd run-optimizer pods. Argo
    # doesn't inherit volumes from referenced WorkflowTemplates — they
    # must be declared here so every optimizer step (gateway-thresholds,
    # entity-extraction, simba, profile, workflow) can mount /app/libs.
    - name: src-libs
      hostPath:
        path: {{ .Values.devMode.hostPath }}/libs
        type: Directory
    - name: src-scripts
      hostPath:
        path: {{ .Values.devMode.hostPath }}/scripts
        type: Directory
    {{- end }}
    templates:
    - name: optimize-all-agents
      steps:
      # Step 1: Run all DSPy-based optimizers in parallel
      - - name: gateway-thresholds
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: gateway-thresholds
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            - name: lookback-hours
              value: "48"
        - name: entity-extraction
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: entity-extraction
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            - name: lookback-hours
              value: "48"
        - name: simba
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: simba
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            # 168h (7 days) — simba runs weekly (matches the cron
            # schedule "0 3 * * 0") so the lookback must cover the
            # full week between firings. The other modes here
            # (gateway-thresholds, entity-extraction, profile) run on
            # tighter feedback so 48h is the right scope for them.
            - name: lookback-hours
              value: "168"
        - name: profile
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: profile
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            - name: lookback-hours
              value: "48"
      # Step 2: Workflow optimization (depends on agent artifacts)
      - - name: workflow
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: workflow
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            - name: lookback-hours
              value: "48"
      # Step 3: Restart runtime to pick up new artifacts
      - - name: restart-runtime
          template: restart-deployment

    - name: restart-deployment
      # bitnami/kubectl stopped publishing versioned tags on Docker Hub
      # (only :latest + manifest signatures remain), so the previous
      # :1.33 image never pulled. rancher/kubectl publishes stable
      # v1.33.x tags — keep us on the same kubectl minor as the cluster.
      container:
        image: rancher/kubectl:v1.33.9
        command: ["kubectl"]
        args:
          - "rollout"
          - "restart"
          - "deployment/{{ $fullName }}-runtime"
          - "-n"
          - "{{ .Release.Namespace }}"
{{- end }}
{{- if .Values.argo.optimization.dailyGateway.enabled }}
---
# Daily gateway threshold tuning — lightweight, runs just gateway-thresholds
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-daily-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimization
spec:
  schedule: {{ .Values.argo.optimization.dailyGateway.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: daily-gateway-pipeline
    arguments:
      parameters:
      - name: tenant-id
        value: "__system__"
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    # The templateRef'd run-optimizer template requires a "config"
    # volume. Argo does not inherit volumes from referenced
    # WorkflowTemplates — they must be declared in the CALLING
    # workflow's spec. Without this every daily-gateway run failed
    # with "volume 'config' not found in workflow spec".
    volumes:
    - name: config
      configMap:
        name: {{ $fullName }}-config
    {{- if .Values.devMode.enabled }}
    # devMode bind-mount for the calling workflow — Argo does not
    # inherit volumes from the templateRef'd run-optimizer template,
    # they must be declared here too. Same reason this block exists
    # for the "config" volume above.
    - name: src-libs
      hostPath:
        path: {{ .Values.devMode.hostPath }}/libs
        type: Directory
    - name: src-scripts
      hostPath:
        path: {{ .Values.devMode.hostPath }}/scripts
        type: Directory
    {{- end }}
    templates:
    - name: daily-gateway-pipeline
      steps:
      - - name: optimize-gateway
          templateRef:
            name: {{ $fullName }}-optimization-runner
            template: run-optimizer
          arguments:
            parameters:
            - name: mode
              value: gateway-thresholds
            - name: tenant-id
              value: "{{`{{workflow.parameters.tenant-id}}`}}"
            - name: lookback-hours
              value: "24"
      - - name: restart-runtime
          template: restart-deployment

    - name: restart-deployment
      container:
        image: rancher/kubectl:v1.33.9
        command: ["kubectl"]
        args:
          - "rollout"
          - "restart"
          - "deployment/{{ $fullName }}-runtime"
          - "-n"
          - "{{ .Release.Namespace }}"
{{- end }}
{{- if .Values.argo.optimization.syntheticGeneration.enabled }}
---
# Saturday synthetic data generation — creates training data for all optimizer types
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-synthetic-generation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimization
spec:
  schedule: {{ .Values.argo.optimization.syntheticGeneration.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: generate-synthetic
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    templates:
    - name: generate-synthetic
      container:
        image: "{{ $workflowImage.repository }}:{{ $workflowImage.tag }}"
        imagePullPolicy: {{ $workflowImage.pullPolicy }}
        command: ["python", "-m", "cogniverse_runtime.optimization_cli"]
        args:
          - "--mode"
          - "synthetic"
          - "--tenant-id"
          - "default"
          # Synthetic-generator subset that runs WITHOUT extra config.
          # ``routing`` requires optimizer_configs['routing'] with
          # query_templates, which the chart does not currently
          # populate; including it produced a per-mode failure in the
          # workflow result. ``simba`` is an agent-optimization mode,
          # not a synthetic generator. ``unified`` / ``cross_modal``
          # also need extra config. workflow + profile run clean
          # against an empty cluster — the working set the cron should
          # produce until query_templates land in values.yaml.
          - "--agents"
          - "workflow,profile"
        env:
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: TELEMETRY_OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
{{- end }}
{{- if .Values.argo.optimization.scheduledDistillation.enabled }}
---
# Scheduled distillation cron — audit fix #7. Runs ``quality_monitor_cli
# --once`` periodically to force a strategy distillation pass even when
# quality is stable. Without this CronWorkflow, distillation only fired
# when QualityMonitor detected a quality drop, leaving long stable
# periods with no learning happening at all.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-scheduled-distillation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: optimization
spec:
  schedule: {{ .Values.argo.optimization.scheduledDistillation.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: scheduled-distillation
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    templates:
    - name: scheduled-distillation
      container:
        image: "{{ $workflowImage.repository }}:{{ $workflowImage.tag }}"
        imagePullPolicy: {{ $workflowImage.pullPolicy }}
        command: ["python", "-m", "cogniverse_runtime.quality_monitor_cli"]
        args:
          - "--once"
          - "--tenant-id"
          - "default"
          - "--runtime-url"
          - "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
          - "--phoenix-url"
          - "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
          - "--llm-base-url"
          - {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
          - "--llm-model"
          # Use the BARE model id (no ``openai/`` prefix) because
          # quality_monitor_cli posts directly to /v1/chat/completions
          # via httpx; vLLM/Ollama match against the served model name
          # which is ``google/gemma-4-e4b-it``, NOT the DSPy/litellm
          # provider-routed form ``openai/google/gemma-4-e4b-it``
          # that the prefixed helper returns.
          - {{ include "cogniverse.primaryLLMModelBare" . | quote }}
          - "--golden-dataset-path"
          - {{ .Values.runtime.qualityMonitor.goldenDatasetPath | quote }}
          - "--argo-url"
          - "http://argo-server.argo.svc.cluster.local:2746"
          - "--argo-namespace"
          - {{ .Release.Namespace | quote }}
        env:
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: TELEMETRY_OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        - name: quality-monitor-data
          mountPath: /app/data/quality-monitor/golden_dataset.json
          subPath: golden_dataset.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      - name: quality-monitor-data
        configMap:
          name: {{ $fullName }}-quality-monitor-data
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
{{- end }}
{{- if .Values.argo.optimization.monthlyReports.enabled }}
---
# Monthly usage + performance reports — generated JSON is uploaded
# to MinIO so dashboards / billing pipelines can consume the same
# bucket the data-backup workflows write to. Replaces the standalone
# kubectl-applied ``monthly-reports`` prototype that wrote empty stubs.
{{- $reportsMinioSecret := printf "%s-minio" $fullName }}
{{- $reportsBucket := default "cogniverse-backups" $.Values.hostStorage.backup.bucket }}
{{- $reportsEndpoint := printf "http://%s-minio:9000" $fullName }}
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ $fullName }}-monthly-reports
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: reporting
spec:
  schedule: {{ .Values.argo.optimization.monthlyReports.schedule | quote }}
  timezone: "UTC"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 6  # ~6 months of history
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: reports-pipeline
    serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
    volumes:
    - name: config
      configMap:
        name: {{ $fullName }}-config
    {{- if .Values.devMode.enabled }}
    - name: src-libs
      hostPath:
        path: {{ .Values.devMode.hostPath }}/libs
        type: Directory
    - name: src-scripts
      hostPath:
        path: {{ .Values.devMode.hostPath }}/scripts
        type: Directory
    {{- end }}
    volumeClaimTemplates:
    - metadata:
        name: reports-stage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
    templates:
    - name: reports-pipeline
      steps:
      - - name: generate-reports
          template: generate-reports
      - - name: upload-reports
          template: upload-reports
    - name: generate-reports
      container:
        image: "{{ $workflowImage.repository }}:{{ $workflowImage.tag }}"
        imagePullPolicy: {{ $workflowImage.pullPolicy }}
        command: ["python", "-m", "cogniverse_runtime.optimization_cli"]
        args:
          - "--mode"
          - "monthly-reports"
          - "--reports-output-dir"
          - "/reports"
          - "--lookback-hours"
          - "{{ .Values.argo.optimization.monthlyReports.lookbackHours }}"
        env:
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: TELEMETRY_OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        - name: reports-stage
          mountPath: /reports
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
    - name: upload-reports
      container:
        image: minio/mc:RELEASE.2024-10-29T16-01-48Z
        env:
        - name: MINIO_ENDPOINT
          value: {{ $reportsEndpoint | quote }}
        - name: MINIO_BUCKET
          value: {{ $reportsBucket | quote }}
        - name: REPORTS_PREFIX
          value: {{ .Values.argo.optimization.monthlyReports.uploadPrefix | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $reportsMinioSecret | quote }}
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $reportsMinioSecret | quote }}
              key: rootPassword
        command: [bash, -c]
        args:
        - |
          set -eu
          mc alias set dest "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null
          mc mb --ignore-existing "dest/$MINIO_BUCKET"
          mc cp /reports/*.json "dest/$MINIO_BUCKET/$REPORTS_PREFIX/"
          echo "Uploaded reports to dest/$MINIO_BUCKET/$REPORTS_PREFIX/:"
          mc ls "dest/$MINIO_BUCKET/$REPORTS_PREFIX/"
        volumeMounts:
        - name: reports-stage
          mountPath: /reports
{{- end }}
---
# RBAC: Allow the quality monitor sidecar (via the shared ServiceAccount)
# to create Workflow resources for on-demand optimization.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-workflow-submitter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflows"]
  verbs: ["create", "get", "list"]
# Argo Emissary (the init container Argo injects into every Workflow pod)
# writes task results back to the cluster after the main container exits.
# Without this permission the Workflow is marked ``Error`` even when the
# main container succeeded — a silent corruption of the Succeeded/Failed
# signal the dashboard polls via GET /admin/tenant/{id}/optimize/runs/{id}.
- apiGroups: ["argoproj.io"]
  resources: ["workflowtaskresults"]
  verbs: ["create", "patch"]
# daily-gateway's ``restart-deployment`` step runs ``kubectl rollout
# restart deployment/<runtime>`` so freshly-trained DSPy artifacts get
# picked up by the runtime pod. Without get/patch on deployments.apps
# the kubectl call fails with Forbidden and the step exits 1 — even
# though the optimize-gateway step that produced the artifacts
# succeeded. The Workflow then surfaces as ``Failed`` and the next
# day's run never benefits from the recomputed thresholds.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-workflow-submitter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-workflow-submitter
subjects:
- kind: ServiceAccount
  name: {{ include "cogniverse.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
