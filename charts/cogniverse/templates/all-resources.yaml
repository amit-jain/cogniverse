{{- $fullName := include "cogniverse.fullname" . -}}
{{- $labels := include "cogniverse.labels" . -}}
{{- $selectorLabels := include "cogniverse.selectorLabels" . -}}
---
# ServiceAccount
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# RBAC so the runtime can submit workflows + cronworkflows to argo-server
# (auth-mode=server forwards the bearer token through TokenReview, then
# delegates k8s API calls back to the caller's SA, so the SA itself needs
# argoproj permissions).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}-argo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}-argo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cogniverse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "cogniverse.serviceAccountName" . }}-argo
  apiGroup: rbac.authorization.k8s.io
---
# RBAC so the runtime's startup health-check can read the Endpoints
# objects of inference Services and skip probes for Deployments that
# an operator has scaled to 0. Without this, the runtime probes parked
# services until the boot-deadline expires, port 8000 never binds, the
# liveness probe times out, and the kubelet kills the pod before it
# can serve traffic. Read-only on Endpoints in the runtime's own
# namespace — narrow enough that we don't need a ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}-endpoints-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}-endpoints-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cogniverse.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "cogniverse.serviceAccountName" . }}-endpoints-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
# Vespa StatefulSet
{{- if .Values.vespa.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-vespa
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
spec:
  serviceName: {{ $fullName }}-vespa
  replicas: {{ .Values.vespa.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vespa
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vespa
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsUser: 0
      containers:
      - name: vespa
        image: "{{ .Values.vespa.image.repository }}:{{ .Values.vespa.image.tag }}"
        imagePullPolicy: {{ .Values.vespa.image.pullPolicy }}
        ports:
        - name: query
          containerPort: 8080
        - name: config
          containerPort: 19071
        - name: metrics
          containerPort: 19092
        env:
        - name: VESPA_CONFIGSERVERS
          value: "{{ $fullName }}-vespa-0.{{ $fullName }}-vespa.{{ .Release.Namespace }}.svc.cluster.local"
        {{- range $key, $value := .Values.vespa.env }}
        {{- if ne $key "VESPA_CONFIGSERVERS" }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.vespa.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.vespa.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.vespa.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /opt/vespa/var
      {{- with .Values.vespa.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vespa.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vespa.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostStorage.enabled }}
      # Host-bound: pin the ``data`` volume to a host-side directory so
      # cluster recreation does not destroy Vespa's document store +
      # config-server state. The k3d node has ``hostStorage.path``
      # bind-mounted from the operator's host (cluster.py); each
      # service gets its own subdir to keep state isolated.
      volumes:
      - name: data
        hostPath:
          path: {{ .Values.hostStorage.path }}/vespa
          type: DirectoryOrCreate
      {{- end }}
  {{- if and .Values.vespa.persistence.enabled (not .Values.hostStorage.enabled) }}
  volumeClaimTemplates:
  - metadata:
      name: data
      {{- with .Values.vespa.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        - {{ .Values.vespa.persistence.accessMode }}
      {{- if .Values.vespa.persistence.storageClass }}
      storageClassName: {{ .Values.vespa.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.vespa.persistence.size }}
  {{- end }}
{{- end }}
---
# Vespa Service
{{- if .Values.vespa.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-vespa
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
  {{- with .Values.vespa.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.vespa.service.type }}
  ports:
  - port: {{ .Values.vespa.service.ports.query }}
    targetPort: query
    protocol: TCP
    name: query
    {{- if eq .Values.vespa.service.type "NodePort" }}
    nodePort: {{ .Values.vespa.service.nodePorts.query | default .Values.vespa.service.ports.query }}
    {{- end }}
  - port: {{ .Values.vespa.service.ports.config }}
    targetPort: config
    protocol: TCP
    name: config
    {{- if eq .Values.vespa.service.type "NodePort" }}
    nodePort: {{ .Values.vespa.service.ports.config }}
    {{- end }}
  - port: {{ .Values.vespa.service.ports.metrics }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
{{- end }}
---
# Runtime Deployment
{{- if .Values.runtime.enabled }}
{{- $runtimeBackend := default "cuda" .Values.runtime.backend }}
{{- $runtimeImage := .Values.runtime.image }}
{{- if .Values.runtime.imagesByBackend }}
{{- $runtimeImage = (index .Values.runtime.imagesByBackend $runtimeBackend) | default .Values.runtime.image }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-runtime
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  replicas: {{ .Values.runtime.replicaCount }}
  # Recreate so the rolling-update overlap doesn't double-book runtime
  # memory and trip FailedScheduling on memory-constrained single-node
  # clusters.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runtime
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        {{- if eq $runtimeBackend "rocm" }}
        # /dev/kfd, /dev/dri/renderD* are root:render(992)/video(44).
        # Override per distro via runtime.rocm.supplementalGroups.
        supplementalGroups:
          {{- toYaml (dig "rocm" "supplementalGroups" (list 992 44) .Values.runtime) | nindent 8 }}
        {{- end }}
      containers:
      - name: runtime
        image: "{{ $runtimeImage.repository }}:{{ $runtimeImage.tag }}"
        imagePullPolicy: {{ $runtimeImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        # numba JIT-caches next to the library source, which is read-only
        # in the image — without a writable cache dir librosa's notation
        # helpers crash ("no locator available") and audio chunking dies.
        - name: NUMBA_CACHE_DIR
          value: /tmp/numba-cache
        - name: RUNTIME_URL
          value: "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
        - name: VESPA_URL
          value: "http://{{ $fullName }}-vespa:{{ .Values.vespa.service.ports.query }}"
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: VESPA_CONFIG_PORT
          value: "{{ .Values.vespa.service.ports.config }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: TELEMETRY_OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        - name: HF_HOME
          value: "/home/cogniverse/.cache/huggingface"
        - name: TRANSFORMERS_CACHE
          value: "/home/cogniverse/.cache/huggingface"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        - name: INFERENCE_HEALTH_BOOT_DEADLINE_SECONDS
          value: {{ default 120 .Values.runtime.inferenceHealthBootDeadlineSeconds | quote }}
        # Route semantic text embeddings to the denseon sidecar (DenseOn
        # via the colbert_pylate sidecar in mode=dense).
        {{- if .Values.inference.denseon.enabled }}
        - name: COGNIVERSE_SEMANTIC_EMBED_URL
          value: "http://{{ $fullName }}-denseon:{{ .Values.inference.denseon.service.port }}"
        - name: COGNIVERSE_SEMANTIC_EMBED_MODEL
          value: {{ .Values.inference.denseon.model | quote }}
        {{- end }}
        {{- if .Values.runtime.sandbox.enabled }}
        - name: COGNIVERSE_SANDBOX_ENABLED
          value: "true"
        {{- if .Values.runtime.sandbox.inCluster.enabled }}
        # In-cluster: explicit host:port (no scheme) — gRPC insecure channel.
        - name: OPENSHELL_GATEWAY_ENDPOINT
          value: "openshell.{{ .Release.Namespace }}.svc.cluster.local:8080"
        {{- end }}
        # Host mode: DON'T set OPENSHELL_GATEWAY_ENDPOINT. SandboxManager
        # falls back to SandboxClient.from_active_cluster() which reads the
        # mounted metadata.json (parses scheme + host + port correctly and
        # builds the TLS channel from the mounted mtls certs). Setting the
        # env var bypasses that path and passes a raw URL to gRPC which
        # cannot parse "https://" prefixes.
        {{- end }}
        {{- if .Values.argo.enabled }}
        # Wire Argo so the runtime can submit CronWorkflows (for scheduled
        # jobs) and one-off Workflows (for dashboard-triggered optimisation).
        # argo-workflows subchart exposes its server as ``{release}-argo-workflows-server``
        # in the same namespace when server.enabled=true; the dashboard path
        # requires that flag.
        - name: WORKFLOW_API_URL
          value: "http://{{ .Release.Name }}-argo-workflows-server.{{ .Release.Namespace }}.svc.cluster.local:2746"
        - name: WORKFLOW_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        # Workflow pods must run under the runtime SA, which the chart RBAC
        # binds to the ``workflowtaskresults`` permission Argo Emissary needs
        # after the main container exits. Falling back to ``default`` causes
        # the Workflow to be marked ``Error`` even when the main container
        # succeeded.
        - name: RUNTIME_SERVICE_ACCOUNT
          value: {{ include "cogniverse.serviceAccountName" . | quote }}
        - name: JOB_WORKFLOW_TEMPLATE
          value: {{ include "cogniverse.fullname" . }}-job-runner
        - name: OPTIMIZATION_WORKFLOW_TEMPLATE
          value: {{ include "cogniverse.fullname" . }}-optimization-runner
        {{- end }}
        # Generic inference-service URL map. Profiles pick a service by key
        # via their ``inference_service`` field; the runtime resolves the URL
        # from this JSON dict.
        - name: INFERENCE_SERVICE_URLS
          value: |-
            {
            {{- $first := true -}}
            {{- range $name, $cfg := .Values.inference -}}
            {{- if $cfg.enabled }}
            {{- if not $first }},{{ end -}}
            {{- $first = false }}
              "{{ $name }}": "http://{{ $fullName }}-{{ $name | kebabcase }}:{{ $cfg.service.port }}"
            {{- end -}}
            {{- end -}}
            }
        {{- if .Values.redis.enabled }}
        - name: REDIS_URL
          value: "redis://{{ $fullName }}-redis:{{ .Values.redis.service.port }}/0"
        - name: INGEST_QUEUE_DEPTH_LIMIT
          value: {{ .Values.ingestor.queueDepthLimit | quote }}
        - name: INGEST_PER_TENANT_CONCURRENCY
          value: {{ .Values.ingestor.perTenantConcurrency | quote }}
        - name: INGEST_IDEMPOTENCY_TTL_SECONDS
          value: {{ .Values.ingestor.idempotencyTtlSeconds | quote }}
        {{- end }}
        {{- if .Values.minio.enabled }}
        - name: MINIO_ENDPOINT
          value: "http://{{ $fullName }}-minio:{{ .Values.minio.service.apiPort }}"
        - name: MINIO_DEFAULT_BUCKET
          value: {{ .Values.minio.defaultBucket | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-minio
              key: rootPassword
        {{- end }}
        {{- range $key, $value := .Values.runtime.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.runtime.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.runtime.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.runtime.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        - name: model-cache
          mountPath: /home/cogniverse/.cache/huggingface
        {{- if eq $runtimeBackend "rocm" }}
        - name: kfd
          mountPath: /dev/kfd
        - name: dri
          mountPath: /dev/dri
        {{- end }}
        {{- if .Values.runtime.sandbox.enabled }}
        {{- if .Values.runtime.sandbox.inCluster.enabled }}
        - name: openshell-client-tls
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/tls.crt
          subPath: tls.crt
          readOnly: true
        - name: openshell-client-tls
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/tls.key
          subPath: tls.key
          readOnly: true
        - name: openshell-client-ca
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/ca.crt
          subPath: ca.crt
          readOnly: true
        {{- else }}
        # Host-mode: mTLS material synced into the cluster by
        # `cogniverse sandbox sync` (secret=openshell-mtls, configmaps
        # openshell-metadata/openshell-active). Mounted into the SDK's
        # expected paths so SandboxClient.from_active_cluster() resolves.
        # Paths mirror what the openshell CLI writes on a host:
        #   ~/.config/openshell/active_gateway  (plain text — gateway name)
        #   ~/.config/openshell/gateways/<name>/metadata.json
        #   ~/.config/openshell/gateways/<name>/mtls/{ca,tls}.{crt,key}
        - name: openshell-mtls
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/ca.crt
          subPath: ca.crt
          readOnly: true
        - name: openshell-mtls
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/tls.crt
          subPath: tls.crt
          readOnly: true
        - name: openshell-mtls
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/mtls/tls.key
          subPath: tls.key
          readOnly: true
        - name: openshell-metadata
          mountPath: /home/cogniverse/.config/openshell/gateways/cogniverse/metadata.json
          subPath: metadata.json
          readOnly: true
        - name: openshell-active
          mountPath: /home/cogniverse/.config/openshell/active_gateway
          subPath: active_gateway
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        - name: src-configs-schemas
          mountPath: /app/configs/schemas
        - name: src-data
          mountPath: /app/data
        {{- end }}
      {{- if .Values.runtime.qualityMonitor.enabled }}
      {{- if not .Values.runtime.qualityMonitor.llmModel }}
      {{- fail "runtime.qualityMonitor.llmModel must be set when qualityMonitor.enabled=true" }}
      {{- end }}
      {{- if not .Values.runtime.qualityMonitor.tenantId }}
      {{- fail "runtime.qualityMonitor.tenantId must be set when qualityMonitor.enabled=true (e.g. via values.k3s.yaml for the local stack)" }}
      {{- end }}
      - name: quality-monitor
        image: "{{ $runtimeImage.repository }}:{{ $runtimeImage.tag }}"
        imagePullPolicy: {{ $runtimeImage.pullPolicy }}
        command: ["python", "-m", "cogniverse_runtime.quality_monitor_cli"]
        args:
        - "--tenant-id"
        - {{ .Values.runtime.qualityMonitor.tenantId | quote }}
        - "--runtime-url"
        - "http://localhost:{{ .Values.runtime.service.port }}"
        - "--phoenix-url"
        - "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - "--llm-base-url"
        - {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - "--llm-model"
        # Bare model id (no provider prefix) — same reason as the
        # scheduled-distillation cron: LLMJudge posts directly to
        # vLLM /v1/chat/completions which matches against the served
        # model name, not the DSPy/litellm provider-routed form.
        - {{ include "cogniverse.primaryLLMModelBare" . | quote }}
        - "--golden-interval"
        - {{ .Values.runtime.qualityMonitor.goldenIntervalSeconds | quote }}
        - "--live-interval"
        - {{ .Values.runtime.qualityMonitor.liveIntervalSeconds | quote }}
        - "--live-sample-count"
        - {{ .Values.runtime.qualityMonitor.liveSampleCount | quote }}
        - "--golden-dataset-path"
        - {{ .Values.runtime.qualityMonitor.goldenDatasetPath | quote }}
        {{- if .Values.argo.enabled }}
        - "--argo-url"
        - "http://argo-server.argo.svc.cluster.local:2746"
        - "--argo-namespace"
        - {{ .Release.Namespace | quote }}
        {{- end }}
        env:
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        resources:
          {{- toYaml .Values.runtime.qualityMonitor.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        # Audit fix #1 — mount the bundled golden dataset so the sidecar
        # can find the path passed via --golden-dataset-path. Without this
        # mount the sidecar crash-loops on startup with FileNotFoundError.
        - name: quality-monitor-data
          mountPath: /app/data/quality-monitor/golden_dataset.json
          subPath: golden_dataset.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      - name: model-cache
        {{- $persistence := ($.Values.hfCache.persistence | default dict) }}
        {{- if $.Values.hfCache.enabled }}
        hostPath:
          path: {{ $.Values.hfCache.path }}
          type: Directory
        {{- else if $persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ $fullName }}-runtime-model-cache
        {{- else }}
        hostPath:
          path: /var/lib/cogniverse/hf-cache/runtime
          type: DirectoryOrCreate
        {{- end }}
      {{- if eq $runtimeBackend "rocm" }}
      # ROCm device passthrough. The k3d cluster must mount /dev/kfd
      # and /dev/dri from the host (deployment-e2e conftest does this
      # via ``--volume`` flags on cluster create); these hostPath
      # entries surface those nodes' device files into the pod so
      # torch+rocm can talk to the GPU. Pod's containers must run with
      # supplementalGroups including the host's render+video gids
      # (``securityContext`` below) to satisfy /dev/kfd permissions.
      - name: kfd
        hostPath:
          path: /dev/kfd
      - name: dri
        hostPath:
          path: /dev/dri
      {{- end }}
      {{- if .Values.runtime.qualityMonitor.enabled }}
      # Audit fix #1 — golden dataset for QualityMonitor sidecar.
      # ConfigMap is built by templates/configmap.yaml from
      # files/quality-monitor/golden_dataset.json.
      - name: quality-monitor-data
        configMap:
          name: {{ $fullName }}-quality-monitor-data
      {{- end }}
      {{- if .Values.runtime.sandbox.enabled }}
      {{- if .Values.runtime.sandbox.inCluster.enabled }}
      - name: openshell-client-tls
        secret:
          secretName: openshell-client-tls
      - name: openshell-client-ca
        secret:
          secretName: openshell-client-ca
      {{- else }}
      - name: openshell-mtls
        secret:
          secretName: openshell-mtls
      - name: openshell-metadata
        configMap:
          name: openshell-metadata
      - name: openshell-active
        configMap:
          name: openshell-active
      {{- end }}
      {{- end }}
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      - name: src-configs-schemas
        hostPath:
          path: {{ .Values.devMode.hostPath }}/configs/schemas
          type: Directory
      - name: src-data
        hostPath:
          path: {{ .Values.devMode.hostPath }}/data
          type: DirectoryOrCreate
      {{- end }}
      {{- with .Values.runtime.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtime.affinity }}
      affinity:
