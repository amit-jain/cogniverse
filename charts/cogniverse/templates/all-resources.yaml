    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: llm
{{- else if and $llmBuiltinEnabled (eq $llmEngine "vllm") }}
{{- $vllm := .Values.llm.vllm }}
{{- $vllmImageDefault := $vllm.image }}
{{- $vllmImageOverride := dict }}
{{- if $vllm.imagesByDevice }}
{{- $vllmImageOverride = (index $vllm.imagesByDevice $llmDevice) }}
{{- end }}
{{- $vllmImage := default $vllmImageDefault $vllmImageOverride }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  replicas: {{ .Values.llm.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
