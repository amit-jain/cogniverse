{{- $fullName := include "cogniverse.fullname" . -}}
{{- $labels := include "cogniverse.labels" . -}}
{{- $selectorLabels := include "cogniverse.selectorLabels" . -}}
---
# ServiceAccount
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cogniverse.serviceAccountName" . }}
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
# Vespa StatefulSet
{{- if .Values.vespa.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-vespa
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
spec:
  serviceName: {{ $fullName }}-vespa
  replicas: {{ .Values.vespa.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vespa
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vespa
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsUser: 0
      containers:
      - name: vespa
        image: "{{ .Values.vespa.image.repository }}:{{ .Values.vespa.image.tag }}"
        imagePullPolicy: {{ .Values.vespa.image.pullPolicy }}
        ports:
        - name: query
          containerPort: 8080
        - name: config
          containerPort: 19071
        - name: metrics
          containerPort: 19092
        env:
        - name: VESPA_CONFIGSERVERS
          value: "{{ $fullName }}-vespa-0.{{ $fullName }}-vespa.{{ .Release.Namespace }}.svc.cluster.local"
        {{- range $key, $value := .Values.vespa.env }}
        {{- if ne $key "VESPA_CONFIGSERVERS" }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.vespa.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.vespa.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.vespa.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /opt/vespa/var
      {{- with .Values.vespa.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vespa.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vespa.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.vespa.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
      {{- with .Values.vespa.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        - {{ .Values.vespa.persistence.accessMode }}
      {{- if .Values.vespa.persistence.storageClass }}
      storageClassName: {{ .Values.vespa.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.vespa.persistence.size }}
  {{- end }}
{{- end }}
---
# Vespa Service
{{- if .Values.vespa.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-vespa
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
  {{- with .Values.vespa.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.vespa.service.type }}
  ports:
  - port: {{ .Values.vespa.service.ports.query }}
    targetPort: query
    protocol: TCP
    name: query
    {{- if eq .Values.vespa.service.type "NodePort" }}
    nodePort: {{ .Values.vespa.service.ports.query }}
    {{- end }}
  - port: {{ .Values.vespa.service.ports.config }}
    targetPort: config
    protocol: TCP
    name: config
    {{- if eq .Values.vespa.service.type "NodePort" }}
    nodePort: {{ .Values.vespa.service.ports.config }}
    {{- end }}
  - port: {{ .Values.vespa.service.ports.metrics }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
{{- end }}
---
# Runtime Deployment
{{- if .Values.runtime.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-runtime
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  replicas: {{ .Values.runtime.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runtime
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: runtime
        image: "{{ .Values.runtime.image.repository }}:{{ .Values.runtime.image.tag }}"
        imagePullPolicy: {{ .Values.runtime.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: RUNTIME_URL
          value: "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
        - name: VESPA_URL
          value: "http://{{ $fullName }}-vespa:{{ .Values.vespa.service.ports.query }}"
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: VESPA_CONFIG_PORT
          value: "{{ .Values.vespa.service.ports.config }}"
        - name: PHOENIX_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        - name: HF_HOME
          value: "/home/cogniverse/.cache/huggingface"
        - name: TRANSFORMERS_CACHE
          value: "/home/cogniverse/.cache/huggingface"
        - name: LLM_ENDPOINT
          {{- if .Values.llm.external.enabled }}
          value: {{ .Values.llm.external.url | quote }}
          {{- else }}
          value: "http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"
          {{- end }}
        - name: OLLAMA_API_BASE
          {{- if .Values.llm.external.enabled }}
          value: {{ .Values.llm.external.url | quote }}
          {{- else }}
          value: "http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"
          {{- end }}
        {{- range $key, $value := .Values.runtime.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.runtime.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.runtime.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.runtime.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        - name: model-cache
          mountPath: /home/cogniverse/.cache
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      - name: model-cache
        emptyDir:
          sizeLimit: 20Gi
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
      {{- with .Values.runtime.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtime.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtime.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
---
# Runtime Service
{{- if .Values.runtime.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-runtime
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
  {{- with .Values.runtime.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.runtime.service.type }}
  ports:
  - port: {{ .Values.runtime.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq .Values.runtime.service.type "NodePort" }}
    nodePort: {{ .Values.runtime.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
{{- end }}
---
# Dashboard Deployment
{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-dashboard
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: dashboard
        image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
        imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8501
        env:
        - name: RUNTIME_URL
          value: "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: PHOENIX_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: OTLP_ENDPOINT
          value: "{{ $fullName }}-phoenix:4317"
        - name: LLM_ENDPOINT
          {{- if .Values.llm.external.enabled }}
          value: {{ .Values.llm.external.url | quote }}
          {{- else }}
          value: "http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"
          {{- end }}
        - name: OLLAMA_API_BASE
          {{- if .Values.llm.external.enabled }}
          value: {{ .Values.llm.external.url | quote }}
          {{- else }}
          value: "http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"
          {{- end }}
        - name: OLLAMA_HOST
          {{- if .Values.llm.external.enabled }}
          value: {{ .Values.llm.external.url | quote }}
          {{- else }}
          value: "http://{{ $fullName }}-llm:{{ .Values.llm.builtin.service.port }}"
          {{- end }}
        {{- range $key, $value := .Values.dashboard.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.dashboard.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.dashboard.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.dashboard.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
---
# Dashboard Service
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-dashboard
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  {{- with .Values.dashboard.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
  - port: {{ .Values.dashboard.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq .Values.dashboard.service.type "NodePort" }}
    nodePort: {{ .Values.dashboard.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
---
# Phoenix StatefulSet
{{- if .Values.phoenix.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-phoenix
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix
spec:
  serviceName: {{ $fullName }}-phoenix
  replicas: {{ .Values.phoenix.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: phoenix
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: phoenix
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: phoenix
        image: "{{ .Values.phoenix.image.repository }}:{{ .Values.phoenix.image.tag }}"
        imagePullPolicy: {{ .Values.phoenix.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 6006
        - name: otlp-grpc
          containerPort: 4317
        env:
        {{- range $key, $value := .Values.phoenix.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.phoenix.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.phoenix.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.phoenix.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /phoenix-data
      {{- with .Values.phoenix.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.phoenix.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.phoenix.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.phoenix.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
      {{- with .Values.phoenix.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        - {{ .Values.phoenix.persistence.accessMode }}
      {{- if .Values.phoenix.persistence.storageClass }}
      storageClassName: {{ .Values.phoenix.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.phoenix.persistence.size }}
  {{- end }}
{{- end }}
---
# Phoenix Service
{{- if .Values.phoenix.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-phoenix
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix
  {{- with .Values.phoenix.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.phoenix.service.type }}
  ports:
  - port: {{ .Values.phoenix.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq .Values.phoenix.service.type "NodePort" }}
    nodePort: {{ .Values.phoenix.service.port }}
    {{- end }}
  - port: 4317
    targetPort: otlp-grpc
    protocol: TCP
    name: otlp-grpc
    {{- if eq .Values.phoenix.service.type "NodePort" }}
    nodePort: 4317
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoenix
{{- end }}
---
# LLM Builtin (Ollama) StatefulSet
{{- if .Values.llm.builtin.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  serviceName: {{ $fullName }}-llm
  replicas: {{ .Values.llm.builtin.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsUser: 0
      containers:
      - name: llm
        image: "{{ .Values.llm.builtin.image.repository }}:{{ .Values.llm.builtin.image.tag }}"
        imagePullPolicy: {{ .Values.llm.builtin.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 11434
        env:
        {{- range $key, $value := .Values.llm.builtin.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.llm.builtin.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.llm.builtin.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.llm.builtin.resources | nindent 10 }}
          {{- if .Values.llm.builtin.gpu.enabled }}
          limits:
            nvidia.com/gpu: "1"
          {{- end }}
        volumeMounts:
        - name: data
          mountPath: /root/.ollama
      {{- if .Values.llm.builtin.gpu.enabled }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- with .Values.llm.builtin.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.builtin.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else }}
      {{- with .Values.llm.builtin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llm.builtin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.llm.builtin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.llm.builtin.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
      {{- with .Values.llm.builtin.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        - {{ .Values.llm.builtin.persistence.accessMode }}
      {{- if .Values.llm.builtin.persistence.storageClass }}
      storageClassName: {{ .Values.llm.builtin.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.llm.builtin.persistence.size }}
  {{- end }}
{{- end }}
---
# LLM Service
{{- if .Values.llm.builtin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
  {{- with .Values.llm.builtin.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.llm.builtin.service.type }}
  ports:
  - port: {{ .Values.llm.builtin.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq .Values.llm.builtin.service.type "NodePort" }}
    nodePort: {{ .Values.llm.builtin.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: llm
{{- end }}
