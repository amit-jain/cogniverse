        imagePullPolicy: {{ .Values.phoenix.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 6006
        - name: otlp-grpc
          containerPort: 4317
        env:
        {{- range $key, $value := .Values.phoenix.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.phoenix.livenessProbe | nindent 10 }}
