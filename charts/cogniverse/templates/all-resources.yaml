          {{- if eq $llmDevice "cuda" }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- else if eq $llmDevice "rocm" }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- end }}
          limits:
            {{- toYaml (merge $gpuLimits $baseLimits) | nindent 12 }}
          requests:
            {{- toYaml $baseRequests | nindent 12 }}
        volumeMounts:
        - name: cache
          mountPath: /cache
      {{- if eq $llmDevice "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else if eq $llmDevice "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else }}
      {{- with .Values.llm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
