  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: llm
{{- end }}
{{- range $name, $cfg := .Values.inference }}
{{- if $cfg.enabled }}
{{- $engine := default "vllm" $cfg.engine }}
{{- $device := default "cpu" $cfg.device }}
{{- /*
     Resolve the container image, allowing per-device overrides via
     ``imagesByDevice.<device>``. Falls back to the engine-default image
     block when no override is set. Pylate has its own nested image
     block so we resolve both here for use below.
*/ -}}
{{- $imageDefault := $cfg.image }}
{{- $imageByDev := dict }}
{{- if $cfg.imagesByDevice }}{{ $imageByDev = $cfg.imagesByDevice }}{{ end }}
{{- $imageOverride := index $imageByDev $device }}
{{- $resolvedImage := default $imageDefault $imageOverride }}
{{- $pylateImageDefault := dict }}
{{- $pylateImageOverride := dict }}
{{- if $cfg.pylate }}
{{- $pylateImageDefault = $cfg.pylate.image }}
{{- if $cfg.pylate.imagesByDevice }}
{{- $pylateImageOverride = (index $cfg.pylate.imagesByDevice $device) }}
{{- end }}
{{- end }}
{{- $resolvedPylateImage := default $pylateImageDefault $pylateImageOverride }}
---
# Inference Deployment: {{ $name }} (engine={{ $engine }} device={{ $device }})
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-{{ $name | kebabcase }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
spec:
  replicas: {{ $cfg.replicaCount }}
  # Inference sidecars hold multi-Gi model weights and run as a single
  # replica on memory-constrained k3d nodes (typically 49Gi total). A
  # rolling update needs both old and new pods up at once, which can't
  # fit — so the rollout deadlocks waiting for the new pod to schedule.
  # ``Recreate`` evicts the old pod first, then creates the new one; the
  # tradeoff is a brief gap in inference availability, which is fine for
  # k3d laptop dev and acceptable for the production single-replica use.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: inference-{{ $name }}
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: inference-{{ $name }}
    spec:
      serviceAccountName: {{ include "cogniverse.serviceAccountName" $ }}
      containers:
      {{- if eq $engine "pylate" }}
      - name: pylate
        image: "{{ $resolvedPylateImage.repository }}:{{ $resolvedPylateImage.tag }}"
        imagePullPolicy: {{ $resolvedPylateImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ $cfg.pylate.containerPort }}
        env:
        - name: MODEL_NAME
          value: {{ $cfg.model | quote }}
        - name: MODEL_MODE
          value: {{ default "colbert" $cfg.mode | quote }}
        - name: DEVICE
          value: {{ $device | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ $cfg.pylate.containerPort | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
      {{- else if eq $engine "colpali_native" }}
      # Custom FastAPI sidecar (deploy/colpali) — loads ColPali / ColIdefics3 /
      # ColQwen via colpali-engine and serves POST /v1/embeddings. Used in
      # place of Infinity / vLLM, neither of which can load vidore/colsmol-500m
      # cleanly today (peft eva_config + LoRA target_modules drift).
      - name: colpali
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ default 7997 $cfg.service.port }}
        env:
        - name: MODEL_NAME
          value: {{ $cfg.model | quote }}
        - name: DEVICE
          value: {{ $device | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ default 7997 $cfg.service.port | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
      {{- else if eq $engine "infinity" }}
      # Infinity (michaelfeil/infinity) — OpenAI-compatible /v1/embeddings
      # with multimodal input support. Kept as an option, but does NOT load
      # vidore/colsmol-500m cleanly today; prefer engine=colpali_native for
      # the colpali_infinity / colqwen_infinity blocks.
      - name: infinity
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ default 7997 $cfg.service.port }}
        env:
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        args:
          - "v2"
          - "--model-id"
          - {{ $cfg.model | quote }}
          - "--port"
          - {{ default 7997 $cfg.service.port | quote }}
          - "--host"
          - "0.0.0.0"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- else }}
      - name: vllm
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: VLLM_CPU_OMP_THREADS_BIND
          value: "all"
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        args:
          - {{ $cfg.model | quote }}
          - "--convert"
          - "embed"
          - "--dtype"
          - {{ $cfg.dtype | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}
        livenessProbe:
          {{- toYaml $cfg.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml $cfg.readinessProbe | nindent 10 }}
        resources:
          {{- $baseResources := $cfg.resources | default dict }}
          {{- $baseLimits := dig "limits" dict $baseResources }}
          {{- $gpuLimits := dict }}
          {{- if eq $device "cuda" }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 $cfg.gpuCount)) }}
          {{- else if eq $device "rocm" }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 $cfg.gpuCount)) }}
          {{- end }}
          {{- $mergedLimits := merge $gpuLimits $baseLimits }}
          {{- $mergedResources := merge (dict "limits" $mergedLimits) $baseResources }}
          {{- toYaml $mergedResources | nindent 10 }}
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 10Gi
      {{- /*
           nodeSelector + tolerations: when device requires a GPU, inject
           the standard discovery key + NoSchedule toleration; merge any
           user-specified extras on top. CPU/MPS pass through user values
           untouched.
      */ -}}
      {{- $userNodeSelector := $cfg.nodeSelector | default dict }}
      {{- $userTolerations := $cfg.tolerations | default list }}
      {{- if eq $device "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- range $k, $v := $userNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $userTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else if eq $device "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- range $k, $v := $userNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $userTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else }}
      {{- if $userNodeSelector }}
      nodeSelector:
        {{- toYaml $userNodeSelector | nindent 8 }}
      {{- end }}
      {{- if $userTolerations }}
      tolerations:
        {{- toYaml $userTolerations | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- /*
           Pod anti-affinity: when scaling beyond a single replica, prefer
           that replicas land on different nodes so a single-node failure
           doesn't drop all of one inference stack. preferredDuringScheduling
           rather than requiredDuringScheduling so the pod still schedules
           on a node-poor cluster (e.g. k3d laptop, single-node prod).
      */ -}}
      {{- if and $cfg.replicaCount (gt (int $cfg.replicaCount) 1) }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "cogniverse.selectorLabels" $ | nindent 18 }}
                  app.kubernetes.io/component: inference-{{ $name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-{{ $name | kebabcase }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
spec:
  type: {{ $cfg.service.type }}
  ports:
  - port: {{ $cfg.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq $cfg.service.type "NodePort" }}
    nodePort: {{ $cfg.service.nodePort | default $cfg.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
{{- end }}
{{- end }}
---
# Whisper ASR sidecar (deploy/whisper)
# Pluggable engine: faster-whisper | whisperx | whisper-cpp
{{- if .Values.whisper.enabled }}
{{- $whisper := .Values.whisper }}
{{- $whisperDevice := default "cpu" $whisper.device }}
{{- $whisperImageDefault := $whisper.image }}
{{- $whisperImageOverride := dict }}
{{- if $whisper.imagesByDevice }}
{{- $whisperImageOverride = (index $whisper.imagesByDevice $whisperDevice) }}
{{- end }}
{{- $whisperImage := default $whisperImageDefault $whisperImageOverride }}
{{- $whisperUserNodeSelector := $whisper.nodeSelector | default dict }}
{{- $whisperUserTolerations := $whisper.tolerations | default list }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-whisper
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
spec:
  replicas: {{ $whisper.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: whisper
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: whisper
    spec:
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: whisper
        image: "{{ $whisperImage.repository }}:{{ $whisperImage.tag }}"
        imagePullPolicy: {{ $whisperImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ $whisper.service.port }}
        env:
        - name: WHISPER_ENGINE
          value: {{ $whisper.engine | quote }}
        - name: MODEL_NAME
          value: {{ $whisper.model | quote }}
        - name: DEVICE
          value: {{ $whisperDevice | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ $whisper.service.port | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        livenessProbe:
          {{- toYaml $whisper.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml $whisper.readinessProbe | nindent 10 }}
        resources:
          {{- $baseResources := $whisper.resources | default dict }}
          {{- $baseLimits := dig "limits" dict $baseResources }}
          {{- $gpuLimits := dict }}
          {{- if eq $whisperDevice "cuda" }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 $whisper.gpuCount)) }}
          {{- else if eq $whisperDevice "rocm" }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 $whisper.gpuCount)) }}
          {{- end }}
          {{- $mergedLimits := merge $gpuLimits $baseLimits }}
          {{- $mergedResources := merge (dict "limits" $mergedLimits) $baseResources }}
          {{- toYaml $mergedResources | nindent 10 }}
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 10Gi
      {{- if eq $whisperDevice "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- range $k, $v := $whisperUserNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $whisperUserTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else if eq $whisperDevice "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- range $k, $v := $whisperUserNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $whisperUserTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else }}
      {{- if $whisperUserNodeSelector }}
      nodeSelector:
        {{- toYaml $whisperUserNodeSelector | nindent 8 }}
      {{- end }}
      {{- if $whisperUserTolerations }}
      tolerations:
        {{- toYaml $whisperUserTolerations | nindent 8 }}
      {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-whisper
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
spec:
  type: {{ $whisper.service.type }}
  ports:
  - port: {{ $whisper.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq $whisper.service.type "NodePort" }}
    nodePort: {{ $whisper.service.nodePort | default $whisper.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
{{- end }}
---
# Messaging Gateway Deployment
{{- if .Values.messaging.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-messaging
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: messaging
spec:
  replicas: {{ .Values.messaging.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: messaging
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: messaging
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: messaging-gateway
        image: "{{ .Values.messaging.image.repository }}:{{ .Values.messaging.image.tag }}"
        imagePullPolicy: {{ .Values.messaging.image.pullPolicy }}
        command: ["python", "-m", "cogniverse_messaging.gateway"]
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-messaging-secrets
              key: telegram-bot-token
              optional: true
        - name: RUNTIME_URL
          value: "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
        - name: GATEWAY_MODE
          value: {{ .Values.messaging.mode | quote }}
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.llmEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        {{- range $key, $value := .Values.messaging.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.messaging.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
{{- end }}
