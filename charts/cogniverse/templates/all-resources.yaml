---
# LLM pod — branched on llm.engine. Ollama (StatefulSet, /api/tags
# health, model auto-pulled by post-install init job) or vLLM (Deployment,
# /health, model downloaded on first request to /v1/chat/completions).
# engine=external deploys nothing; runtime points at llm.external.url.
{{- $llmEngine := .Values.llm.engine | default "ollama" }}
{{- $llmDevice := .Values.llm.device | default "cpu" }}
{{- if eq $llmEngine "ollama" }}
{{- $ollama := .Values.llm.ollama }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  serviceName: {{ $fullName }}-llm
  replicas: {{ .Values.llm.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsUser: 0
      containers:
      - name: llm
        image: "{{ $ollama.image.repository }}:{{ $ollama.image.tag }}"
        imagePullPolicy: {{ $ollama.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 11434
        env:
        {{- range $key, $value := $ollama.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml $ollama.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml $ollama.readinessProbe | nindent 10 }}
        resources:
          {{- $base := $ollama.resources | default dict }}
          {{- $baseLimits := $base.limits | default dict }}
          {{- $baseRequests := $base.requests | default dict }}
          {{- $gpuLimits := dict }}
          {{- if eq $llmDevice "cuda" }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- else if eq $llmDevice "rocm" }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- end }}
          limits:
            {{- toYaml (merge $gpuLimits $baseLimits) | nindent 12 }}
          requests:
            {{- toYaml $baseRequests | nindent 12 }}
        volumeMounts:
        - name: data
          mountPath: /root/.ollama
      {{- if eq $llmDevice "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else if eq $llmDevice "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else }}
      {{- with .Values.llm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.llm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $ollama.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
      {{- with $ollama.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
        - {{ $ollama.persistence.accessMode }}
      {{- if $ollama.persistence.storageClass }}
      storageClassName: {{ $ollama.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ $ollama.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
  {{- with $ollama.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $ollama.service.type }}
  ports:
  - port: {{ $ollama.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq $ollama.service.type "NodePort" }}
    nodePort: {{ $ollama.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: llm
{{- else if eq $llmEngine "vllm" }}
{{- $vllm := .Values.llm.vllm }}
{{- $vllmImageDefault := $vllm.image }}
{{- $vllmImageOverride := dict }}
{{- if $vllm.imagesByDevice }}
{{- $vllmImageOverride = (index $vllm.imagesByDevice $llmDevice) }}
{{- end }}
{{- $vllmImage := default $vllmImageDefault $vllmImageOverride }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  replicas: {{ .Values.llm.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      containers:
      - name: llm
        image: "{{ $vllmImage.repository }}:{{ $vllmImage.tag }}"
        imagePullPolicy: {{ $vllmImage.pullPolicy }}
        args:
          - "--model"
          - {{ .Values.llm.model | quote }}
          - "--port"
          - {{ $vllm.service.port | quote }}
          - "--dtype"
          - {{ $vllm.dtype | quote }}
          {{- range $vllm.extraArgs }}
          - {{ . | quote }}
          {{- end }}
        ports:
        - name: http
          containerPort: {{ $vllm.service.port }}
        env:
        - name: HF_HOME
          value: /cache/huggingface
        livenessProbe:
          {{- toYaml $vllm.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml $vllm.readinessProbe | nindent 10 }}
        resources:
          {{- $base := $vllm.resources | default dict }}
          {{- $baseLimits := $base.limits | default dict }}
          {{- $baseRequests := $base.requests | default dict }}
          {{- $gpuLimits := dict }}
          {{- if eq $llmDevice "cuda" }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- else if eq $llmDevice "rocm" }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 .Values.llm.gpuCount)) }}
          {{- end }}
          limits:
            {{- toYaml (merge $gpuLimits $baseLimits) | nindent 12 }}
          requests:
            {{- toYaml $baseRequests | nindent 12 }}
        volumeMounts:
        - name: cache
          mountPath: /cache
      {{- if eq $llmDevice "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else if eq $llmDevice "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- with .Values.llm.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
        {{- with .Values.llm.tolerations }}
        {{- toYaml . | nindent 6 }}
        {{- end }}
      {{- else }}
      {{- with .Values.llm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.llm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.llm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: cache
      {{- if $vllm.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ $fullName }}-llm-cache
      {{- else }}
        emptyDir:
          sizeLimit: {{ $vllm.persistence.size | default "50Gi" }}
      {{- end }}
{{- if $vllm.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullName }}-llm-cache
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
  {{- with $vllm.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
