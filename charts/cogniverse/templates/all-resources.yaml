{{- range $name, $cfg := .Values.inference }}
{{- if $cfg.enabled }}
{{- $engine := default "vllm" $cfg.engine }}
{{- $device := default "cpu" $cfg.device }}
{{- /*
     Resolve the container image, allowing per-device overrides via
     ``imagesByDevice.<device>``. Falls back to the engine-default image
     block when no override is set.
*/ -}}
{{- $imageDefault := $cfg.image }}
{{- $imageByDev := dict }}
{{- if $cfg.imagesByDevice }}{{ $imageByDev = $cfg.imagesByDevice }}{{ end }}
{{- $imageOverride := index $imageByDev $device }}
{{- $resolvedImage := default $imageDefault $imageOverride }}
---
# Inference Deployment: {{ $name }} (engine={{ $engine }} device={{ $device }})
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-{{ $name | kebabcase }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
spec:
  replicas: {{ $cfg.replicaCount }}
  # Inference sidecars hold multi-Gi model weights and run as a single
  # replica on memory-constrained k3d nodes (typically 49Gi total). A
  # rolling update needs both old and new pods up at once, which can't
  # fit — so the rollout deadlocks waiting for the new pod to schedule.
  # ``Recreate`` evicts the old pod first, then creates the new one; the
  # tradeoff is a brief gap in inference availability, which is fine for
  # k3d laptop dev and acceptable for the production single-replica use.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: inference-{{ $name }}
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: inference-{{ $name }}
    spec:
      serviceAccountName: {{ include "cogniverse.serviceAccountName" $ }}
      {{- $persistence := ($.Values.hfCache.persistence | default dict) }}
      {{- $minio := ($persistence.minio | default dict) }}
      {{- $persistenceOn := and $persistence.enabled (not $.Values.hfCache.enabled) }}
      {{- if or (eq $device "rocm") $persistenceOn }}
      securityContext:
        {{- if eq $device "rocm" }}
        # /dev/kfd and /dev/dri/renderD* are owned by gid 992 (render)
        # on Debian/Ubuntu — supplementalGroups injects that membership
        # without changing runAsUser. Override per-service for distros
        # with different gids.
        supplementalGroups:
          {{- toYaml (dig "rocm" "supplementalGroups" (list 992 44) $cfg) | nindent 10 }}
        {{- end }}
        {{- if $persistenceOn }}
        # PVCs come up root:root with 0755. The init container runs as
        # the runtime image's UID 1000; without ``fsGroup`` it can't
        # write to the mount. ``fsGroup`` makes K8s chown the volume to
        # gid 1000 + setgid so both UID 1000 (init) and root (some
        # inference images) can write.
        fsGroup: 1000
        {{- end }}
      {{- end }}
      {{- if eq $device "rocm" }}
      # vLLM's multi-process worker uses host POSIX shm for tensor IPC;
      # without hostIPC + a /dev/shm emptyDir it crashes with
      # shm_open: Function not implemented.
      hostIPC: true
      {{- end }}
      {{- if $persistenceOn }}
      # Pre-warm the model-cache PVC. Single init container does both
      # paths: try MinIO tarball mirror first (fast, air-gap friendly,
      # preserves HF cache symlinks), fall back to HF Hub
      # snapshot_download. The runtime image is used because it ships
      # boto3 + huggingface_hub + tar — required for both paths and
      # already pulled on every cluster (the runtime pod uses it).
      {{- $runtimeBackendInf := default "cuda" $.Values.runtime.backend }}
      {{- $warmImage := $.Values.runtime.image }}
      {{- if $.Values.runtime.imagesByBackend }}
      {{- $warmImage = (index $.Values.runtime.imagesByBackend $runtimeBackendInf) | default $.Values.runtime.image }}
      {{- end }}
      initContainers:
      - name: model-warm
        image: "{{ $warmImage.repository }}:{{ $warmImage.tag }}"
        imagePullPolicy: {{ $warmImage.pullPolicy }}
        # UID 0 so the init can traverse ``/root`` (image default 0700,
        # blocking UID 1000 traversal). ``fsGroup: 1000`` on the pod
        # makes new files group-writable so the main container (which
        # may run as UID 1000) can still read+modify them.
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        env:
        - name: MODEL
          value: {{ $cfg.model | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $minio.enabled }}
        - name: MINIO_ENDPOINT
          value: {{ $minio.endpoint | quote }}
        - name: MINIO_BUCKET
          value: {{ $minio.bucket | quote }}
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $minio.existingSecret | quote }}
              key: rootUser
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $minio.existingSecret | quote }}
              key: rootPassword
        {{- end }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        command: ["sh", "-c"]
        args:
        - |
          set -eu
          python <<'PY'
          import os, subprocess, sys
          from pathlib import Path
          from huggingface_hub import snapshot_download

          model = os.environ["MODEL"]
          hub = Path("/root/.cache/huggingface/hub")
          hub.mkdir(parents=True, exist_ok=True)

          endpoint = os.environ.get("MINIO_ENDPOINT")
          if endpoint:
              # Path 1: pull tarball from MinIO and tar-extract. Tar
              # preserves the snapshots/<sha>/<file> → blobs/<hash>
              # symlinks that snapshot_download's verifier requires.
              import boto3
              from botocore.exceptions import ClientError
              s3 = boto3.client(
                  "s3",
                  endpoint_url=endpoint,
                  aws_access_key_id=os.environ["MINIO_ACCESS_KEY"],
                  aws_secret_access_key=os.environ["MINIO_SECRET_KEY"],
              )
              key = f"{model}.tar"
              tarball = Path(f"/tmp/{model.replace('/', '--')}.tar")
              try:
                  s3.download_file(os.environ["MINIO_BUCKET"], key, str(tarball))
              except ClientError as e:
                  print(f"MinIO tarball miss for {model}: {e.response['Error']['Code']}")
              else:
                  print(f"MinIO hit: extracting {tarball.stat().st_size:,} bytes")
                  subprocess.run(
                      ["tar", "-xf", str(tarball), "-C", str(hub)],
                      check=True,
                  )
                  tarball.unlink()

          # Path 2: snapshot_download. No-op if the cache is already
          # populated by the MinIO path; full HF Hub fetch otherwise.
          snapshot_download(
              repo_id=model,
              cache_dir="/root/.cache/huggingface",
          )
          print(f"model-warm complete: {model}")
          PY
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
      {{- end }}
      containers:
      {{- if eq $engine "fastapi" }}
      # Custom single-file FastAPI sidecar (deploy/<name>) — the image's
      # own CMD starts the server; the chart only supplies env + port.
      - name: {{ $name | kebabcase }}
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ $cfg.service.port }}
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ $cfg.service.port | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- range $key, $value := $cfg.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if $cfg.resources }}
        resources:
          {{- toYaml $cfg.resources | nindent 10 }}
        {{- end }}
        {{- if $cfg.livenessProbe }}
        livenessProbe:
          {{- toYaml $cfg.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if $cfg.readinessProbe }}
        readinessProbe:
          {{- toYaml $cfg.readinessProbe | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
      {{- else if eq $engine "videoprism_jax" }}
      # Custom FastAPI sidecar (deploy/videoprism) — loads VideoPrism via
      # the upstream JAX/flax stack and serves POST /v1/video/embeddings.
      # Externalising VideoPrism keeps the runtime image free of the
      # tensorflow + flax dep (TF's static init in the same process as
      # uvicorn server threads aborts on darwin). Profiles route here via
      # ``inference_service: "videoprism_jax"``.
      - name: videoprism
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ default 7999 $cfg.service.port }}
        env:
        - name: MODEL_NAME
          value: {{ $cfg.model | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ default 7999 $cfg.service.port | quote }}
        - name: NUM_FRAMES
          value: {{ default 16 $cfg.numFrames | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        # JAX_PLATFORM_NAME is also baked into the image but having it
        # here lets a values override flip CPU↔GPU without rebuilding.
        - name: JAX_PLATFORM_NAME
          value: {{ default "cpu" $cfg.jaxPlatform | quote }}
        - name: JAX_PLATFORMS
          value: {{ default "cpu" $cfg.jaxPlatform | quote }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
      {{- else if eq $engine "vllm_transcription" }}
      # vLLM serving OpenAI-compatible /v1/audio/transcriptions for
      # Whisper. The container ``command`` overrides the upstream image's
      # ENTRYPOINT so we can pip-install the [audio] extras before exec-ing
      # vllm serve.
      - name: vllm-transcription
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        {{- include "cogniverse.tunableOpEnv" (dict "device" $device "name" $name "root" $) | nindent 8 }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.kvCacheGiB }}
        # vLLM's CPU worker doesn't honour pod cgroup limits; without an
        # explicit cap it pre-allocates from full node memory and OOMKills.
        - name: VLLM_CPU_KVCACHE_SPACE
          value: {{ $cfg.kvCacheGiB | quote }}
        {{- end }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        # Upstream vllm-openai images ship without [audio] extras, so
        # /v1/audio/transcriptions returns 400 until soundfile + librosa
        # are installed. exec keeps vLLM as PID 1 for signal propagation.
        command:
          - "sh"
          - "-c"
        args:
          - |
            pip install --no-cache-dir --quiet soundfile librosa || exit 1
            exec vllm serve {{ $cfg.model | squote }} \
              --host 0.0.0.0 --port 8000 \
              {{- range $cfg.extraArgs }}
              {{ . | squote }} \
              {{- end }}
      {{- else if eq $engine "colpali_native" }}
      # Custom FastAPI sidecar (deploy/colpali) wrapping colpali-engine.
      # Serves /v1/embeddings with per-token multi-vector arrays — the
      # contract RemoteColPaliLoader requires.
      - name: colpali
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ default 8000 $cfg.service.port }}
        env:
        - name: MODEL_NAME
          value: {{ $cfg.model | quote }}
        - name: DEVICE
          # PyTorch reuses the cuda:N namespace for ROCm; passing "rocm"
          # to torch.device fails parsing.
          value: {{ ternary "cuda" $device (eq $device "rocm") | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ default 8000 $cfg.service.port | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
      {{- else if eq $engine "vllm_token_embed" }}
      # vLLM serving an OpenAI-compatible /v1/embeddings endpoint with
      # per-token (multi-vector) outputs. Used by vllm_colpali for
      # ColPali-style visual retrieval. The ``--runner pooling
      # --convert embed`` pair (vLLM 0.20+) replaces the older
      # ``--task token_embed`` flag — selects vLLM's pooling runner
      # and reshapes the output to per-token embeddings. ``command:
      # ["vllm"]`` overrides the image ENTRYPOINT so ``args[0] = "serve"``
      # isn't duplicated (see vllm_transcription comment above).
      - name: vllm-token-embed
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        {{- include "cogniverse.tunableOpEnv" (dict "device" $device "name" $name "root" $) | nindent 8 }}
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        # Persist vLLM's torch.compile cache alongside HF weights.
        - name: VLLM_CACHE_ROOT
          value: /root/.cache/huggingface/.vllm
        {{- if $cfg.kvCacheGiB }}
        # vLLM's CPU worker doesn't honour pod cgroup limits; without an
        # explicit cap it pre-allocates from full node memory and OOMKills.
        - name: VLLM_CPU_KVCACHE_SPACE
          value: {{ $cfg.kvCacheGiB | quote }}
        {{- end }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        command: ["vllm"]
        args:
          - "serve"
          - {{ $cfg.model | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- else if eq $engine "vllm_chat" }}
      # vLLM serving an OpenAI-compatible chat-completion endpoint.
      # Used by vllm_llm_student (runtime hot path, Gemma 4 E4B) and
      # vllm_llm_teacher (DSPy compile-time only, Qwen3.6-27B-AWQ-INT4).
      # Distinguished from the embedding-style ``vllm`` engine by the
      # absence of ``--convert embed`` — chat models serve /v1/chat/completions
      # natively without conversion. ``command: ["vllm"]`` overrides
      # the image ENTRYPOINT so ``args[0] = "serve"`` isn't duplicated
      # (see vllm_transcription comment above).
      - name: vllm-chat
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        {{- include "cogniverse.tunableOpEnv" (dict "device" $device "name" $name "root" $) | nindent 8 }}
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        # Persist vLLM's torch.compile cache alongside HF weights.
        - name: VLLM_CACHE_ROOT
          value: /root/.cache/huggingface/.vllm
        {{- if $cfg.kvCacheGiB }}
        # vLLM's CPU worker doesn't honour pod cgroup limits; without an
        # explicit cap it pre-allocates from full node memory and OOMKills.
        - name: VLLM_CPU_KVCACHE_SPACE
          value: {{ $cfg.kvCacheGiB | quote }}
        {{- end }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        command: ["vllm"]
        args:
          - "serve"
          - {{ $cfg.model | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- else if eq $engine "gliner" }}
      # FastAPI sidecar (deploy/gliner) wrapping the gliner library.
      # GatewayAgent + EntityExtractionAgent post text + label set to
      # /predict_entities; the slim runtime image does NOT bundle
      # torch+gliner so they MUST route through this sidecar.
      - name: gliner
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: MODEL_NAME
          value: {{ $cfg.model | quote }}
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
      {{- else if eq $engine "vllm_embed" }}
      # vLLM serving an OpenAI-compatible /v1/embeddings endpoint with
      # dense single-vector (pooled) outputs. Used by denseon for
      # DenseOn-style dense retrieval. ``--convert embed`` selects vLLM's
      # pooling runner; unlike vllm_token_embed there is no per-token
      # reshape — the model pools to one vector per input. ``command:
      # ["vllm"]`` overrides the image ENTRYPOINT so ``args[0] = "serve"``
      # isn't duplicated (see vllm_transcription comment above). A
      # first-class named engine so dense embedding services don't rely on
      # the catch-all.
      - name: vllm-embed
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        {{- include "cogniverse.tunableOpEnv" (dict "device" $device "name" $name "root" $) | nindent 8 }}
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        # Persist vLLM's torch.compile cache alongside HF weights.
        - name: VLLM_CACHE_ROOT
          value: /root/.cache/huggingface/.vllm
        {{- if $cfg.kvCacheGiB }}
        # vLLM's CPU worker doesn't honour pod cgroup limits; without an
        # explicit cap it pre-allocates from full node memory and OOMKills.
        - name: VLLM_CPU_KVCACHE_SPACE
          value: {{ $cfg.kvCacheGiB | quote }}
        {{- end }}
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        command: ["vllm"]
        args:
          - "serve"
          - {{ $cfg.model | quote }}
          - "--convert"
          - "embed"
          - "--dtype"
          - {{ $cfg.dtype | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- else }}
      - name: vllm
        image: "{{ $resolvedImage.repository }}:{{ $resolvedImage.tag }}"
        imagePullPolicy: {{ $resolvedImage.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        env:
        {{- include "cogniverse.tunableOpEnv" (dict "device" $device "name" $name "root" $) | nindent 8 }}
        - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        {{- if $cfg.hfTokenSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $cfg.hfTokenSecret | quote }}
              key: HF_TOKEN
        {{- end }}
        args:
          - {{ $cfg.model | quote }}
          - "--convert"
          - "embed"
          - "--dtype"
          - {{ $cfg.dtype | quote }}
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          {{- range $cfg.extraArgs }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}
        livenessProbe:
          {{- toYaml $cfg.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml $cfg.readinessProbe | nindent 10 }}
        resources:
          {{- $baseResources := $cfg.resources | default dict }}
          {{- $baseLimits := dig "limits" dict $baseResources }}
          # GPU resource request only when a device plugin advertises
          # the resource. ``inference.<svc>.useDevicePlugin: true`` opts
          # in; default is hostPath passthrough (k3d bind-mounts
          # /dev/kfd + /dev/dri into the node, the pod template mounts
          # them into containers, supplementalGroups gives access).
          # Without a device plugin advertising ``amd.com/gpu`` /
          # ``nvidia.com/gpu``, requesting that resource leaves the pod
          # Pending with ``Insufficient amd.com/gpu``.
          {{- $gpuLimits := dict }}
          {{- if and (eq $device "cuda") $cfg.useDevicePlugin }}
          {{- $gpuLimits = dict "nvidia.com/gpu" (printf "%v" (default 1 $cfg.gpuCount)) }}
          {{- else if and (eq $device "rocm") $cfg.useDevicePlugin }}
          {{- $gpuLimits = dict "amd.com/gpu" (printf "%v" (default 1 $cfg.gpuCount)) }}
          {{- end }}
          {{- $mergedLimits := merge $gpuLimits $baseLimits }}
          {{- $mergedResources := merge (dict "limits" $mergedLimits) $baseResources }}
          {{- toYaml $mergedResources | nindent 10 }}
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        {{- if eq $device "rocm" }}
        # ROCm device passthrough. The k3d cluster bind-mounts
        # /dev/kfd and /dev/dri from the host (cluster.py
        # ``create_cluster``); this hostPath mount injects them into
        # the inference pod's container so amdgpu/HSA can enumerate
        # the GPU. Without this, ``rocminfo`` inside the pod reports
        # "Agent creation failed" and torch / vLLM fall through to CPU
        # even with the right ROCm wheels installed.
        - name: kfd
          mountPath: /dev/kfd
        - name: dri
          mountPath: /dev/dri
        # Large /dev/shm — vLLM's reference run uses --shm-size 16G
        # because the multi-process engine passes activation tensors
        # through POSIX shm. The default 64MB tmpfs is enough for
        # ColPali (~3 GiB image batches) but vLLM-LLM-student spills
        # past it on first generation and crashes with
        # ``RuntimeError: shm_open returned ENOSPC``.
        - name: shm
          mountPath: /dev/shm
        {{- end }}
        {{- if eq $device "rocm" }}
        # ``privileged: true`` is what ``docker run --device=/dev/kfd``
        # gets you implicitly: full access to /dev/kfd despite the
        # default container's restricted device cgroup. ``SYS_PTRACE``
        # + ``seccompProfile: Unconfined`` mirror vLLM's reference
        # docker-run for ROCm (``--cap-add=SYS_PTRACE
        # --security-opt=seccomp=unconfined``). Without privileged,
        # opening /dev/kfd inside the pod returns "Operation not
        # permitted" even when the file is mounted, the user is in
        # the render group, and the file is mode 0660. This is
        # standard for ROCm in kubernetes — the AMD device plugin
        # also runs privileged.
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_PTRACE
          seccompProfile:
            type: Unconfined
        {{- end }}
      volumes:
      - name: model-cache
        # Three-way: dev hostPath via hfCache.enabled (host bind-mount),
        # prod PVC via hfCache.persistence.enabled (survives node loss),
        # else legacy node-local hostPath (lost on node replacement).
        {{- if $.Values.hfCache.enabled }}
        hostPath:
          path: {{ $.Values.hfCache.path }}
          type: Directory
        {{- else if $persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ $fullName }}-{{ $name | kebabcase }}-model-cache
        {{- else }}
        hostPath:
          path: /var/lib/cogniverse/hf-cache/{{ $name }}
          type: DirectoryOrCreate
        {{- end }}
      {{- if eq $device "rocm" }}
      - name: kfd
        hostPath:
          path: /dev/kfd
      - name: dri
        hostPath:
          path: /dev/dri
      # tmpfs-backed /dev/shm sized like the vLLM reference run's
      # ``--shm-size 16G``. Per-service override via
      # ``inference.<svc>.shmSize``. Actual memory only fills up to
      # the cap; emptyDir Memory medium counts against the pod's
      # memory limit so we keep the limit in sync downstream.
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: {{ default "16Gi" $cfg.shmSize }}
      {{- end }}
      {{- /*
           nodeSelector + tolerations: when device requires a GPU, inject
           the standard discovery key + NoSchedule toleration; merge any
           user-specified extras on top. CPU/MPS pass through user values
           untouched.
      */ -}}
      {{- $userNodeSelector := $cfg.nodeSelector | default dict }}
      {{- $userTolerations := $cfg.tolerations | default list }}
      {{- if eq $device "cuda" }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
        {{- range $k, $v := $userNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $userTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else if eq $device "rocm" }}
      nodeSelector:
        amd.com/gpu.present: "true"
        {{- range $k, $v := $userNodeSelector }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      {{- range $userTolerations }}
      - {{ toYaml . | nindent 8 | trim }}
      {{- end }}
      {{- else }}
      {{- if $userNodeSelector }}
      nodeSelector:
        {{- toYaml $userNodeSelector | nindent 8 }}
      {{- end }}
      {{- if $userTolerations }}
      tolerations:
        {{- toYaml $userTolerations | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- /*
           Pod anti-affinity: when scaling beyond a single replica, prefer
           that replicas land on different nodes so a single-node failure
           doesn't drop all of one inference stack. preferredDuringScheduling
           rather than requiredDuringScheduling so the pod still schedules
           on a node-poor cluster (e.g. k3d laptop, single-node prod).
      */ -}}
      {{- if and $cfg.replicaCount (gt (int $cfg.replicaCount) 1) }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "cogniverse.selectorLabels" $ | nindent 18 }}
                  app.kubernetes.io/component: inference-{{ $name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-{{ $name | kebabcase }}
  labels:
    {{- include "cogniverse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
spec:
  type: {{ $cfg.service.type }}
  ports:
  - port: {{ $cfg.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if eq $cfg.service.type "NodePort" }}
    nodePort: {{ $cfg.service.nodePort | default $cfg.service.port }}
    {{- end }}
  selector:
    {{- include "cogniverse.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: inference-{{ $name }}
{{- end }}
{{- end }}
---
# Messaging Gateway Deployment
{{- if .Values.messaging.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-messaging
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: messaging
spec:
  replicas: {{ .Values.messaging.replicaCount }}
  selector:
    matchLabels:
      {{- include "cogniverse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: messaging
  template:
    metadata:
      labels:
        {{- include "cogniverse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: messaging
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cogniverse.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: messaging-gateway
        image: "{{ .Values.messaging.image.repository }}:{{ .Values.messaging.image.tag }}"
        imagePullPolicy: {{ .Values.messaging.image.pullPolicy }}
        command: ["python", "-m", "cogniverse_messaging.gateway"]
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-messaging-secrets
              key: telegram-bot-token
              optional: true
        - name: RUNTIME_URL
          value: "http://{{ $fullName }}-runtime:{{ .Values.runtime.service.port }}"
        - name: GATEWAY_MODE
          value: {{ .Values.messaging.mode | quote }}
        - name: BACKEND_URL
          value: "http://{{ $fullName }}-vespa"
        - name: BACKEND_PORT
          value: "{{ .Values.vespa.service.ports.query }}"
        - name: TELEMETRY_HTTP_ENDPOINT
          value: "http://{{ $fullName }}-phoenix:{{ .Values.phoenix.service.port }}"
        - name: LLM_ENDPOINT
          value: {{ include "cogniverse.primaryLLMEndpoint" . | quote }}
        - name: LLM_ENGINE
          value: {{ .Values.llm.engine | quote }}
        - name: LLM_MODEL
          value: {{ .Values.llm.model | quote }}
        {{- range $key, $value := .Values.messaging.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.messaging.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.json
          subPath: config.json
          readOnly: true
        {{- if .Values.devMode.enabled }}
        - name: src-libs
          mountPath: /app/libs
        - name: src-scripts
          mountPath: /app/scripts
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ $fullName }}-config
      {{- if .Values.devMode.enabled }}
      - name: src-libs
        hostPath:
          path: {{ .Values.devMode.hostPath }}/libs
          type: Directory
      - name: src-scripts
        hostPath:
          path: {{ .Values.devMode.hostPath }}/scripts
          type: Directory
      {{- end }}
{{- end }}
