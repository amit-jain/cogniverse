apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-llm
  labels:
    {{- include "cogniverse.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
  {{- with $vllm.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $vllm.service.type }}
  ports:
  - port: {{ $vllm.service.port }}
    targetPort: http
    protocol: TCP
