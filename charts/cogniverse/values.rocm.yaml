

_vllmRocmImage: &vllmRocmImage
  rocm:
    repository: vllm/vllm-openai-rocm
    tag: v0.23.0
    pullPolicy: IfNotPresent

inference:
  vllm_colpali:
    enabled: true
    model: TomoroAI/tomoro-colqwen3-embed-4b
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    engine: vllm_token_embed
    extraArgs:
      - "--max-model-len"
      - "4096"
      - "--runner"
      - "pooling"
      - "--convert"
      - "embed"
      - "--limit-mm-per-prompt"
      - '{"video":0,"image":1}'
      - "--gpu-memory-utilization"
      - "0.25"
    kvCacheGiB: null
    image: null
    resources:
      limits:
        cpu: "4"
        memory: "20Gi"
      requests:
        cpu: "4"
        memory: "20Gi"

  vllm_asr:
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    extraArgs:
      - "--runner"
      - "generate"
      - "--max-model-len"
      - "448"
      - "--gpu-memory-utilization"
      - "0.16"
    resources:
      limits:
        cpu: "2"
        memory: "8Gi"
      requests:
        cpu: "2"
        memory: "8Gi"

  vllm_llm_student:
    enabled: true
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    # Helm REPLACES list values, so this overlay must repeat every base
    # extraArg. --max-num-seqs 1 and --limit-mm-per-prompt were silently
    # dropped when only the ROCm-specific args were listed here, leaving the
    # student on max-num-seqs=256 + an unbounded multimodal host cache
    # (gemma-4 is a vision-language model) — the source of the 9->15Gi host
    # RSS ratchet. The runtime serializes generation and only does text
    # chat, so both caps are free.
    extraArgs:
      - "--max-model-len"
      - "16384"
      - "--enforce-eager"
      - "--gpu-memory-utilization"
      - "0.30"
      - "--max-num-seqs"
      - "1"
      - "--limit-mm-per-prompt"
      - '{"video":0,"image":0}'
    resources:
      limits:
        cpu: "4"
        memory: "32Gi"
      requests:
        cpu: "4"
        memory: "32Gi"

  vllm_llm_teacher:
    enabled: true
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    extraArgs:
      - "--max-model-len"
      - "4096"
      - "--enforce-eager"
      - "--gpu-memory-utilization"
      - "0.55"
      - "--limit-mm-per-prompt"
      - '{"image":0,"video":0}'
    resources:
      limits:
        cpu: "4"
        memory: "32Gi"
      requests:
        cpu: "4"
        memory: "32Gi"

  colbert_pylate:
    enabled: true
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    extraArgs:
      - "--max-model-len"
      - "8192"
      - "--hf-overrides"
      - '{"architectures": ["ColBERTModernBertModel"]}'
      - "--gpu-memory-utilization"
      - "0.05"
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "4Gi"

  code_colbert_pylate:
    enabled: true
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    extraArgs:
      - "--max-model-len"
      - "8192"
      - "--hf-overrides"
      - '{"architectures": ["ColBERTModernBertModel"]}'
      - "--gpu-memory-utilization"
      - "0.05"
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "4Gi"

  denseon:
    enabled: true
    device: rocm
    gpuCount: 1
    imagesByDevice: *vllmRocmImage
    extraArgs:
      - "--gpu-memory-utilization"
      - "0.05"
    resources:
      limits:
        cpu: "4"
        memory: "4Gi"
      requests:
        cpu: "1"
        memory: "4Gi"

runtime:
  backend: rocm
  tunableOp: true

dashboard:
  backend: rocm

llm:
  engine: vllm
  model: google/gemma-4-e4b-it
  builtin:
    enabled: false
