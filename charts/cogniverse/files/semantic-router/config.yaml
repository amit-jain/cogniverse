# Semantic Router config for the in-cluster gateway (rendered via `tpl`).
#
# The router gates the tenant's allowed model set by tier (the authz signal
# reads x-authz-user-id + x-authz-user-groups that cogniverse sends), then
# classifies request content itself (domain classifier) to pick the model +
# reasoning mode. Both catalog models resolve to the chart's in-cluster LLM
# backend by default — add distinct backend_refs when you deploy more models.
version: v0.3

listeners:
  - name: http
    address: 0.0.0.0
    port: 8899
    timeout: 300

providers:
  defaults:
    default_model: basic-chat
    default_reasoning_effort: low
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: basic-chat
      reasoning_family: qwen3
      provider_model_id: {{ include "cogniverse.primaryLLMModelBare" . | quote }}
      api_format: openai
      backend_refs:
        - name: llm-basic
          endpoint: {{ include "cogniverse.srUpstreamHost" . }}:{{ int (include "cogniverse.srUpstreamPort" .) }}
          protocol: http
          weight: 100
          type: chat
    - name: pro-reasoning
      reasoning_family: qwen3
      provider_model_id: {{ include "cogniverse.primaryLLMModelBare" . | quote }}
      api_format: openai
      backend_refs:
        - name: llm-pro
          endpoint: {{ include "cogniverse.srUpstreamHost" . }}:{{ int (include "cogniverse.srUpstreamPort" .) }}
          protocol: http
          weight: 100
          type: chat

routing:
  modelCards:
    - name: basic-chat
      capabilities: [chat]
      modality: ar
    - name: pro-reasoning
      capabilities: [chat, reasoning]
      modality: ar
  signals:
    role_bindings:
      - name: pro-users
        role: pro_tier
        subjects:
          - kind: Group
            name: pro
      - name: free-users
        role: free_tier
        subjects:
          - kind: Group
            name: free
    keywords:
      - name: technical
        operator: OR
        keywords:
          - algorithm
          - complexity
          - recursive
          - distributed
          - consensus
          - optimize
          - architecture
          - theorem
          - proof
          - throughput
    domains:
      - name: technical
        mmlu_categories: [computer science, engineering, math, physics]
  decisions:
    # Deterministic keyword trigger for reasoning; the domain classifier
    # (below) catches technical prompts the keyword list misses.
    - name: pro-technical-keyword
      priority: 300
      rules:
        operator: AND
        conditions:
          - type: authz
            name: pro_tier
          - type: keyword
            name: technical
      modelRefs:
        - model: pro-reasoning
          use_reasoning: true
      plugins:
        - type: semantic-cache
          configuration:
            enabled: true
    - name: pro-technical-domain
      priority: 250
      rules:
        operator: AND
        conditions:
          - type: authz
            name: pro_tier
          - type: domain
            name: technical
      modelRefs:
        - model: pro-reasoning
          use_reasoning: true
      plugins:
        - type: semantic-cache
          configuration:
            enabled: true
    - name: pro-default
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: authz
            name: pro_tier
      modelRefs:
        - model: pro-reasoning
          use_reasoning: false
      plugins:
        - type: semantic-cache
          configuration:
            enabled: true
    - name: free-default
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: authz
            name: free_tier
      modelRefs:
        - model: basic-chat
          use_reasoning: false
      plugins:
        - type: semantic-cache
          configuration:
            enabled: true

global:
  services:
    authz:
      fail_open: false
      identity:
        user_id_header: x-authz-user-id
        user_groups_header: x-authz-user-groups
    response_api:
      enabled: false
    router_replay:
      enabled: false
    observability:
      tracing:
        enabled: false
  stores:
    semantic_cache:
      enabled: true
      backend_type: memory
      similarity_threshold: 0.95
      max_entries: 1024
      ttl_seconds: 3600
      eviction_policy: lru
      embedding_model: mmbert
  model_catalog:
    embeddings:
      semantic:
        mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
        use_cpu: true
        embedding_config:
          model_type: mmbert
          preload_embeddings: true
          target_dimension: 768
          target_layer: 22
          enable_soft_matching: true
          top_k: 1
          min_score_threshold: 0.5
    system:
      domain_classifier: models/mmbert32k-intent-classifier-merged
    modules:
      classifier:
        domain:
          model_ref: domain_classifier
          model_id: models/mmbert32k-intent-classifier-merged
          threshold: 0.5
          use_cpu: true
          use_mmbert_32k: true
          category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
          fallback_category: other
