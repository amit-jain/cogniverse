# Envoy data plane for the in-cluster semantic router (rendered via `tpl`).
#
# Clients (the runtime's agents) hit Envoy on the listener port. Envoy calls
# the semantic-router ext_proc service (gRPC) for a routing decision on every
# request, then forwards the (possibly rewritten) request to the in-cluster
# LLM backend. This is the canonical SR + Envoy wiring; it does not change
# between SR versions.
static_resources:
  listeners:
    - name: main
      address:
        socket_address: { address: 0.0.0.0, port_value: {{ int .Values.semanticRouter.envoy.service.port }} }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: llm_upstream
                            # Match the listener's 300s budget. At 120s the
                            # proxy timed out queued LLM calls (504) under
                            # concurrent load even though clients were still
                            # willing to wait.
                            timeout: 300s
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      failure_mode_allow: false
                      grpc_service:
                        envoy_grpc:
                          cluster_name: semantic_router
                        timeout: 60s
                      # Envoy's default per-message deadline is 200ms; the
                      # router's CPU-bound classifiers exceed it under
                      # concurrent load and Envoy then 504s the request.
                      message_timeout: 30s
                      max_message_timeout: 60s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: BUFFERED
                        response_header_mode: SEND
                        response_body_mode: BUFFERED
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: llm_upstream
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: llm_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: {{ include "cogniverse.srUpstreamHost" . }}, port_value: {{ int (include "cogniverse.srUpstreamPort" .) }} }

    - name: semantic_router
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # ext_proc is a gRPC service — force HTTP/2 on this cluster.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: semantic_router
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: {{ include "cogniverse.fullname" . }}-semantic-router, port_value: {{ int .Values.semanticRouter.router.grpcPort }} }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: {{ int .Values.semanticRouter.envoy.adminPort }} }
