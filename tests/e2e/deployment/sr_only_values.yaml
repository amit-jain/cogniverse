# Lean profile for the semantic-router routing deployment test: only the
# semantic router (+ its Envoy) and a CPU Ollama LLM for it to proxy. Every
# other component is off, so the isolated k3d cluster needs no GPU, no host
# mounts, and no locally-built application image.
vespa:
  enabled: false
phoenix:
  enabled: false
dashboard:
  enabled: false
runtime:
  enabled: false
ingestor:
  enabled: false
minio:
  enabled: false
redis:
  enabled: false

initJobs:
  schemaDeployment:
    enabled: false
  modelPulling:
    enabled: false

inference:
  vllm_colpali:
    enabled: false
  colbert_pylate:
    enabled: false
  code_colbert_pylate:
    enabled: false
  denseon:
    enabled: false
  gliner:
    enabled: false
  videoprism_jax:
    enabled: false
  vllm_llm_student:
    enabled: false
  vllm_asr:
    enabled: false
  vllm_llm_teacher:
    enabled: false
  clap_embed:
    enabled: false
  face_embed:
    enabled: false

argo:
  enabled: false

# Nightly DR snapshot CronWorkflows need the Argo CRDs; off for this profile.
hostStorage:
  backup:
    enabled: false

llm:
  engine: ollama
  device: cpu
  model: qwen2.5:0.5b

semanticRouter:
  enabled: true
