    "jaxlib==0.9.2",
    "transformers==4.56.2",
    "colpali-engine==0.3.13",
    "pylate==1.4.0",
    "gliner==0.2.26",
    "xgboost==3.2.0",
    "scikit-learn==1.8.0",
    # Search & Retrieval
