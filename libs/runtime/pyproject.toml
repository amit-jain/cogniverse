[project]
name = "cogniverse-runtime"
version = "0.1.0"
description = "Unified runtime server for Cogniverse with dynamic backend loading"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Cogniverse Team"}
]

dependencies = [
    "cogniverse-sdk",
    "cogniverse-core",

    # FastAPI and server
    "fastapi==0.135.3",
    "uvicorn==0.44.0",
    "pyyaml==6.0.3",

    # Computer Vision for processing
    "opencv-python==4.13.0.92",
    "pillow==12.2.0",

    # Audio processing
    "openai-whisper==20250625",
    "faster-whisper==1.2.1",
    "librosa==0.11.0",

    # Document processing
    "pdf2image==1.17.0",
    "pypdf2==3.0.1",

    # Video processing
    "jax==0.9.2",
    "jaxlib==0.9.2",

    # Utilities
    "msgpack==1.1.2",

    # A2A Protocol
    "a2a-sdk[http-server]==0.3.26",

    # Sandbox runtime (OpenShell) for coding agent code execution.
    # Pinned to match the host gateway version — the SDK and gateway must
    # be version-compatible for mTLS and the gRPC protocol.
    "openshell==0.0.13",
]

[project.optional-dependencies]
vespa = ["cogniverse-vespa"]
agents = ["cogniverse-agents"]
all = ["cogniverse-vespa", "cogniverse-agents"]

[tool.uv.sources]
cogniverse-sdk = { workspace = true }
cogniverse-core = { workspace = true }
cogniverse-vespa = { workspace = true }
cogniverse-agents = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cogniverse_runtime"]
